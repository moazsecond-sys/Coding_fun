<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #f8f9fa; --card: white; --text: #222; 
  --green: #4ade80; --green-dark: #2d5a3d; --red: #ef4444;
  --shadow: rgba(0,0,0,0.08);
}
* { box-sizing: border-box; }
body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg1);
  color: var(--text);
  padding: 20px;
  margin: 0;
  min-height: 100vh;
}
.top-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
  flex-wrap: wrap;
  gap: 10px;
}
.btn-back {
  padding: 10px 20px;
  border: 2px solid var(--green);
  background: var(--card);
  color: var(--green-dark);
  border-radius: 25px;
  font-family: inherit;
  cursor: pointer;
  font-weight: bold;
  text-decoration: none;
  display: inline-block;
}
.btn-back:hover { background: var(--green); color: white; }
.btn-logout {
  padding: 10px 20px;
  border: 2px solid var(--red);
  background: var(--red);
  color: white;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
}
h1 {
  text-align: center;
  color: var(--green-dark);
  margin: 20px 0;
}
.container {
  max-width: 800px;
  margin: 0 auto;
}
.card {
  background: var(--card);
  padding: 25px;
  border-radius: 18px;
  margin: 20px 0;
  box-shadow: 0 4px 12px var(--shadow);
  border-right: 4px solid var(--green);
}
.card h3 {
  margin-top: 0;
  color: var(--green-dark);
}
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 2px solid var(--green);
  border-radius: 12px;
  font-family: inherit;
  font-size: 15px;
}
textarea { min-height: 120px; resize: vertical; }
.btn-save {
  background: var(--green);
  color: white;
  border: none;
  padding: 14px 25px;
  border-radius: 25px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
}
.btn-save:hover { transform: scale(1.02); }
.btn-delete {
  background: var(--red);
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  margin-right: 8px;
}
#adminPanel { display: none; }
#loginBox { display: block; }
.loading { text-align: center; padding: 20px; color: #666; }
.translation-item {
  padding: 12px;
  border-bottom: 1px solid #eee;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: start;
  gap: 10px;
}
.translation-text {
  flex: 1;
}
</style>
</head>
<body>

<div class="top-nav">
  <div>
    <a href="index.html" class="btn-back">🏠 رجوع للرئيسية</a>
    <a href="modern-index.html" class="btn-back">✨ الرجوع للنسخة الحديثة</a>
  </div>
  <button class="btn-logout" onclick="logout()">🚪 تسجيل خروج</button>
</div>

<h1>⚙️ لوحة التحكم - إدارة الترجمات</h1>

<!-- صندوق الدخول -->
<div class="card" id="loginBox">
  <h3>تسجيل الدخول</h3>
  <input type="email" id="email" placeholder="الإيميل">
  <input type="password" id="password" placeholder="كلمة المرور">
  <button class="btn-save" onclick="login()">دخول</button>
</div>

<!-- لوحة التحكم -->
<div id="adminPanel">
  
  <!-- إضافة ترجمة جديدة -->
  <div class="card">
    <h3>➕ إضافة ترجمة جديدة</h3>
    
    <label>اختر الآية:</label>
    <select id="verseSelect">
      <option>جاري تحميل الآيات...</option>
    </select>
    
    <label>اختر اللغة:</label>
    <select id="langSelect">
      <option value="ar">العربية</option>
      <option value="en">English</option>
      <option value="es">Español</option>
      <option value="de">Deutsch</option>
      <option value="pt">Português</option>
      <option value="fr">Français</option>
    </select>
    
    <label>النص المترجم:</label>
    <textarea id="translationText" placeholder="اكتب الترجمة هنا..."></textarea>
    
    <button class="btn-save" onclick="saveTranslation()">💾 حفظ الترجمة</button>
  </div>

  <!-- عرض الترجمات المضافة -->
  <div class="card">
    <h3>📋 آخر 15 ترجمة مضافة</h3>
    <div id="recentTranslations" class="loading">جاري التحميل...</div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/+esm'

const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo'; // حط المفتاح الـ anon public هنا
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// التحقق من الدخول
sb.auth.getSession().then(({data: {session}}) => {
  if(session) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadVersesForSelect();
    loadRecentTranslations();
  } else {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('adminPanel').style.display = 'none';
  }
});

// تسجيل الدخول
window.login = async function() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  const {error} = await sb.auth.signInWithPassword({email, password});
  if(error) {
    alert('خطأ: ' + error.message);
  } else {
    location.reload();
  }
}

// تسجيل الخروج
window.logout = async function() {
  await sb.auth.signOut();
  location.reload();
}

// تحميل الآيات في القايمة
async function loadVersesForSelect() {
  const {data, error} = await sb.from('verses')
    .select('id, surah, ayah, text')
    .order('surah')
    .order('ayah');
  
  if(error) {
    document.getElementById('verseSelect').innerHTML = '<option>خطأ في التحميل</option>';
    return;
  }
  
  const select = document.getElementById('verseSelect');
  select.innerHTML = data.map(v => {
    const shortText = v.text.length > 40 ? v.text.substring(0, 40) + '...' : v.text;
    return `<option value="${v.id}">سورة ${v.surah} - آية ${v.ayah} | ${shortText}</option>`;
  }).join('');
}

// حفظ الترجمة
window.saveTranslation = async function() {
  const verse_id = document.getElementById('verseSelect').value;
  const lang_code = document.getElementById('langSelect').value;
  const text_translation = document.getElementById('translationText').value.trim();
  
  if(!verse_id || !text_translation) {
    alert('اختر الآية واكتب الترجمة');
    return;
  }
  
  const {error} = await sb.from('translations').insert([
    {verse_id: parseInt(verse_id), lang_code, text_translation}
  ]);
  
  if(error) {
    alert('خطأ: ' + error.message);
  } else {
    alert('✅ تم حفظ الترجمة بنجاح');
    document.getElementById('translationText').value = '';
    loadRecentTranslations();
  }
}

// حذف الترجمة - الجديد 🔥
window.deleteTranslation = async function(id) {
  if(!confirm('متأكد انك عايز تحذف الترجمة دي؟')) return;
  
  const {error} = await sb.from('translations').delete().eq('id', id);
  
  if(error) {
    alert('خطأ في الحذف: ' + error.message);
  } else {
    alert('🗑️ تم الحذف');
    loadRecentTranslations();
  }
}

// عرض آخر الترجمات مع زرار الحذف
async function loadRecentTranslations() {
  const {data, error} = await sb.from('translations')
    .select('id, lang_code, text_translation, verse_id, verses(surah, ayah)')
    .order('id', {ascending: false})
    .limit(15);
  
  if(error) {
    document.getElementById('recentTranslations').innerHTML = 'خطأ في التحميل';
    return;
  }
  
  if(data.length === 0) {
    document.getElementById('recentTranslations').innerHTML = 'لا توجد ترجمات بعد';
    return;
  }
  
  document.getElementById('recentTranslations').innerHTML = data.map(t => `
    <div class="translation-item">
      <div class="translation-text">
        <strong>سورة ${t.verses.surah} - آية ${t.verses.ayah}</strong> 
        <span style="background:#4ade80; color:white; padding:3px 8px; border-radius:10px; font-size:12px;">${t.lang_code}</span>
        <br>
        <small style="color:#666">${t.text_translation.substring(0, 100)}...</small>
      </div>
      <button class="btn-delete" onclick="deleteTranslation(${t.id})">🗑️ حذف</button>
    </div>
  `).join('');
}
</script>
</body>
</html>
