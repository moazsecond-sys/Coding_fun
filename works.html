<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أعمالنا | GREEN APPLE DESIGN</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🍏 أعمالنا</h1>
  
  <div class="filters">
    <button class="active" data-cat="all">الكل</button>
    <button data-cat="logo">لوجوهات</button>
    <button data-cat="banner">بنرات</button>
  </div>

  <!-- غيرت هنا: id="grid" عشان يتطابق مع script.js -->
  <div class="grid" id="grid">
    <div class="loading">جاري تحميل الأعمال...</div>
  </div>

  <div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <img src="" alt="">
  </div>

  <!-- الترتيب مهم: مكتبة → اسرار → كود -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
