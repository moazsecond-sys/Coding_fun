<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منيو المطعم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
    * {box-sizing: border-box;}
    body {
        font-family: 'Tajawal', Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        margin: 0; padding: 20px; min-height: 100vh;
    }
    h1 {
        text-align: center; color: white; font-size: 32px;
        margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    #status {
        text-align: center; padding: 12px; margin: 20px auto;
        max-width: 400px; border-radius: 10px; background: #fff3cd;
        color: #856404; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    #menu {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 25px; max-width: 1200px; margin: 0 auto;
    }
    .card {
        background: white; border-radius: 15px; padding: 15px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.2); text-align: center;
        transition: all 0.3s; overflow: hidden;
    }
    .card:hover {transform: translateY(-8px); box-shadow: 0 12px 24px rgba(0,0,0,0.3);}
    .card img {
        width: 100%; height: 200px; object-fit: cover;
        border-radius: 10px; margin-bottom: 10px;
    }
    .card h3 {margin: 10px 0 5px; color: #333; font-size: 20px;}
    .card p {font-size: 22px; color: #e63946; font-weight: bold; margin: 5px 0;}
    .price-tag {
        background: #e63946; color: white; padding: 5px 15px;
        border-radius: 20px; display: inline-block;
    }
</style>
</head>
<body>

<h1>🍔 منيو المطعم</h1>
<div id="status">⏳ جاري تحميل المنيو...</div>
<div id="menu"></div>

<script>
// ===== إعداداتك =====
const BIN_ID = '6a217af2da38895dfe869b52';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

// ===== الكود بدون كي عشان الـ Bin مفتوح =====
fetch(BIN_URL)
.then(response => {
  if (!response.ok) {
    throw new Error('فشل التحميل - كود: ' + response.status);
  }
  return response.json();
})
.then(data => {
  const items = data.record;
  
  if (!items || items.length === 0) {
    document.getElementById('status').innerHTML = '⚠️ المنيو فاضي. ضيف أصناف في jsonbin';
    return;
  }
  
  document.getElementById('status').innerHTML = '✅ المنيو اشتغل';
  document.getElementById('status').style.background = '#d4edda';
  document.getElementById('status').style.color = '#155724';
  
  const menuDiv = document.getElementById('menu');
  menuDiv.innerHTML = '';
  
  items.forEach(item => {
    menuDiv.innerHTML += `
      <div class="card">
        <img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/260x200/cccccc/666?text=No+Image'">
        <h3>${item.name}</h3>
        <p><span class="price-tag">${item.price} $</span></p>
      </div>
    `;
  });
})
.catch(error => {
  console.error('Error:', error);
  document.getElementById('status').innerHTML = '❌ خطأ: ' + error.message;
  document.getElementById('status').style.background = '#f8d7da';
  document.getElementById('status').style.color = '#721c24';
});
</script>

</body>
</html>
