<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار المنيو</title>
<style>
body{font-family:Tahoma; background:#0f172a; color:#fff; padding:30px; margin:0}
h1{text-align:center; color:#38bdf8; margin-bottom:30px}
#status{text-align:center; font-size:18px; margin:20px}
.grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:20px; margin-top:30px}
.card{background:#1e293b; padding:20px; border-radius:15px; text-align:center; border:2px solid #334155}
.card:hover{border-color:#38bdf8; transform:scale(1.05); transition:0.3s}
.card img{width:100px; height:100px; object-fit:cover; border-radius:10px; background:#334155}
.card h3{color:#fbbf24; margin:10px 0; font-size:20px}
.card p{color:#22c55e; font-size:18px; font-weight:bold}
.success{color:#22c55e}
.error{color:#ef4444}
</style>
</head>
<body>
<h1>🍔 اختبار الاتصال بالمنيو</h1>
<div id="status">جاري جلب الداتا من JSON Bin...</div>
<div id="menu" class="grid"></div>

<script>
const BIN_URL = 'https://api.jsonbin.io/v3/b/6a216fa6f5f4af5e29b7da9f/latest';

fetch(BIN_URL)
.then(r => {
  if(!r.ok) throw new Error('فشل التحميل: ' + r.status);
  return r.json();
})
.then(data => {
  const items = data.record;
  const status = document.getElementById('status');
  const menuDiv = document.getElementById('menu');
  
  status.innerHTML = '✅ <span class="success">نجح الاتصال! عدد المنتجات: ' + items.length + '</span>';
  menuDiv.innerHTML = '';
  
  items.forEach(item => {
    menuDiv.innerHTML += `
      <div class="card">
        <img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/100'">
        <h3>${item.name}</h3>
        <p>${item.price} $</p>
      </div>
    `;
  });
})
.catch(e => {
  document.getElementById('status').innerHTML = '❌ <span class="error">غلط: ' + e.message + '</span>';
  document.getElementById('menu').innerHTML = '<p style="text-align:center; grid-column:1/-1">تأكد ان الـ Bin معمول Public</p>';
});
</script>
</body>
</html>
