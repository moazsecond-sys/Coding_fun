<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن بالتراجم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #f8f9fa; --bg2: #e9f5eb;
  --card: white; --text: #222; --text2: #666;
  --green: #4ade80; --green-dark: #2d5a3d;
  --shadow: rgba(0,0,0,0.08);
}
body.dark {
  --bg1: #1a1a1a; --bg2: #2d2d2d;
  --card: #2a2a2a; --text: #e0e0e0; --text2: #aaa;
  --green: #22c55e; --green-dark: #16a34a;
  --shadow: rgba(0,0,0,0.3);
}
* { box-sizing: border-box; }
body {
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
  color: var(--text);
  padding: 20px;
  margin: 0;
  min-height: 100vh;
  transition: 0.3s;
}
body[dir="ltr"] { font-family: 'Poppins', sans-serif; }
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}
.top-bar select,.top-bar button {
  padding: 10px 15px;
  border: 2px solid var(--green);
  background: var(--card);
  color: var(--text);
  border-radius: 25px;
  font-family: inherit;
  cursor: pointer;
}
h1 {
  text-align: center;
  color: var(--green-dark);
  margin: 20px 0 10px;
  font-size: 32px;
}
.subtitle {
  text-align: center;
  color: var(--text2);
  margin-bottom: 25px;
}
.controls {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 20px auto;
  max-width: 850px;
}
.controls select {
  padding: 12px 18px;
  border: 2px solid var(--green);
  border-radius: 25px;
  font-family: inherit;
  font-size: 15px;
  background: var(--card);
  color: var(--text);
}
.add-btn {
  background: var(--green);
  color: white;
  border: none;
  padding: 14px 25px;
  border-radius: 25px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  display: block;
  margin: 20px auto;
  transition: 0.2s;
}
.add-btn:hover { transform: scale(1.05); }
.container {
  max-width: 750px;
  margin: 0 auto;
}
.post {
  background: var(--card);
  padding: 25px;
  border-radius: 18px;
  margin: 18px 0;
  box-shadow: 0 4px 12px var(--shadow);
  border-right: 4px solid var(--green);
}
.post h3 {
  margin: 0 0 12px;
  color: var(--green-dark);
  font-size: 20px;
}
.verse-arabic {
  font-size: 24px;
  line-height: 2.5;
  text-align: center;
  color: var(--green-dark);
  margin: 15px 0;
  font-weight: bold;
}
.translation-text {
  margin-top: 15px;
  color: var(--text2);
  line-height: 2;
  font-size: 17px;
  border-top: 1px dashed var(--green);
  padding-top: 15px;
}
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  background: #3b82f6;
  color: white;
  margin-top: 10px;
}
.loading {
  text-align: center;
  padding: 50px;
  font-size: 18px;
  color: var(--text2);
}
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.modal.active { display: flex; }
.modal-content {
  background: var(--card);
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 500px;
}
.modal-content input,.modal-content textarea,.modal-content select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: 2px solid var(--green);
  border-radius: 12px;
  font-family: inherit;
  background: var(--bg1);
  color: var(--text);
  font-size: 15px;
}
.modal-content textarea { min-height: 100px; resize: vertical; }
.modal-content label {
  color: var(--green-dark);
  font-weight: bold;
  font-size: 14px;
}
@media (max-width: 600px) {
  body { padding: 15px; }
  h1 { font-size: 24px; }
.post { padding: 18px; }
.verse-arabic { font-size: 20px; }
}
</style>
</head>
<body>
<div class="top-bar">
  <select id="langSelect">
    <option value="ar">🌍 العربية فقط</option>
    <option value="en">🇬🇧 English</option>
    <option value="es">🇪🇸 Español</option>
    <option value="pt">🇧🇷 Português</option>
    <option value="de">🇩🇪 Deutsch</option>
  </select>
  <button id="darkBtn">🌙 الوضع الداكن</button>
</div>

<h1>📖 القرآن الكريم بالتراجم</h1>
<p class="subtitle">آيات مرتبة + ترجمة المعاني</p>

<button class="add-btn" id="addBtn">➕ نشر آية جديدة</button>

<div class="controls">
  <select id="surahSelect">
    <option value="all">كل السور</option>
    ${Array.from({length:114}, (_,i) => `<option value="${i+1}">سورة ${i+1}</option>`).join('')}
  </select>
  <select id="perPage">
    <option value="10">10 آيات</option>
    <option value="20" selected>20 آية</option>
    <option value="50">50 آية</option>
  </select>
</div>

<div class="container" id="versesContainer"><div class="loading">جاري التحميل...</div></div>

<!-- مودال النشر -->
<div class="modal" id="addModal">
  <div class="modal-content">
    <h3 style="color:var(--green-dark); margin-top:0">نشر آية جديدة</h3>
    <label>رقم السورة</label>
    <select id="newSurah">
      ${Array.from({length:114}, (_,i) => `<option value="${i+1}">${i+1}</option>`).join('')}
    </select>
    <label>رقم الآية</label>
    <input type="number" id="newAyah" placeholder="مثال: 108">
    <label>النص العربي</label>
    <textarea id="newArabic" placeholder="الصق الآية هنا..."></textarea>
    <label>لغة الترجمة</label>
    <select id="newLang">
      <option value="en">English</option>
      <option value="es">Español</option>
      <option value="pt">Português</option>
      <option value="de">Deutsch</option>
    </select>
    <label>نص الترجمة</label>
    <textarea id="newTranslation" placeholder="الصق الترجمة هنا..."></textarea>
    <div style="display: flex; gap: 10px; margin-top:15px">
      <button class="add-btn" id="saveBtn" style="flex:1">✅ حفظ ونشر</button>
      <button class="btn" id="cancelBtn" style="flex:1; background:#ef4444">❌ إلغاء</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/+esm'

// ===== حط بياناتك هنا =====
const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo'; // غيرها بمفتاح anon
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== المتغيرات =====
let currentLang = localStorage.getItem('lang') || 'ar';
let currentPage = 1;

// ===== عرض الآيات - أهم تعديل هنا =====
async function loadVerses() {
  currentLang = document.getElementById('langSelect').value;
  const surah = document.getElementById('surahSelect').value;
  const perPage = parseInt(document.getElementById('perPage').value);
  const container = document.getElementById('versesContainer');

  container.innerHTML = `<div class="loading">جاري التحميل...</div>`;

  try {
    let query = sb
    .from('verses')
    .select(`id, surah, ayah, text, translations_verse_id_fkey(lang_code, text_translation)`)
    .order('surah')
    .order('ayah')
    .range((currentPage-1)*perPage, currentPage*perPage-1);

    if(surah!== 'all') query = query.eq('surah', surah);
    if(currentLang!== 'ar') query = query.eq('translations_verse_id_fkey.lang_code', currentLang);

    const {data, error} = await query;
    if(error) throw error;

    if(!data || data.length === 0) {
      container.innerHTML = `<div class="loading">لا توجد آيات</div>`;
      return;
    }

    container.innerHTML = data.map(v => {
      const trans = v.translations_verse_id_fkey?.[0]?.text_translation;
      return `
      <div class="post">
        <h3>سورة ${v.surah} - آية ${v.ayah}</h3>
        <p class="verse-arabic">${v.ayah}. ${v.text}</p>
        ${currentLang!== 'ar' && trans? `<p class="translation-text">${trans}</p>` : ''}
        <button class="btn" onclick="navigator.clipboard.writeText('${v.text}')">📋 نسخ العربية</button>
      </div>
    `}).join('');

  } catch(e) {
    container.innerHTML = `<div class="loading" style="color:red">خطأ: ${e.message}</div>`;
    console.error(e);
  }
}

// ===== النشر =====
function openModal() {
  document.getElementById('addModal').classList.add('active');
}

function closeModal() {
  document.getElementById('addModal').classList.remove('active');
  document.getElementById('newAyah').value = '';
  document.getElementById('newArabic').value = '';
  document.getElementById('newTranslation').value = '';
}

async function addVerse() {
  const surah = document.getElementById('newSurah').value;
  const ayah = document.getElementById('newAyah').value;
  const arabic = document.getElementById('newArabic').value.trim();
  const lang = document.getElementById('newLang').value;
  const trans = document.getElementById('newTranslation').value.trim();

  if(!ayah ||!arabic ||!trans) {
    alert('املأ كل الحقول يا بطل');
    return;
  }

  try {
    // 1. نشر الآية العربية الأول
    const { data: verseData, error: e1 } = await sb
    .from('verses')
    .insert([{ surah: parseInt(surah), ayah: parseInt(ayah), text: arabic }])
    .select()
    .single();

    if(e1) throw e1;

    // 2. نشر الترجمة وربطها بـ verse_id
    const { error: e2 } = await sb
    .from('translations')
    .insert([{ verse_id: verseData.id, lang_code: lang, text_translation: trans }]);

    if(e2) throw e2;

    alert('✅ تم النشر بنجاح!');
    closeModal();
    loadVerses();
  } catch(e) {
    alert('خطأ في النشر: ' + e.message);
    console.error(e);
  }
}

// ===== الأحداث =====
document.getElementById('darkBtn').onclick = () => document.body.classList.toggle('dark');
document.getElementById('langSelect').onchange = loadVerses;
document.getElementById('surahSelect').onchange = () => {currentPage=1; loadVerses();}
document.getElementById('perPage').onchange = () => {currentPage=1; loadVerses();}
document.getElementById('addBtn').onclick = openModal;
document.getElementById('cancelBtn').onclick = closeModal;
document.getElementById('saveBtn').onclick = addVerse;

// ===== التشغيل =====
loadVerses();
</script>
</body>
</html>
