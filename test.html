<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منيو المطعم - محمي</title>
<style>
    body {
        font-family: 'Tajawal', Arial, sans-serif;
        background: #f8f9fa;
        margin: 0;
        padding: 20px;
    }
    h1 {
        text-align: center;
        color: #333;
    }
    #status {
        text-align: center;
        padding: 10px;
        margin: 20px auto;
        max-width: 400px;
        border-radius: 8px;
        background: #fff3cd;
        color: #856404;
    }
    #menu {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        max-width: 1200px;
        margin: 0 auto;
    }
    .card {
        background: white;
        border-radius: 12px;
        padding: 15px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        text-align: center;
        transition: transform 0.2s;
    }
    .card:hover {
        transform: translateY(-5px);
    }
    .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 8px;
    }
    .card h3 {
        margin: 10px 0 5px;
        color: #222;
    }
    .card p {
        font-size: 18px;
        color: #e63946;
        font-weight: bold;
    }
</style>
</head>
<body>

<h1>🍔 منيو المطعم</h1>
<div id="status">⏳ جاري تحميل المنيو...</div>
<div id="menu"></div>

<script>
// 1. عنوان المنيو بتاعك - Bin ID
const BIN_URL = 'https://api.jsonbin.io/v3/b/6a216e6bf5f4af5e29b7d38b/latest';

// 2. هنا الصق الـ ACCESS KEY اللي عملته. اوعى تحط الماستر كي
const ACCESS_KEY = '$2a$10$KD79cZsun4/GlAqdOSxWGekbheQ1YEqApurMsQETJW0Q05kaGSd66';

fetch(BIN_URL, {
  headers: {
    'X-Access-Key': ACCESS_KEY
  }
})
.then(response => {
  if (!response.ok) {
    throw new Error('فشل التحميل - اتأكد من الكي');
  }
  return response.json();
})
.then(data => {
  const items = data.record;
  document.getElementById('status').innerHTML = '✅ المنيو محمي وآمن';
  document.getElementById('status').style.background = '#d4edda';
  document.getElementById('status').style.color = '#155724';
  
  const menuDiv = document.getElementById('menu');
  menuDiv.innerHTML = '';
  
  items.forEach(item => {
    menuDiv.innerHTML += `
      <div class="card">
        <img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/250x180?text=No+Image'">
        <h3>${item.name}</h3>
        <p>${item.price} $</p>
      </div>
    `;
  });
})
.catch(error => {
  document.getElementById('status').innerHTML = '❌ غلط: ' + error.message + '<br>اتأكد ان Access Key صحيح وله صلاحية Read';
  document.getElementById('status').style.background = '#f8d7da';
  document.getElementById('status').style.color = '#721c24';
});
</script>

</body>
</html>
