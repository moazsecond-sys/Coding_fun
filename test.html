<!DOCTYPE html>
<html>
<head>
  <!-- Tailwind يجيب الستايل جاهز -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">
  
  <!-- الصندوق اللي بنحط فيه المكعب -->
  <div id="canvas" class="w-80 h-80 rounded-2xl shadow-2xl shadow-purple-500/50"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
  
  <script type="module">
    import * as THREE from 'three';

    // 1. نجهز المشهد - Three.js
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
    
    renderer.setSize(320, 320);
    document.getElementById('canvas').appendChild(renderer.domElement);

    // 2. نسوي المكعب + نلونه
    const geometry = new THREE.BoxGeometry();
    const material = new THREE.MeshStandardMaterial({ color: 0x3b82f6 }); // أزرق Tailwind
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);
    
// نور عام يضيء كل شي
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); 
scene.add(ambientLight);

// نور ثاني من قدام عشان يبين التفاصيل
const frontLight = new THREE.DirectionalLight(0xffffff, 1);
frontLight.position.set(0, 0, 5);
scene.add(frontLight);

    camera.position.z = 5;

    // 4. نخليه يلف لحاله
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

const loader = new FontLoader();
loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function(font) {
  
  const textGeo = new TextGeometry('Hello 3D', {
    font: font,
    size: 0.3,
    height: 0.1,
  });
  
  const textMaterial = new THREE.MeshStandardMaterial({ color: 0xff69b4 }); // وردي
  const textMesh = new THREE.Mesh(textGeo, textMaterial);
  
  textMesh.position.set(-0.8, 1.5, 0); // فوق المكعب
  scene.add(textMesh);

  // نخلي النص يلف مع المكعب
  function animate() {
    requestAnimationFrame(animate);
    cube.rotation.x += 0.01;
    cube.rotation.y += 0.01;
    textMesh.rotation.y += 0.01; // النص يلف بعد
    renderer.render(scene, camera);
  }
  animate();
});
  </script>
</body>
</html>
