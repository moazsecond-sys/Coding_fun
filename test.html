<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختبار Supabase</title>
</head>
<body style="padding:40px; font-family:Tajawal">
<h2>اختبار الاتصال بـ Supabase</h2>
<div id="result">جاري الاختبار...</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/+esm'

const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';

const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
const result = document.getElementById('result');

async function test() {
  try {
    result.innerHTML += '<br>1. بحاول أجيب البوستات...';
    const { data, error } = await sb.from('posts').select('*').limit(5);
    
    if(error) {
      result.innerHTML += `<br>❌ خطأ: ${error.message}<br>الكود: ${error.code}`;
      return;
    }
    
    if(!data || data.length === 0) {
      result.innerHTML += '<br>⚠️ الجدول فاضي - مفيش بوستات';
      return;
    }
    
    result.innerHTML += `<br>✅ نجح! لقينا ${data.length} بوست`;
    result.innerHTML += '<br><br>أول بوست:<br>' + JSON.stringify(data[0], null, 2);
    
  } catch(e) {
    result.innerHTML += `<br>💥 خطأ فادح: ${e.message}`;
  }
}
test();
</script>
</body>
</html>
