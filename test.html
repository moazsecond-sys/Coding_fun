<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عداد الدوسات</title>
<style> 
body { background: black; color: white; text-align: center; font-size: 30px; margin-top: 100px; }
button { font-size: 25px; padding: 15px 30px; }
</style>
</head>
<body>

<p>عدد الدوسات: <span id="counter">0</span></p>
<button onclick="view_number()">دوس هنا</button>

<script>
  let count = 0; // المتغير اللي هيحفظ العدد

  function view_number() {
    count = count + 1; // كل دوسة زود 1
    document.getElementById('counter').textContent = count; // اكتب العدد الجديد في الصفحة
  }
</script>

</body>
</html>
