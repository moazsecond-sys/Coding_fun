<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كونسول Green Apple PRO 🔥</title>
<style>
  body { font-family: 'Tahoma', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
  h1 { text-align: center; color: #2c3e50; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 200px; }
  .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: 0.3s; }
  .card:hover { transform: translateY(-5px); }
  .card img { width: 100%; height: 200px; object-fit: cover; }
  .card h3 { padding: 10px; margin: 0; color: #333; }
  .card p { padding: 0 10px 10px; color: #666; font-size: 14px; }
  
  /* الكونسول الخارق */
  #debug { 
    position: fixed; bottom: 0; left: 0; right: 0; 
    background: #0a0a0a; color: #00ff00; 
    font-family: 'Courier New', monospace;
    font-size: 13px; 
    height: 200px; 
    border-top: 3px solid #00ff00;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    box-shadow: 0 -4px 20px rgba(0,255,0,0.3);
  }
  
  #resize-handle {
    height: 10px;
    background: linear-gradient(90deg, #00ff00, #00cc00);
    cursor: row-resize;
    flex-shrink: 0;
  }
  #resize-handle:hover {
    background: #00ff00;
  }
  
  #debug-header {
    background: #151515;
    padding: 6px 10px;
    border-bottom: 1px solid #00ff00;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    font-weight: bold;
  }
  
  #debug-header button {
    background: #00ff00;
    color: #000;
    border: none;
    padding: 4px 12px;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    margin-left: 5px;
    font-size: 12px;
  }
  #debug-header button:hover {
    background: #00cc00;
  }
  
  #debug-content {
    padding: 8px 10px;
    overflow-y: auto;
    flex-grow: 1;
    line-height: 1.6;
  }
  
  /* ألوان الرسائل */
  .log-info { color: #00ff00; }
  .log-warn { color: #ffaa00; }
  .log-error { color: #ff4444; font-weight: bold; }
  .log-success { color: #00ffaa; }
  
  #debug.hidden { height: 40px !important; }
  #debug.hidden #debug-content { display: none; }
</style>
</head>
<body>

<h1>🍏 معرض أعمال Green Apple - كونسول PRO</h1>
<div id="works-container" class="grid"></div>

<!-- الكونسول الخارق -->
<div id="debug">
  <div id="resize-handle"></div>
  <div id="debug-header">
    <span>>> DEBUG CONSOLE PRO v2.0 | كاشف الأخطاء</span>
    <div>
      <button onclick="clearLog()">🗑️ مسح</button>
      <button onclick="toggleDebug()">👁️ إخفاء</button>
      <button onclick="testError()">💥 اختبار خطأ</button>
    </div>
  </div>
  <div id="debug-content"><span class="log-info">>> بدء تشغيل الكونسول الخارق...</span><br></div>
</div>

<script>
// ========== نظام الكونسول الخارق ==========
const debugContent = document.getElementById('debug-content');

function log(msg, type = 'info') {
  const colors = {
    info: 'log-info',
    warn: 'log-warn', 
    error: 'log-error',
    success: 'log-success'
  };
  const icons = {
    info: 'ℹ️',
    warn: '⚠️',
    error: '❌',
    success: '✅'
  };
  const time = new Date().toLocaleTimeString('ar-EG');
  debugContent.innerHTML += `<span class="${colors[type]}">[${time}] ${icons[type]} ${msg}</span><br>`;
  debugContent.scrollTop = debugContent.scrollHeight;
}

// نمسك كل console.log ونحوله للكونسول بتاعنا
const oldLog = console.log;
console.log = function(...args) {
  oldLog(...args);
  log(args.join(' '), 'info');
};

const oldWarn = console.warn;
console.warn = function(...args) {
  oldWarn(...args);
  log(args.join(' '), 'warn');
};

const oldError = console.error;
console.error = function(...args) {
  oldError(...args);
  log(args.join(' '), 'error');
};

// نمسك الأخطاء اللي تحصل في أي مكان في الصفحة
window.onerror = function(message, source, lineno, colno, error) {
  log(`خطأ فادح: ${message} | السطر: ${lineno}`, 'error');
  return true; // عشان المتصفح ميوقفش
};

// نمسك الأخطاء بتاعت الـ Promise
window.addEventListener('unhandledrejection', function(event) {
  log(`خطأ Promise: ${event.reason}`, 'error');
});

// زرار المسح
function clearLog() {
  debugContent.innerHTML = '<span class="log-info">>> تم مسح السجل</span><br>';
}

// زرار الإخفاء
function toggleDebug() {
  const debug = document.getElementById('debug');
  debug.classList.toggle('hidden');
  log(debug.classList.contains('hidden') ? 'تم إخفاء الكونسول' : 'تم إظهار الكونسول', 'info');
}

// زرار اختبار الخطأ - عشان تتأكد إنه شغال
function testError() {
  log('جاري اختبار كشف الأخطاء...', 'warn');
  // ده هيعمل خطأ عمد عشان تشوف الكونسول بيمسكه
  undefinedFunction();
}

// كود السحب
const debug = document.getElementById('debug');
const handle = document.getElementById('resize-handle');
let isResizing = false;

handle.addEventListener('mousedown', () => isResizing = true);
document.addEventListener('mouseup', () => isResizing = false);
document.addEventListener('mousemove', (e) => {
  if(!isResizing) return;
  const newHeight = window.innerHeight - e.clientY;
  if(newHeight > 40 && newHeight < window.innerHeight - 100) {
    debug.style.height = newHeight + 'px';
  }
});

// ========== كود الموقع بتاعك ==========
log('تحميل الداتا...', 'info');

const works = [
  {
    id: 1,
    title: "لوجو Green Apple",
    image: "https://picsum.photos/300/200?random=1",
    category: "لوجوهات",
    desc: "تصميم براند كامل"
  },
  {
    id: 2,
    title: "موقع كوفي شوب",
    image: "https://picsum.photos/300/200?random=2", 
    category: "مواقع",
    desc: "موقع ريسبونسيف"
  },
  {
    id: 3,
    title: "بوستر إعلاني",
    image: "https://picsum.photos/300/200?random=3",
    category: "سوشيال",
    desc: "تصميم حملة إعلانية"
  }
];

log(`عدد العناصر في data.js: ${works.length}`, 'success');

try {
  const container = document.getElementById('works-container');
  
  if(!container) {
    throw new Error('مش لاقي div اسمه works-container!');
  }
  
  if(works.length === 0) {
    log('⚠️ تحذير: مفيش عناصر في works!', 'warn');
  } else {
    log('بدأ عرض الشغل...', 'info');
    
    works.forEach((work, index) => {
      log(`عرض العنصر رقم ${index + 1}: ${work.title}`, 'info');
      
      // لو الصورة بايظة هيطلع خطأ وهنمسكه
      container.innerHTML += `
        <div class="card">
          <img src="${work.image}" alt="${work.title}" onerror="log('الصورة بايظة: ${work.title}', 'error')">
          <h3>${work.title}</h3>
          <p>${work.desc}</p>
        </div>
      `;
    });
    
    log('تم عرض كل الشغل بنجاح!', 'success');
  }
} catch(e) {
  log(`خطأ في كود العرض: ${e.message}`, 'error');
}

log('انتهى تحميل الصفحة', 'success');
</script>

</body>
</html>
