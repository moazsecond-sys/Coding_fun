<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>صفحتي</title>
</head>
<body>
  <div id="card">اهلا وسهلا 📇</div>
  
  <!-- الزرار الجديد بتاعنا -->
<button id="زرار_الملاحظة">زرار الإضافة</button>
  
  <!-- كود الجافاسكربت هيجي هنا -->
  <script>
// 1. امسك الزرار من الصالة باسم الكرتونة
const الزرار = document.getElementById('زرار_الملاحظة');

// 2. افتح صندوق الزرار بالنقطة . وبرمجه
let منور = false;
الزرار.onclick = function(){
  if( منور == false) {
   الزرار.style.backgroundColor="green";
   الزرار.innerText="تم التلوين والكتابة🍏";
    document.body.style.backgroundColor="yellow-white";
   منور=true;}
else {
   الزرار.style.backgroundColor="gray";
   الزرار.innerText="وقت النوم";
  document.body.style.backgroundColor="blackdawn";
   منور = false;

}};
  </script>
</body>
</html>
