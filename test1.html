<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحة تجريبية Green Apple</title>
<style>
  body { font-family: 'Tahoma', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
  h1 { text-align: center; color: #2c3e50; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 180px; }
  .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .card img { width: 100%; height: 200px; object-fit: cover; }
  .card h3 { padding: 10px; margin: 0; color: #333; }
  .card p { padding: 0 10px 10px; color: #666; font-size: 14px; }
  
  /* شريط الـ Debug */
  #debug { 
    position: fixed; bottom: 0; left: 0; right: 0; 
    background: #1e1e1e; color: #00ff00; 
    padding: 10px; font-size: 12px; 
    max-height: 150px; overflow-y: auto; 
    border-top: 2px solid #00ff00;
    z-index: 9999;
  }
</style>
</head>
<body>

<h1>🍏 معرض أعمال Green Apple - تجريبي</h1>
<div id="works-container" class="grid"></div>

<!-- شريط الـ Debug هيظهر هنا -->
<div id="debug">>> بدء التشغيل...<br></div>

<script>
// 1. داتا تجريبية - دي مكان data.js مؤقتاً
const works = [
  {
    id: 1,
    title: "لوجو Green Apple",
    image: "https://via.placeholder.com/300x200/4CAF50/fff?text=Logo+1",
    category: "لوجوهات",
    desc: "تصميم براند كامل"
  },
  {
    id: 2,
    title: "موقع كوفي شوب",
    image: "https://via.placeholder.com/300x200/FF9800/fff?text=Website",
    category: "مواقع",
    desc: "موقع ريسبونسيف"
  },
  {
    id: 3,
    title: "بوستر إعلاني",
    image: "https://via.placeholder.com/300x200/2196F3/fff?text=Poster",
    category: "سوشيال",
    desc: "تصميم حملة إعلانية"
  }
];

// 2. دالة الطباعة في شريط الـ Debug
function log(msg) {
  const debug = document.getElementById('debug');
  debug.innerHTML += msg + '<br>';
  debug.scrollTop = debug.scrollHeight; // ينزل لتحت تلقائي
}

// 3. كود العرض
log("عدد العناصر في data.js: " + works.length);

const container = document.getElementById('works-container');

if(works.length === 0) {
  log("⚠️ تحذير: مفيش عناصر في works!");
  container.innerHTML = "<p style='text-align:center;'>مفيش شغل لسه</p>";
} else {
  log("✅ بدأ عرض الشغل...");
  
  works.forEach((work, index) => {
    log(`عرض العنصر رقم ${index + 1}: ${work.title}`);
    
    container.innerHTML += `
      <div class="card">
        <img src="${work.image}" alt="${work.title}">
        <h3>${work.title}</h3>
        <p>${work.desc}</p>
      </div>
    `;
  });
  
  log("✅ تم عرض كل الشغل بنجاح!");
}
</script>

</body>
</html>
