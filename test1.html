<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كونسول Green Apple 🔥</title>
<style>
  body { font-family: 'Tahoma', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
  h1 { text-align: center; color: #2c3e50; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 200px; }
  .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .card img { width: 100%; height: 200px; object-fit: cover; }
  .card h3 { padding: 10px; margin: 0; color: #333; }
  .card p { padding: 0 10px 10px; color: #666; font-size: 14px; }
  
  /* الكونسول الأسود النيون */
  #debug { 
    position: fixed; bottom: 0; left: 0; right: 0; 
    background: #0d0d0d; color: #00ff00; 
    font-family: 'Courier New', monospace;
    font-size: 13px; 
    height: 180px; 
    border-top: 3px solid #00ff00;
    z-index: 9999;
    display: flex;
    flex-direction: column;
  }
  
  /* المقبض اللي تشد منه */
  #resize-handle {
    height: 10px;
    background: #00ff00;
    cursor: row-resize;
    flex-shrink: 0;
  }
  #resize-handle:hover {
    background: #00cc00;
  }
  
  /* شريط الأزرار فوق */
  #debug-header {
    background: #1a1a1a;
    padding: 5px 10px;
    border-bottom: 1px solid #00ff00;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  
  #debug-header button {
    background: #00ff00;
    color: #000;
    border: none;
    padding: 4px 10px;
    border-radius: 4px;
    font-weight: bold;
    cursor: pointer;
    margin-left: 5px;
  }
  #debug-header button:hover {
    background: #00cc00;
  }
  
  /* مكان الكلام */
  #debug-content {
    padding: 8px 10px;
    overflow-y: auto;
    flex-grow: 1;
  }
  
  /* لما نخفيه */
  #debug.hidden {
    height: 35px !important;
  }
  #debug.hidden #debug-content {
    display: none;
  }
</style>
</head>
<body>

<h1>🍏 معرض أعمال Green Apple - كونسول</h1>
<div id="works-container" class="grid"></div>

<!-- الكونسول بتاعنا -->
<div id="debug">
  <div id="resize-handle"></div>
  <div id="debug-header">
    <span>>> DEBUG CONSOLE v1.0</span>
    <div>
      <button onclick="clearLog()">مسح</button>
      <button onclick="toggleDebug()">إخفاء</button>
    </div>
  </div>
  <div id="debug-content">>> بدء التشغيل...<br></div>
</div>

<script>
// الداتا التجريبية
const works = [
  {
    id: 1,
    title: "لوجو Green Apple",
    image: "https://picsum.photos/300/200?random=1",
    category: "لوجوهات",
    desc: "تصميم براند كامل"
  },
  {
    id: 2,
    title: "موقع كوفي شوب",
    image: "https://picsum.photos/300/200?random=2",
    category: "مواقع",
    desc: "موقع ريسبونسيف"
  },
  {
    id: 3,
    title: "بوستر إعلاني",
    image: "https://picsum.photos/300/200?random=3",
    category: "سوشيال",
    desc: "تصميم حملة إعلانية"
  }
];

// دالة الطباعة في الكونسول
function log(msg) {
  const content = document.getElementById('debug-content');
  content.innerHTML += msg + '<br>';
  content.scrollTop = content.scrollHeight;
}

// زرار المسح
function clearLog() {
  document.getElementById('debug-content').innerHTML = '>> تم مسح السجل<br>';
}

// زرار الإخفاء
function toggleDebug() {
  const debug = document.getElementById('debug');
  debug.classList.toggle('hidden');
}

// كود السحب والتكبير
const debug = document.getElementById('debug');
const handle = document.getElementById('resize-handle');
let isResizing = false;

handle.addEventListener('mousedown', () => isResizing = true);
document.addEventListener('mouseup', () => isResizing = false);
document.addEventListener('mousemove', (e) => {
  if(!isResizing) return;
  const newHeight = window.innerHeight - e.clientY;
  if(newHeight > 40 && newHeight < window.innerHeight - 100) {
    debug.style.height = newHeight + 'px';
  }
});

// كود العرض
log("عدد العناصر في data.js: " + works.length);

const container = document.getElementById('works-container');

if(works.length === 0) {
  log("⚠️ تحذير: مفيش عناصر في works!");
} else {
  log("✅ بدأ عرض الشغل...");
  
  works.forEach((work, index) => {
    log(`عرض العنصر رقم ${index + 1}: ${work.title}`);
    
    container.innerHTML += `
      <div class="card">
        <img src="${work.image}" alt="${work.title}">
        <h3>${work.title}</h3>
        <p>${work.desc}</p>
      </div>
    `;
  });
  
  log("✅ تم عرض كل الشغل بنجاح!");
}
</script>

</body>
</html>
