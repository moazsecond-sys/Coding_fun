<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>اختبار Supabase محلي</title>
  <script src="./supabase.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; background: #f0fdf4; }
    pre { background: #1e293b; color: #22c55e; padding: 15px; border-radius: 8px; overflow-x: auto; }
    h1 { color: #15803d; }
    .ok { color: green; font-weight: bold; }
    .no { color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>📡 اختبار Supabase محلي</h1>
  <div id="result">جاري الاختبار...</div>

  <script defer>
    window.addEventListener('load', () => {
      const res = document.getElementById('result');
      res.innerHTML = '<span class="ok">1. الصفحة حملت ✅</span><br>';
      
      if(typeof supabase === 'undefined') {
        res.innerHTML += '<span class="no">2. المكتبة محملتش ❌</span>';
        return;
      }
      res.innerHTML += '<span class="ok">2. المكتبة موجودة ✅</span><br>';

      const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');
      res.innerHTML += '<span class="ok">3. العميل اتعمل ✅</span><br>';

      sb.from('posts').select('*').limit(3).then(({data, error}) => {
        if(error) {
          res.innerHTML += `<span class="no">4. خطأ في الجلب: ${error.message}</span><br>`;
        } else {
          res.innerHTML += `<span class="ok">4. جلب الداتا نجح ✅ عدد الصفوف: ${data.length}</span><br>`;
          res.innerHTML += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
        }
      }).catch(e => {
        res.innerHTML += `<span class="no">4. خطأ فادح: ${e.message}</span>`;
      });
    });
  </script>
</body>
</html>
