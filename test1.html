<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>تجربة البوستات</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:tahoma;padding:20px;background:#f5f5f5}
.cat-btn{padding:10px 20px;margin:5px;border:none;border-radius:8px;cursor:pointer;background:#ddd}
.cat-btn.active{background:#007bff;color:#fff}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.badge{padding:4px 8px;border-radius:4px;font-size:12px;background:#eee}
</style>
</head>
<body>

<h2>اختبار بوستات posts</h2>
<input id="search" placeholder="ابحث في العنوان..." oninput="searchPosts()" style="width:100%;padding:8px;margin:10px 0">

<div>
  <button class="cat-btn active" data-cat="all">الكل</button>
  <button class="cat-btn" data-cat="آية">📖 آية</button>
  <button class="cat-btn" data-cat="حديث">📝 حديث</button>
  <button class="cat-btn" data-cat="دعاء">🤲 دعاء</button>
</div>

<div id="posts"></div>

<script>
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');

let currentCategory = 'all';
let allPosts = [];

const catNames = {
  'آية': 'آية',
  'حديث': 'حديث', 
  'دعاء': 'دعاء'
};

loadPosts();

// أزرار الأقسام
document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.onclick = () => {
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.dataset.cat;
    searchPosts();
  }
});

async function loadPosts(){
  // بنجيب من جدول posts وبنرتب بالأحدث
  const {data, error} = await sb.from('posts').select('id, title, content, category, notebook, views, created_at').order('id',{ascending:false});
  
  if(error){
    document.getElementById('posts').innerHTML = 'خطأ: ' + error.message;
    console.log(error);
    return;
  }
  
  allPosts = data || [];
  console.log('بيانات posts:', allPosts); 
  searchPosts();
}

function searchPosts(){
  const term = document.getElementById('search').value.toLowerCase();
  
  let filtered = allPosts;
  if(currentCategory !== 'all') {
    filtered = allPosts.filter(p => p.category === currentCategory);
  }
  
  if(term) {
    filtered = filtered.filter(p => 
      (p.title || '').toLowerCase().includes(term) || 
      (p.content || '').toLowerCase().includes(term)
    );
  }
  
  displayPosts(filtered);
}

function displayPosts(list){
  const container = document.getElementById('posts');
  
  if(!list.length) {
    container.innerHTML = '<p style="text-align:center;color:#666;padding:40px">لا توجد بوستات</p>';
    return;
  }

  container.innerHTML = list.map(p=>`
  <div class="card">
    <span class="badge">${catNames[p.category] || p.category}</span>
    <h3>${p.title}</h3>
    <p>${p.content || 'بدون محتوى'}</p>
    ${p.notebook ? `<p style="font-size:12px;color:#888">ملاحظة: ${p.notebook}</p>` : ''}
    <p style="font-size:12px;color:#999">المشاهدات: ${p.views || 0}</p>
  </div>
  `).join('');
}
</script>
  <h3 style="margin-top:40px">➕ ضيف بوست جديد للتجربة</h3>
<input id="newTitle" placeholder="العنوان" style="width:100%;padding:8px;margin:5px 0">
<textarea id="newContent" placeholder="المحتوى/الآية" style="width:100%;padding:8px;margin:5px 0;height:80px"></textarea>
<input id="newCategory" placeholder="القسم: آية / حديث / دعاء" value="آية" style="width:100%;padding:8px;margin:5px 0">
<button onclick="addPost()" style="padding:10px 20px;background:#28a745;color:#fff;border:none;border-radius:8px;cursor:pointer">إضافة</button>

<script>
async function addPost(){
  const title = document.getElementById('newTitle').value;
  const content = document.getElementById('newContent').value;
  const category = document.getElementById('newCategory').value;
  
  if(!title || !content){
    alert('اكتب عنوان ومحتوى يا معاذ 🫠');
    return;
  }

  const {error} = await sb.from('posts').insert([
    { title: title, content: content, category: category, views: 0}
  ]);

  if(error){
    alert('في خطأ: ' + error.message);
    console.log(error);
    return;
  }

  alert('تم الإضافة بنجاح ✅');
  document.getElementById('newTitle').value = '';
  document.getElementById('newContent').value = '';
  loadPosts(); // نعيد تحميل عشان يظهر الجديد
}
</script>
</body>
</html>
