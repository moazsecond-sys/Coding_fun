<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تمرين Insert Supabase</title>
  <style>
    body { font-family: Tahoma; padding: 20px; background: #f5f5f5; }
    h1 { text-align: center; }
    button { padding: 10px 20px; background: #3ecf8e; color: white; border: none; border-radius: 8px; cursor: pointer; }
    #النتيجة { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; }
    .item { border: 2px solid #ddd; padding: 10px; margin: 8px 0; border-radius: 5px; }
    .error { color: red; font-weight: bold; }
    .success { color: green; font-weight: bold; }
    
    /* استايل الفورم الجديد */
    .form { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
  </style>
</head>
<body>
  <h1>تمرين Insert + Select</h1>

  <!-- 1. فورم الإضافة الجديد -->
  <div class="form">
    <h3>ضيف صف جديد</h3>
    <input type="text" id="title" placeholder="اكتب العنوان هنا">
    <input type="text" id="content" placeholder="اكتب المحتوى هنا">
    <button onclick="ضيف_صف()">إضافة</button>
    <div id="رسالة"></div>
  </div>

  <!-- 2. زرار الجلب -->
  <button onclick="جيب_البيانات()">جيب البيانات</button>
  <div id="النتيجة">اضغط الزرار عشان نجيب البيانات...</div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    // مسار الربط 1
    const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co'  
    // مسار الربط 2  
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo'

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

    // دالة الجلب - زي ما هي
    async function جيب_البيانات() {
      const div = document.getElementById('النتيجة')
      div.innerHTML = 'جاري التحميل...'

      try {
        let { data, error } = await supabase
          .from('test') // مسار الربط
          .select('id, title, content, created_at') // مسار الربط

        if (error) throw error

        if(!data || data.length === 0) {
          div.innerHTML = 'الجدول فاضي، ضيف صفوف'
          return
        }

        div.innerHTML = data.map(item => `
          <div class="item">
            <b>ID:</b> ${item.id} <br>
            <b>Title:</b> ${item.title} <br>
            <b>Content:</b> ${item.content} <br>
            <b>Created:</b> ${item.created_at}
          </div>
        `).join('')

      } catch(err) {
        div.innerHTML = `<div class="error">❌ غلط: ${err.message}</div>`
      }
    }

    // 3. دالة الإضافة الجديدة - مسار الربط للـ insert
    async function ضيف_صف() {
      const title = document.getElementById('title').value
      const content = document.getElementById('content').value
      const رسالة = document.getElementById('رسالة')

      if(!title || !content) {
        رسالة.innerHTML = '<div class="error">اكتب العنوان والمحتوى</div>'
        return
      }

      try {
        // مسار الربط 4: insert في نفس الجدول
        const { data, error } = await supabase
          .from('test') // مسار الربط ← نفس اسم الجدول
          .insert([ // مسار الربط ← هنا بنبعت الداتا الجديدة
            { title: title, content: content }
          ])
          .select() // عشان يرجع الصف اللي ضفناه

        if (error) throw error

        رسالة.innerHTML = '<div class="success">✅ تمت الإضافة بنجاح</div>'
        document.getElementById('title').value = ''
        document.getElementById('content').value = ''
        
        // نجيب البيانات تاني عشان نشوف الصف الجديد
        جيب_البيانات()

      } catch(err) {
        رسالة.innerHTML = `<div class="error">❌ غلط في الإضافة: ${err.message}</div>`
        console.error(err)
      }
    }

    window.جيب_البيانات = جيب_البيانات
    window.ضيف_صف = ضيف_صف
  </script>
</body>
</html>
