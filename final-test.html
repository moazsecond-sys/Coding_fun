<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تجربة localStorage</title>
  <style>
    body { font-family: Tahoma; padding: 30px; text-align: center; }
    select { font-size: 18px; padding: 10px; }
    #result { margin-top: 30px; font-size: 20px; color: green; }
  </style>
</head>
<body>

  <h2>اختار لغة الترجمة</h2>
  
  <select id="verseLangFilter">
    <option value="ar">العربية</option>
    <option value="en">English</option>
    <option value="es">Español</option>
    <option value="de">Deutsch</option>
  </select>

  <div id="result">مستني اختيارك...</div>

<script>
  // دي الدالة الوهمية اللي هتجرب عليها
  function loadVerses() {
    let currentLang = document.getElementById('verseLangFilter').value;
    document.getElementById('result').innerText = 'اللغة المختارة حالاً: ' + currentLang;
    console.log('اشتغلت باللغة:', currentLang);
  }

  // الخطوة 1: لما تغير من القايمة → خزن في التلاجة ونادي الدالة
  document.getElementById('verseLangFilter').onchange = (e) => {
    localStorage.setItem('verseLang', e.target.value); // الزق الاختيار
    loadVerses(); // نادي الدالة
  }

  // الخطوة 2: أول ما الصفحة تفتح → اقرا من التلاجة وظبط القايمة
  window.onload = () => {
    let اللغة_المحفوظة = localStorage.getItem('verseLang') || 'ar'; // هات من التلاجة، لو فاضية خليها عربي
    document.getElementById('verseLangFilter').value = اللغة_المحفوظة; // ظبط القايمة
    loadVerses(); // اعرض النتيجة
  }
</script>

</body>
</html>
