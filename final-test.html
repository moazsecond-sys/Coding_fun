<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>اختبار نهائي</title>
<style>
body{font-family:Tahoma;padding:20px;background:#f5f5f5}
.post{background:white;padding:15px;margin:10px 0;border-radius:10px;border-right:4px solid #4ade80}
button{padding:8px 15px;margin:5px;border:none;border-radius:8px;cursor:pointer}
.add{background:#4ade80;color:white}
.edit{background:#f59e0b;color:white}
.del{background:#ef4444;color:white}
input,textarea,select{width:100%;padding:10px;margin:5px 0;border:2px solid #ddd;border-radius:8px}
</style>
</head>
<body>

<h2>اختبار Supabase النهائي</h2>
<button class="add" onclick="add()">➕ إضافة تجربة</button>
<div id="list">جاري التحميل...</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/+esm'

const URL = 'https://mirrxytqttjglglxrarq.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';
const sb = createClient(URL, KEY);

async function load() {
  const {data, error} = await sb.from('posts').select('*').order('id', {ascending:false}).limit(10);
  if(error) {
    document.getElementById('list').innerHTML = 'خطأ: ' + error.message;
    return;
  }
  document.getElementById('list').innerHTML = data.map(p => `
    <div class="post">
      <b>${p.id}</b> - ${p.title}<br>
      <small>${p.content.substring(0,50)}...</small><br>
      <button class="edit" onclick="edit(${p.id},'${p.title.replace(/'/g,"")}', '${p.content.replace(/'/g,"")}')">تعديل</button>
      <button class="del" onclick="del(${p.id})">حذف</button>
    </div>
  `).join('') || 'مفيش بيانات';
}

window.add = async function() {
  const t = prompt('العنوان:');
  const c = prompt('المحتوى:');
  if(!t||!c) return;
  const {error} = await sb.from('posts').insert([{title:t, content:c, category:'آية'}]);
  alert(error ? 'خطأ: '+error.message : 'تمت الإضافة ✅');
  load();
}

window.edit = async function(id, oldT, oldC) {
  const t = prompt('العنوان الجديد:', oldT);
  const c = prompt('المحتوى الجديد:', oldC);
  if(!t||!c) return;
  const {error} = await sb.from('posts').update({title:t, content:c}).eq('id', id);
  alert(error ? 'خطأ: '+error.message : 'تم التعديل ✅');
  load();
}

window.del = async function(id) {
  if(!confirm('حذف؟')) return;
  const {error} = await sb.from('posts').delete().eq('id', id);
  alert(error ? 'خطأ: '+error.message : 'تم الحذف ✅');
  load();
}

load();
</script>
</body>
</html>
