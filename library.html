<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Muath 3D - موقعي الأول</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; overflow-x: hidden; }
    canvas { display: block; }
  </style>
</head>
<body class="bg-slate-900 min-h-screen flex-col items-center justify-center p-4">

  <h1 class="text-3xl font-bold text-white mb-6">مرحباً بعالم الـ 3D 🚀</h1>
<a href="index.html" class="px-4 py-2 bg-slate-700 rounded-lg hover:bg-slate-600 text-slate-300 hover:text-white text-sm font-medium transition-all mb-4 inline-block">← رجوع للرئيسية</a>
  <div id="canvas-container" class="w-full max-w-lg h-80 bg-slate-800 rounded-2xl shadow-2xl shadow-purple-500/20"></div>

  <div class="flex gap-2 mt-4">
    <button onclick="window.cube.rotation.x += 0.2" class="px-3 py-1.5 text-sm bg-blue-500 hover:bg-blue-600 rounded-lg text-white transition">لف فوق</button>
    <button onclick="window.cube.rotation.y += 0.2" class="px-3 py-1.5 text-sm bg-purple-500 hover:bg-purple-600 rounded-lg text-white transition">لف يمين</button>
    <button onclick="window.cube.rotation.z += 0.2" class="px-3 py-1.5 text-sm bg-pink-500 hover:bg-pink-600 rounded-lg text-white transition">لف دوران</button>
    <button onclick="window.cube.scale.set(1.5,1.5,1.5)" class="px-3 py-1.5 text-sm bg-green-500 hover:bg-green-600 rounded-lg text-white transition">تكبير</button>
    <button onclick="window.cube.scale.set(1,1,1)" class="px-3 py-1.5 text-sm bg-red-500 hover:bg-red-600 rounded-lg text-white transition">تصغير</button>
  </div>

  <p class="text-slate-400 mt-6 text-sm">صنع بواسطة Muath + Three.js + Tailwind</p>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { FontLoader } from 'three/addons/loaders/FontLoader.js';
    import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1e293b);

    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 8;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    // مكعب أكبر 1.5 بدل 1
    const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
    const material = new THREE.MeshStandardMaterial({ color: 0x3b82f6, metalness: 0.5, roughness: 0.5 });
    window.cube = new THREE.Mesh(geometry, material);
    scene.add(window.cube);

    const loader = new FontLoader();
    loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function(font) {
      const textGeo = new TextGeometry('Muath 3D', {
        font: font,
        size: 0.4,
        height: 0.1,
      });
      
      textGeo.center(); // يخلي النص بالنص بالضبط
      
      const textMaterial = new THREE.MeshStandardMaterial({ color: 0x00ffff, metalness: 0.9, roughness: 0.2 });
      const textMesh = new THREE.Mesh(textGeo, textMaterial);
      textMesh.position.set(0, 2.2, 0); // فوق المكعب
      scene.add(textMesh);

      function animate() {
        requestAnimationFrame(animate);
        window.cube.rotation.x += 0.008; // لفة أهدأ وأفخم
        window.cube.rotation.y += 0.008;
        textMesh.rotation.y += 0.008;
        renderer.render(scene, camera);
      }
      animate();
    });

    // يخلي الموقع متجاوب
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });
  </script>
</body>
</html>
