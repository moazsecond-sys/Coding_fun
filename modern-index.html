<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">المحتوى الديني</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #f8f9fa; --bg2: #e9f5eb;
  --card: white; --text: #222; --text2: #666;
  --green: #4ade80; --green-dark: #2d5a3d;
  --shadow: rgba(0,0,0,0.08);
}
body.dark {
  --bg1: #1a1a1a; --bg2: #2d2d2d;
  --card: #2a2a2a; --text: #e0e0e0; --text2: #aaa;
  --green: #22c55e; --green-dark: #16a34a;
  --shadow: rgba(0,0,0,0.3);
}
* { box-sizing: border-box; }
body {
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
  color: var(--text);
  padding: 20px;
  margin: 0;
  min-height: 100vh;
  transition: 0.3s;
}
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}
.top-bar select,.top-bar button {
  padding: 10px 15px;
  border: 2px solid var(--green);
  background: var(--card);
  color: var(--text);
  border-radius: 25px;
  font-family: inherit;
  cursor: pointer;
}
h1 {
  text-align: center;
  color: var(--green-dark);
  margin: 20px 0 10px;
  font-size: 32px;
}
.subtitle {
  text-align: center;
  color: var(--text2);
  margin-bottom: 25px;
}
.controls {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 20px auto;
  max-width: 850px;
}
.controls input,.controls select {
  padding: 12px 18px;
  border: 2px solid var(--green);
  border-radius: 25px;
  font-family: inherit;
  font-size: 15px;
  background: var(--card);
  color: var(--text);
  outline: none;
}
.stats {
  text-align: center;
  color: var(--green-dark);
  font-weight: bold;
  margin: 15px 0;
  font-size: 16px;
}
.container {
  max-width: 750px;
  margin: 0 auto;
}
.post {
  background: var(--card);
  padding: 25px;
  border-radius: 18px;
  margin: 18px 0;
  box-shadow: 0 4px 12px var(--shadow);
  border-right: 4px solid var(--green);
}
.post h3 {
  margin: 0 0 12px;
  color: var(--green-dark);
  font-size: 20px;
}
.post p {
  line-height: 1.9;
  font-size: 17px;
  margin: 12px 0;
  white-space: pre-wrap;
  color: var(--text);
}
.category {
  color: var(--green);
  font-weight: bold;
  font-size: 14px;
  background: rgba(74, 222, 128, 0.15);
  padding: 4px 10px;
  border-radius: 12px;
}
.loading {
  text-align: center;
  padding: 50px;
  font-size: 18px;
  color: var(--text2);
}
.pagination {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 35px 0;
  flex-wrap: wrap;
}
.pagination button {
  padding: 10px 16px;
  border: 2px solid var(--green);
  background: var(--card);
  color: var(--text);
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
}
.pagination button.active {
  background: var(--green);
  color: white;
}
</style>
</head>
<body>

<div class="top-bar">
  <select onchange="changeLanguage(this.value)" id="langSelect">
    <option value="ar">🌍 العربية</option>
    <option value="en">🇬🇧 English</option>
  </select>
  <button onclick="toggleDark()">🌙 <span data-ar="وضع داكن" data-en="Dark Mode">وضع داكن</span></button>
</div>

<h1>📖 <span data-ar="المحتوى الديني" data-en="Islamic Content">المحتوى الديني</span></h1>
<p class="subtitle" data-ar="آيات، أحاديث، أدعية، وأسئلة" data-en="Verses, Hadith, Prayers & Questions">آيات، أحاديث، أدعية، وأسئلة</p>

<div class="controls">
  <input type="text" id="searchBox" placeholder="ابحث عن آية...">
  <select id="catFilter">
    <option value="all" data-ar="كل التصنيفات" data-en="All Categories">كل التصنيفات</option>
    <option value="آية">آية</option>
  </select>

  <!-- قايمة اللغة -->
  <select id="verseLangFilter">
    <option value="ar">العربية</option>
    <option value="en">English</option>
    <option value="es">Español</option>
    <option value="de">Deutsch</option>
    <option value="pt">Português</option>
  </select>

  <select id="perPage">
    <option value="20" selected>20 في الصفحة</option>
    <option value="50">50</option>
    <option value="100">100</option>
  </select>
</div>

<div class="stats" id="stats">جاري التحميل...</div>
<div class="container" id="posts"><div class="loading">جاري التحميل...</div></div>
<div class="pagination" id="pages"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/+esm'

const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo'; // حط المفتاح الـ anon public هنا
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let allVerses = [];
let filteredVerses = [];
let currentPage = 1;
let currentLang = localStorage.getItem('lang') || 'ar';
let verseLang = localStorage.getItem('verseLang') || 'ar';

const t = {
ar: {title:"المحتوى الديني",subtitle:"آيات، أحاديث، أدعية، وأسئلة",search:"ابحث عن آية...",all:"كل التصنيفات",loading:"جاري التحميل...",no:"لا يوجد نتائج",found:"آية",prev:"السابق",next:"التالي"},
en: {title:"Islamic Content",subtitle:"Verses, Hadith, Prayers & Questions",search:"Search verse...",all:"All Categories",loading:"Loading...",no:"No results",found:"verses",prev:"Previous",next:"Next"}
};

// الدالة اللي بتجيب الآيات + الترجمة المختارة
async function loadVerses() {
  try {
    document.getElementById('posts').innerHTML = `<div class="loading">جاري التحميل...</div>`;

    // اقرا اللغة من التلاجة وظبط القايمة
    verseLang = localStorage.getItem('verseLang') || 'ar';
    document.getElementById('verseLangFilter').value = verseLang;

    // هات الآيات مع الترجمة - استخدمت الأسماء الصح من صورك
    const {data, error} = await sb
    .from('verses')
    .select(`
        id, surah, ayah, text,
        translations_verse_id_fkey!inner(
          lang_code,
          text_translation
        )
      `)
    .eq('translations_verse_id_fkey.lang_code', verseLang)
    .order('surah', {ascending: true})
    .order('ayah', {ascending: true});

    if(error) throw error;
    allVerses = data || [];
    filterVerses();
    displayVerses();
    renderPagination();
    updateStats();
  } catch(e) {
    console.error('خطأ:', e);
    document.getElementById('posts').innerHTML = `<div class="loading" style="color:red">خطأ: ${e.message}</div>`;
  }
}

function filterVerses() {
  const search = document.getElementById('searchBox').value.toLowerCase().trim();
  const cat = document.getElementById('catFilter').value;

  if(cat!== 'آية' && cat!== 'all') {
    filteredVerses = [];
    return;
  }

  filteredVerses = allVerses.filter(v => {
    const text = v.translations_verse_id_fkey[0]?.text_translation || v.text;
    const matchSearch =!search || (text + v.surah + v.ayah).toLowerCase().includes(search);
    return matchSearch;
  });
}

function displayVerses() {
  const container = document.getElementById('posts');
  const perPage = parseInt(document.getElementById('perPage').value);
  const start = (currentPage - 1) * perPage;
  const versesToShow = filteredVerses.slice(start, start + perPage);

  if(versesToShow.length === 0) {
    container.innerHTML = `<div class="loading">${t[currentLang].no}</div>`;
    return;
  }

  container.innerHTML = versesToShow.map(v => {
    const translated = v.translations_verse_id_fkey[0]?.text_translation || v.text;
    return `
      <div class="post">
        <h3>سورة ${v.surah} - آية ${v.ayah} <span class="category">آية</span></h3>
        <p>${translated}</p>
        <small style="color:var(--text2)">الأصل: ${v.text}</small>
      </div>
    `;
  }).join('');
}

function renderPagination() {
  const perPage = parseInt(document.getElementById('perPage').value);
  const totalPages = Math.ceil(filteredVerses.length / perPage);
  const container = document.getElementById('pages');
  if(totalPages <= 1) {
    container.innerHTML = '';
    return;
  }

  let html = `<button onclick="goToPage(${currentPage-1})" ${currentPage===1?'disabled':''}>${t[currentLang].prev}</button>`;
  for(let i = 1; i <= totalPages; i++) {
    html += `<button class="${i===currentPage?'active':''}" onclick="goToPage(${i})">${i}</button>`;
  }
  html += `<button onclick="goToPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>${t[currentLang].next}</button>`;
  container.innerHTML = html;
}

function updateStats() {
  document.getElementById('stats').textContent = `${filteredVerses.length} ${t[currentLang].found}`;
}

window.goToPage = function(page) {
  const totalPages = Math.ceil(filteredVerses.length / parseInt(document.getElementById('perPage').value));
  if(page >= 1 && page <= totalPages) {
    currentPage = page;
    displayVerses();
    renderPagination();
    window.scrollTo({top: 0, behavior: 'smooth'});
  }
}

// الجرس بتاع قايمة اللغة + localStorage
document.getElementById('verseLangFilter').onchange = (e) => {
  localStorage.setItem('verseLang', e.target.value); // خزن على التلاجة
  currentPage = 1;
  loadVerses(); // هات الآيات باللغة الجديدة
}

document.getElementById('searchBox').onkeyup = () => { currentPage = 1; filterVerses(); displayVerses(); renderPagination(); updateStats(); };
document.getElementById('catFilter').onchange = () => { currentPage = 1; loadVerses(); };
document.getElementById('perPage').onchange = () => { currentPage = 1; displayVerses(); renderPagination(); };

window.changeLanguage = function(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.getElementById('htmlTag').dir = lang === 'ar'? 'rtl' : 'ltr';
  document.getElementById('htmlTag').lang = lang;
  document.getElementById('pageTitle').textContent = t[lang].title;
  document.querySelectorAll('[data-ar]').forEach(el => {
    el.textContent = el.getAttribute(`data-${lang}`);
  });
  document.getElementById('searchBox').placeholder = lang === 'ar'? "ابحث عن آية..." : "Search verse...";
  renderPagination();
  updateStats();
}

window.toggleDark = function() {
  document.body.classList.toggle('dark');
  localStorage.setItem('dark', document.body.classList.contains('dark'));
}

document.addEventListener('DOMContentLoaded', () => {
  if(localStorage.getItem('dark') === 'true') document.body.classList.add('dark');
  document.getElementById('langSelect').value = currentLang;
  changeLanguage(currentLang);
  loadVerses(); // نادي الدالة أول ما تفتح
});
</script>
</body>
</html>
