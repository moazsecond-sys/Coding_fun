<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول الادمن</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-family:tahoma;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:white;padding:40px;border-radius:20px;box-shadow:0 15px 50px rgba(0,0,0,0.3);width:90%;max-width:400px}
input{width:100%;padding:12px;margin:10px 0;border:2px solid #ddd;border-radius:8px;font-size:16px;box-sizing:border-box}
button{width:100%;background:#667eea;color:white;border:0;padding:14px;border-radius:8px;cursor:pointer;font-size:18px;font-weight:bold;margin-top:10px}
h2{text-align:center;color:#333}
</style>
</head>
<body>
<div class="box">
<h2>تسجيل دخول الادمن 👑</h2>
<input type="email" id="email" placeholder="الايميل" value="moazsecond@gmail.com">
<input type="password" id="password" placeholder="كلمة السر">
<button id="loginBtn">دخول</button>
</div>

<script>
const supabase = window.supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');

if (window.location.search.includes('logout=1')) {
  supabase.auth.signOut();
}

document.getElementById('loginBtn').addEventListener('click', async function() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = this;
  
  btn.innerText = 'جاري الدخول...';
  btn.disabled = true;
  
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  
  btn.innerText = 'دخول';
  btn.disabled = false;
  
  if (error) {
    alert('خطأ: ' + error.message);
    return;
  }
  
  if (data.user.email === 'moazsecond@gmail.com') {
    alert('تم! مرحبا يا معاذ ✅');
    window.location.href = 'home.html?v=' + Date.now();
  } else {
    alert('ممنوع! هذا اللوحة للادمن فقط');
    await supabase.auth.signOut();
  }
});
</script>
</body>
</html>
