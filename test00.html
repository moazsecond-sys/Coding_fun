<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<style>
  body { background: #ddd; padding: 40px; }
  
  .box {
    background: white; 
    border: 3px solid red; /* ده الحيط = BORDER */
    margin: 30px;          /* ده الهوا بره = MARGIN */
    padding: 30px;         /* ده السفنج جوه = PADDING */
    border-radius: 20px;   /* ده المقص = مدور الحروف */
    text-align: center;
  }
</style>
</head>
<body>

  <div class="box">
    انا الصندوق 📦
    <br> شايف السفنج الابيض حواليا؟ ده PADDING
    <br> وشايف المسافة الحمرا بره؟ ده MARGIN
  </div>

  <div class="box" style="border-radius: 0px;">
    انا صندوق مربع 🔲 
    <br> عشان border-radius = 0
  </div>

</body>
</html>
