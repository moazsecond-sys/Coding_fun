<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<style>
  body { background: gray; padding: 0; } /* خلفية الصفحة رمادي */
  
  .box {
    background: white;   /* ده لون PADDING */
    border:3px solid red; /* ده لون BORDER = الخط */
    margin: 300px;        /* ده لون MARGIN = هتشوفه رمادي */
    padding: 90px;       /* ده لون PADDING = هتشوفه ابيض */
    text-align: center;
  }
</style>
</head>
<body>

  <div class="box">
    📦 انا الصندوق
    <br> الابيض حواليا = PADDING 
    <br> الرمادي بره الاحمر = MARGIN
  </div>

</body>
</html>
