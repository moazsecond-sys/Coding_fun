<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>العداد</title> 
  <style> 
    body { background: #1e1e2f; display: flex; flex-direction: column; align-items: center; gap: 20px; padding-top: 50px; }
    #num { font-size: 60px; color: white; }
    #plus { font-size: 40px; padding: 12px 25px; border-radius: 16px; border: none; }
  </style>
</head>
<body> 

  <div id="num">0</div>
  <button id="plus">زد +</button>

  <script> 
    let count = 0; // 1. بدأنا من 0 

    const btn = document.getElementById("plus"); // 2. جبنا الزرار
    const numDiv = document.getElementById("num"); // 3. جبنا مكان الرقم

    btn.onclick = () => { // 4. لما ندوس
      
      count++; // 5. زود 1 
      if (count==10) {
        numDiv.textContent ="Win"
      btn.disabled= true;}
      else {
        
      numDiv.textContent = count;} // 6. حط الرقم الجديد في الـ div
   
    };
    
  </script>
</body>
</html>
