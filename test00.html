<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عداد الحمد لله</title>
  <style>
    body{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#1e1e2f;
      font-family:sans-serif;
      user-select:none; /* عشان متعلمش بالغلط وانت بتدوس */
    }
    .box{
      text-align:center;
      background:#2b2b40;
      padding:40px 30px;
      border-radius:30px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }
    #num{
      font-size:80px;
      font-weight:bold;
      color:#00ffaa;
      margin:10px 0 0 0;
    }
    #label{
      font-size:24px;
      color:#ccc;
      margin-bottom:20px;
    }
    button{
      width:100px;
      height:100px;
      font-size:50px;
      border:none;
      border-radius:50%;
      cursor:pointer;
      margin:10px;
      transition:0.1s;
    }
    button:active{transform:scale(0.85);}
    #plus{background:#2a9d8f; color:white;}
    #reset{background:#e63946; color:white; font-size:20px;}
  </style>
</head>
<body>
  <div class="box">
    <div id="num">0</div>
    <div id="label">الحمد لله 🌸</div>
    <button id="plus">+</button>
    <button id="reset">↺</button>
  </div>

  <script>
    // 1. نطلع الرقم من التلاجة بأمان
    let x = parseInt(localStorage.getItem("الحمد")) || 0; 
    
    const num = document.getElementById('num');
    const plus = document.getElementById('plus');
    const reset = document.getElementById('reset');

    num.textContent = x; // 2. نعرضه اول ما الصفحة تفتح

    // 3. دالة واحدة للتخزين عشان منكررش الكود
    function save() {
      try {
        localStorage.setItem("الحمد", x);
        console.log("✅ تم التخزين:", x); // شوف دي في F12
      } catch (e) {
        console.error("❌ التخزين فشل. افتح بـ Live Server", e);
      }
    }

    plus.onclick = () => {
      x++;
      num.textContent = x;
      save(); // خزن
    }

    reset.onclick = () => {
      x = 0;
      num.textContent = x;
      save(); // خزن الصفر
    }
  </script>
</body>
</html>
