<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    background: #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: sans-serif;
    touch-action: none;
  }
  canvas {
    border: 3px solid #4CAF50;
    background: #333;
    margin-bottom: 20px;
  }
  .controls {
    display: flex;
    gap: 30px;
  }
  button {
    width: 100px;
    height: 100px;
    font-size: 40px;
    border-radius: 20px;
    border: none;
    background: #4CAF50;
    color: white;
    touch-action: manipulation;
  }
  button:active {
    background: #2E7D32; /* لما تدوس الزرار يغمق */
  }
</style>
</head>
<body>

<canvas id="game" width="400" height="200"></canvas>

<div class="controls">
  <button id="left">←</button>
  <button id="right">→</button>
</div>

<script>
let canvas = document.getElementById('game');
let ctx = canvas.getContext('2d');

let x = 175;      // ابدأ من النص
let speed = 0;    // السرعة
let dir = 0;      // الاتجاه: -1 شمال، 1 يمين، 0 واقف

// 1. ازرار التحكم
let leftBtn = document.getElementById('left');
let rightBtn = document.getElementById('right');

// لما تدوس
leftBtn.addEventListener('touchstart', () => dir = -1);
rightBtn.addEventListener('touchstart', () => dir = 1);

// لما تشيل صابعك من أي زرار
leftBtn.addEventListener('touchend', () => dir = 0);
rightBtn.addEventListener('touchend', () => dir = 0);

// عشان لو دوست بالماوس من الكمبيوتر
leftBtn.addEventListener('mousedown', () => dir = -1);
rightBtn.addEventListener('mousedown', () => dir = 1);
leftBtn.addEventListener('mouseup', () => dir = 0);
rightBtn.addEventListener('mouseup', () => dir = 0);

// 2. حلقة اللعبة
function gameLoop() {
  // لو دايس يمين/شمال يبقى السرعة 5، لو مش دايس هدي بالتدريج ease-out
  if(dir !== 0) {
    speed = dir * 5;
  } else {
    speed = speed * 0.85; // يهدي براحة
  }
  
  x = x + speed;
  
  // متخليش المكعب يطلع برا
  if(x < 0) x = 0;
  if(x > 350) x = 350;
  
  // ارسم
  ctx.clearRect(0, 0, 400, 200);
  ctx.fillStyle = '#4CAF50';
  ctx.fillRect(x, 75, 50, 50);
  
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
