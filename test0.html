<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تجربة x-model السحرية</title>
  <script src="https://unpkg.com/alpinejs@3.x/dist/cdn.min.js" defer></script>
  <style>
    body {
      font-family: 'Tajawal', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
      min-width: 400px;
    }
    input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: 2px solid #ddd;
      border-radius: 10px;
      outline: none;
      transition: 0.3s;
    }
    input:focus {
      border-color: #4CAF50;
    }
    .result {
      margin-top: 30px;
      font-size: 22px;
      color: #333;
    }
    .result b {
      color: #4CAF50;
      font-size: 26px;
    }
  </style>
</head>
<body>

  <!-- 1. x-data = دماغ جوجل + الورقة searchText -->
  <div class="box" x-data="{ searchText: '' }">

    <h2>جرب السلك السحري x-model 🪄</h2>
    
    <!-- 2. x-model = السلك اللي رابط المربع بالورقة -->
    <input 
      type="text" 
      x-model="searchText" 
      placeholder="اكتب أي حاجة هنا...">

    <!-- 3. x-text = القلم اللي بيعرض اللي في الورقة -->
    <div class="result">
      انت كتبت حالاً: <b x-text="searchText"></b>
    </div>

    <!-- بونص: زرار يمسح الورقة من دماغ جوجل -->
    <button 
      @click="searchText = ''" 
      style="margin-top:20px; padding:10px 20px; border:none; background:#ff4444; color:white; border-radius:8px; cursor:pointer">
      امسح الكلام 🧽
    </button>

  </div>

</body>
</html>
