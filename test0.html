<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {margin:0;background:#87CEEB;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;touch-action:none}
  canvas {border:3px solid #333;background:#87CEEB;margin-bottom:20px}
  .controls {display:flex;gap:15px}
  button {width:90px;height:90px;font-size:35px;border-radius:20px;border:none;background:#FF5722;color:white}
  button:active {background:#D84315}
</style>
</head>
<body>

<canvas id="game" width="400" height="250"></canvas>

<div class="controls">
  <button id="left">←</button>
  <button id="jump">↑</button>
  <button id="right">→</button>
</div>

<script>
let canvas = document.getElementById('game');
let ctx = canvas.getContext('2d');

let x = 175, y = 180;      // مكان المكعب
let speedX = 0, speedY = 0; // سرعة افقية ورأسية
let dir = 0;               // -1 شمال، 1 يمين
let onGround = true;       // لامس الأرض ولا بيطير؟

// الزراير
document.getElementById('left').ontouchstart = () => dir = -1;
document.getElementById('right').ontouchstart = () => dir = 1;
document.getElementById('left').ontouchend = document.getElementById('right').ontouchend = () => dir = 0;

// القفز - أهم جزء
document.getElementById('jump').ontouchstart = () => {
  if(onGround) {           // مينفعش ينط وهو في الهوا
    speedY = -15;          // اديله دفعة لفوق
    onGround = false;
  }
};

function gameLoop() {
  // 1. حركة يمين شمال + ease-out
  if(dir !== 0) speedX = dir * 5;
  else speedX = speedX * 0.85;
  x = x + speedX;
  
  // 2. الجاذبية والقفز
  speedY = speedY + 0.8; // الجاذبية بتشده لتحت
  y = y + speedY;
  
  // 3. الأرض
  if(y > 180) {          // وصل للأرض
    y = 180;
    speedY = 0;
    onGround = true;     // يقدر ينط تاني
  }
  
  // حدود الشاشة
  if(x < 0) x = 0;
  if(x > 350) x = 350;
  
  // ارسم
  ctx.clearRect(0, 0, 400, 250);
  // أرض
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(0, 230, 400, 20);
  // مكعب ماريو
  ctx.fillStyle = '#FF5722';
  ctx.fillRect(x, y, 50, 50);
  
  requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
