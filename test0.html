<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>سمسار الألوان شغال</title>
  
  <!-- لينك Tailwind الثابت - ده اللي هيشغل الدهان -->
<link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  
  <!-- Alpine بدون defer عشان يصحى بسرعة -->
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen h-screen">

  <div x-data="{
    الالوان: ['bg-purple-900', 'bg-blue-900', 'bg-green-900', 'bg-red-900', 'bg-pink-900'],
    رقم_اللون: 0,
    غير_اللون() {
      this.رقم_اللون = (this.رقم_اللون + 1) % this.الوان.length
    }
  }" 
  :class="الوان[رقم_اللون]" class="flex flex-col items-center justify-center transition-all duration-500">
    
    <h1 class="text-5xl font-bold text-white mb-8">🎭 بيت السيرفرات الملون</h1>
    
    <p class="text-2xl text-white/80 mb-10">
      اللون الحالي: <span x-text="رقم_اللون + 1"></span> من 5
    </p>

    <button 
      @click="غير_اللون()"
      class="bg-white/20 hover:bg-white/30 text-white font-bold py-4 px-10 rounded-full text-xl backdrop-blur-lg border-2 border-white/50 transform hover:scale-110 transition">
      كبس هنا... غير اللون! 🌈
    </button>
    
  </div>

</body>
</html>
