<!DOCTYPE html>
<html>
<head>
<style>
  .box {
    width: 50px;
    height: 50px;
    background: #4CAF50;
    position: absolute;
    top: 50px;
  }
  
  .ease-in {
    animation: move 2s ease-in infinite alternate;
  }
  
  .ease-out {
    animation: move 2s ease-out infinite alternate;
    top: 150px;
    background: #FF5722;
  }

  @keyframes move {
    from { left: 0; }
    to { left: 300px; }
  }

  label {
    position: absolute;
    left: 0;
    font-family: sans-serif;
  }
</style>
</head>
<body>

<label style="top: 20px;">Ease In - يبدأ بطيء</label>
<div class="box ease-in"></div>

<label style="top: 120px;">Ease Out - يهدي في الآخر</label>
<div class="box ease-out"></div>

</body>
</html>
