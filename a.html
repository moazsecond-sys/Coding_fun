<!doctype html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<input id="e" placeholder="email">
<input id="p" type="password">
<button onclick="go()">Login</button>

<script>
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','sb_publishable_FXUmqRa_eAjdgWdZpFl-tA_YQM4FSnQ');

async function go(){
alert('C button clicked');
const email = document.getElementById('e').value;
const pass = document.getElementById('p').value;

alert('D trying login for: ' + email);

try {
const {data, error} = await sb.auth.signInWithPassword({email, password: pass});

if(error){
alert('E ERROR: ' + error.message);
return;
}

alert('F SUCCESS! Role: ' + data.user.app_metadata.role);

} catch(e){
alert('G CATCH ERROR: ' + e.message);
}
</script>
</body>
</html>
