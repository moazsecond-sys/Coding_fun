<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ارسم بصباعك</title>
  <style>
    *{margin:0; padding:0; box-sizing:border-box;}
    body{overflow:hidden; background:#1e1e2f; font-family:sans-serif;}
    canvas{display:block; touch-action:none; background:#fff;}
   .tools{
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:10px;
      background:#2b2b40;
      padding:10px 15px;
      border-radius:20px;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
    }
    button{
      width:50px; height:50px; border:none; border-radius:50%;
      font-size:22px; cursor:pointer; color:white;
    }
    #clear{background:#e63946;}
    #black{background:#000;}
    #green{background:#2a9d8f;}
    #pink{background:#ff70a6;}
  </style>
</head>
<body>
  <canvas id="board"></canvas>

  <div class="tools">
    <button id="black">●</button>
    <button id="green">●</button>
    <button id="pink">●</button>
    <button id="clear">↺</button>
  </div>

  <script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let drawing = false;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#000';

    function getPos(e){
      if(e.touches) return {x: e.touches[0].clientX, y: e.touches[0].clientY};
      return {x: e.clientX, y: e.clientY};
    }

    canvas.addEventListener('touchstart', e => {
      drawing = true;
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    });

    canvas.addEventListener('touchmove', e => {
      if(!drawing) return;
      const pos = getPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    });

    canvas.addEventListener('touchend', () => drawing = false);

    // الالوان والمسح
    document.getElementById('black').onclick = () => ctx.strokeStyle = '#000';
    document.getElementById('green').onclick = () => ctx.strokeStyle = '#2a9d8f';
    document.getElementById('pink').onclick = () => ctx.strokeStyle = '#ff70a6';
    document.getElementById('clear').onclick = () => ctx.clearRect(0,0,canvas.width,canvas.height);
  </script>
</body>
</html>
