<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تواصل معنا</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <h2>📧 تواصل معنا</h2>
  <div class="card">
    <input id="cName" placeholder="اسمك" style="width:100%;margin-bottom:10px">
    <input id="cEmail" placeholder="ايميلك" style="width:100%;margin-bottom:10px">
    <textarea id="cMsg" placeholder="رسالتك..." style="width:100%;height:120px;margin-bottom:10px"></textarea>
    <button class="btn" onclick="sendMsg()">إرسال</button>
    <p id="cResult" style="margin-top:10px"></p>
  </div>
  <a href="categories.html" class="btn btn-small" style="margin-top:15px">⬅️ رجوع</a>
</div>

<script type="module">
const sb = supabase.createClient('https://mirrxytqttjglxrarq.supabase.co', 'المفتاح_هنا');

window.sendMsg = async () => {
  const name = document.getElementById('cName').value;
  const email = document.getElementById('cEmail').value;
  const msg = document.getElementById('cMsg').value;
  if(!name || !email || !msg) return alert('اكمل كل الحقول');
  
  await sb.from('messages').insert({name, email, message: msg});
  document.getElementById('cResult').innerHTML = '✅ تم الإرسال بنجاح، بنرد عليك قريب';
  document.getElementById('cName').value = '';
  document.getElementById('cEmail').value = '';
  document.getElementById('cMsg').value = '';
}
</script>
</body>
</html>
