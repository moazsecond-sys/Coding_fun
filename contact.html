<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تواصل معنا | موقعي</title>
<meta name="description" content="تواصل معنا عبر الفورم أو واتساب أو تلجرام">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
  <h2>📧 تواصل معنا</h2>
  <p>عندك سؤال أو اقتراح؟ ارسل لنا</p>
  
  <div class="card">
    <input id="cName" placeholder="اسمك" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px">
    <input id="cEmail" type="email" placeholder="ايميلك" style="width:100%;padding:10px;margin-bottom:10px;border-radius:8px">
    <textarea id="cMsg" placeholder="اكتب رسالتك هنا..." style="width:100%;height:120px;padding:10px;margin-bottom:10px;border-radius:8px"></textarea>
    <button class="btn" onclick="sendMsg()" style="width:100%">إرسال الرسالة</button>
    <p id="cResult" style="margin-top:10px;text-align:center"></p>
  </div>

  <div class="card" style="margin-top:20px;text-align:center">
    <h3>طرق تواصل أخرى</h3>
    <a href="#" class="btn btn-small" style="background:#25D366">💬 واتساب</a>
    <a href="#" class="btn btn-small" style="background:#0088cc">✈️ تلجرام</a>
  </div>

  <a href="categories.html" class="btn btn-small" style="margin-top:15px">⬅️ رجوع للمشاريع</a>
</div>

<script type="module">
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');

window.sendMsg = async () => {
  const name = document.getElementById('cName').value.trim();
  const email = document.getElementById('cEmail').value.trim();
  const msg = document.getElementById('cMsg').value.trim();
  const result = document.getElementById('cResult');
  
  if(!name || !email || !msg) {
    result.innerHTML = '⚠️ عبي كل الحقول يا بطل';
    return;
  }
  
  result.innerHTML = 'جاري الإرسال...';
  const {error} = await sb.from('messages').insert({name, email, message: msg});
  
  if(error) {
    result.innerHTML = '❌ صار خطأ، جرب مرة ثانية';
  } else {
    result.innerHTML = '✅ تم الإرسال بنجاح! بنرد عليك قريب';
    document.getElementById('cName').value = '';
    document.getElementById('cEmail')..value = '';
    document.getElementById('cMsg').value = '';
  }
}
</script>
</body>
</html>
