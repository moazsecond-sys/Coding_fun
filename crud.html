<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>اختبار</title>
  <style>
    body { font-family: Tahoma; padding: 50px; text-align: center; }
    button { padding: 15px 30px; font-size: 18px; background: #5865F2; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .success { color: green; font-size: 20px; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>اختبار الأزرار</h1>
  <button onclick="جرب()">دوس هنا</button>
  <div id="نتيجة"></div>

  <script>
    alert('الملف اتحمل بنجاح ✅') // لو دي مظهرتش يبقى الملف بايظ
    
    function جرب() {
      document.getElementById('نتيجة').innerHTML = '<div class="success">الأزرار شغالة 100% 🎉</div>'
    }
  </script>
</body>
</html>
