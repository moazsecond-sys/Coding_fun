<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUD مع رفع صور</title>
<style>
  body{font-family:Tahoma;background:#f5f5f5;padding:20px;max-width:800px;margin:auto}
  h2{color:#5865F2}
  input,button,textarea{padding:10px;margin:5px;border-radius:5px;border:1px solid #ddd;width:100%;box-sizing:border-box}
  button{background:#5865F2;color:white;border:none;cursor:pointer}
  button:hover{background:#4752c4}
  button.danger{background:#e74c3c;width:auto}
  button.edit{background:#2ecc71;width:auto}
 .card{background:white;padding:15px;margin:10px 0;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
 .msg{padding:10px;margin:10px 0;border-radius:5px;display:none}
 .success{background:#d4edda;color:#155724}
 .error{background:#f8d7da;color:#721c24}
  #logout{float:left;background:#95a5a6;width:auto}
 .hidden{display:none}
 .btn-group button{width:auto;margin-left:5px}
  img{max-width:150px;border-radius:8px;margin-top:8px}
 .upload-label{font-size:14px;color:#666}
</style>
</head>
<body>

<!-- تسجيل الدخول -->
<div id="loginPage" class="card">
  <h2>تسجيل الدخول</h2>
  <input id="email" type="email" placeholder="الإيميل">
  <input id="pass" type="password" placeholder="الباسورد">
  <div class="btn-group">
    <button onclick="تسجيل_جديد()">تسجيل جديد</button>
    <button onclick="تسجيل_دخول()">دخول</button>
  </div>
  <div id="msgLogin" class="msg"></div>
</div>

<!-- CRUD -->
<div id="crudPage" class="hidden">
  <button id="logout" onclick="تسجيل_خروج()">تسجيل خروج</button>
  <h2>إدارة المحتوى</h2>
  <div id="msgCrud" class="msg"></div>

  <div class="card">
    <h3>إضافة منشور جديد</h3>
    <input id="title" placeholder="العنوان title">
    <textarea id="content" placeholder="المحتوى content"></textarea>
    <label class="upload-label">اختر صورة:</label>
    <input id="imageFile" type="file" accept="image/*">
    <button onclick="اضافة()">➕ إضافة + رفع صورة</button>
  </div>

  <h3>المنشورات</h3>
  <div id="القائمة">جاري التحميل...</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo'
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

const loginPage = document.getElementById('loginPage')
const crudPage = document.getElementById('crudPage')
const msgLogin = document.getElementById('msgLogin')
const msgCrud = document.getElementById('msgCrud')

function رسالة(العنصر, النص, نوع='success'){
  العنصر.className = 'msg ' + نوع
  العنصر.innerHTML = النص
  العنصر.style.display = 'block'
  setTimeout(()=>العنصر.style.display='none', 3000)
}

supabase.auth.getSession().then(({data:{session}}) => {
  if(session) اعرضCRUD()
})

// تسجيل جديد
window.تسجيل_جديد = async () => {
  const email = document.getElementById('email').value
  const password = document.getElementById('pass').value
  if(!email ||!password){ رسالة(msgLogin,'اكتب الإيميل والباسورد','error'); return }
  let { error } = await supabase.auth.signUp({email, password})
  if(error) رسالة(msgLogin,'❌ '+error.message,'error')
  else رسالة(msgLogin,'✅ تم التسجيل')
}

// تسجيل دخول مع إظهار الخطأ
window.تسجيل_دخول = async () => {
  const email = document.getElementById('email').value
  const password = document.getElementById('pass').value
  
  if(!email || !password){ 
    رسالة(msgLogin,'اكتب الإيميل والباسورد','error'); 
    return 
  }
  
  // سطر التشخيص
  رسالة(msgLogin,'جاري المحاولة...', 'success')
  
  let { data, error } = await supabase.auth.signInWithPassword({email, password})
  
  if(error){
    // هنا هنطبع الخطأ كامل عشان نعرف المشكلة
    رسالة(msgLogin, '❌ الخطأ: ' + error.message + ' <br> الكود: ' + error.code, 'error')
    alert('تفاصيل الخطأ: ' + error.message) // هيطلعلك تنبيه منبثق
  }
  else {
    رسالة(msgLogin,'✅ تم الدخول بنجاح', 'success')
    setTimeout(اعرضCRUD, 1000)
  }
}

// تسجيل خروج
window.تسجيل_خروج = async () => {
  await supabase.auth.signOut()
  crudPage.classList.add('hidden')
  loginPage.classList.remove('hidden')
  document.getElementById('email').value = ''
  document.getElementById('pass').value = ''
}

async function اعرضCRUD(){
  loginPage.classList.add('hidden')
  crudPage.classList.remove('hidden')
  عرض()
}

// رفع الصورة للـ bucket images
async function رفع_صورة(file){
  const fileExt = file.name.split('.').pop()
  const fileName = Date.now() + '.' + fileExt
  const filePath = `uploads/${fileName}`

  let { error: uploadError } = await supabase.storage
   .from('images')
   .upload(filePath, file)

  if(uploadError) throw uploadError

  const { data } = supabase.storage.from('images').getPublicUrl(filePath)
  return data.publicUrl
}

// عرض من جدول test
async function عرض(){
  let { data, error } = await supabase.from('test').select('*').order('id', {ascending:false})
  if(error){ رسالة(msgCrud,'خطأ: '+error.message,'error'); return }

  if(data.length==0){
    document.getElementById('القائمة').innerHTML = '<div class="card">لا يوجد منشورات بعد</div>'
    return
  }

  document.getElementById('القائمة').innerHTML = data.map(p => `
    <div class="card">
      <h4>${p.title || 'بدون عنوان'}</h4>
      <p>${p.content || ''}</p>
      ${p.image_url? `<img src="${p.image_url}">` : ''}
      <br>
      <button class="edit" onclick="تعديل(${p.id}, '${p.title}', '${p.content}')">✏️ تعديل</button>
      <button class="danger" onclick="حذف(${p.id})">🗑️ حذف</button>
    </div>
  `).join('')
}

// إضافة + رفع صورة
window.اضافة = async () => {
  const title = document.getElementById('title').value
  const content = document.getElementById('content').value
  const fileInput = document.getElementById('imageFile')
  const file = fileInput.files[0]

  if(!title ||!content){ رسالة(msgCrud,'اكتب العنوان والمحتوى','error'); return }

  رسالة(msgCrud,'جاري الرفع...', 'success')

  let image_url = null
  if(file){
    try{
      image_url = await رفع_صورة(file)
    }catch(e){
      رسالة(msgCrud,'خطأ رفع الصورة: '+e.message, 'error')
      return
    }
  }

  const { data: { user } = await supabase.auth.getUser()

  let { error } = await supabase.from('test').insert([{
    title,
    content,
    image_url,
    user_id: user.id
  }])
  if(error){ رسالة(msgCrud,'خطأ: '+error.message,'error'); return }

  رسالة(msgCrud,'✅ تمت الإضافة ورفع الصورة')
  document.getElementById('title').value = ''
  document.getElementById('content').value = ''
  document.getElementById('imageFile').value = ''
  عرض()
}

// تعديل
window.تعديل = async (id, title_قديم, content_قديم) => {
  const title = prompt('العنوان الجديد:', title_قديم)
  const content = prompt('المحتوى الجديد:', content_قديم)
  if(!title ||!content) return

  let { error } = await supabase.from('test').update({title, content}).eq('id', id)
  if(error){ رسالة(msgCrud,'خطأ: '+error.message,'error'); return }

  رسالة(msgCrud,'✅ تم التعديل')
  عرض()
}

// حذف
window.حذف = async (id) => {
  if(!confirm('متأكد عايز تحذف؟')) return
  let { error } = await supabase.from('test').delete().eq('id', id)
  if(error){ رسالة(msgCrud,'خطأ: '+error.message,'error'); return }
  رسالة(msgCrud,'✅ تم الحذف')
  عرض()
}
</script>
</body>
</html>
