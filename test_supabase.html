<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختبار Supabase</title>
<style>
body { font-family: 'Tajawal', sans-serif; text-align:center; padding:50px }
#works-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:20px; margin-top:30px }
.work-card img { width:100%; border-radius:10px }
</style>
</head>
<body>

<h1>معرض الاختبار ✨</h1>
<div id="works-grid">جاري التحميل...</div>

<!-- 1. مكتبة Supabase أول شي -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
alert("1. الجافاسكربت بدأ")

const SUPABASE_URL = 'https://zxvradngllvfxxmhikba.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4dnJhZG5nbGx2Znh4bWhpa2JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc5MDM5MzgsImV4cCI6MjA3MzQ3OTkzOH0.0TLIPksFq4EzyPX1eFI_qyN60aZpYw1_C9ad15UmfwY'

alert("2. المفاتيح جاهزة")

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
alert("3. Supabase اتصل!")

async function تحميل_الصور() {
  alert("4. بدأ جلب الصور من Storage")
  
  const { data, error } = await supabase.storage.from('aamal-images').list('صور', { limit: 10 })
  
  const grid = document.getElementById('works-grid')
  
  if (error) {
    alert("خطأ Supabase: " + error.message)
    grid.innerHTML = "خطأ: " + error.message
    return
  }
  
  alert("5. جلبت " + data.length + " صورة")
  
  if (data.length === 0) {
    grid.innerHTML = "لا توجد صور في مجلد 'صور' داخل البكت aamal-images"
    return
  }
  
  grid.innerHTML = ''
  data.forEach(file => {
    const url = supabase.storage.from('aamal-images').getPublicUrl('صور/' + file.name).data.publicUrl
    grid.innerHTML += `<div class="work-card"><img src="${url}"><p>${file.name}</p></div>`
  })
}

تحميل_الصور()
</script>
</body>
</html>
