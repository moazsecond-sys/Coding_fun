<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختبار Supabase</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { background:#0b1020; color:#fff; text-align:center; padding:20px; font-family:sans-serif }
h1 { color:#2dd4bf }
#box { margin-top:30px; padding:20px; background:#1a2238; border-radius:12px }
</style>
</head>
<body>

<h1>✨ اختبار جلب الصور</h1>
<div id="box">1. الجافاسكربت شغال...</div>

<script>
// رابط Supabase الرسمي - يشتغل على كل الجوالات
import('https://cdn.skypack.dev/@supabase/supabase-js@2').then(({ createClient }) => {
  
  document.getElementById('box').innerHTML += "<br>2. مكتبة Supabase حملت ✅"
  
  const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co'
  const SUPABASE_ANON_KEY = 'sb_publishable_kuXmAppdiHaZ1OKlWsHbBg_QUebJHdu'
  
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  document.getElementById('box').innerHTML += "<br>3. اتصلنا بـ Supabase ✅"
  
  supabase.storage.from('aamal-images').list('صور', { limit: 5 }).then(({ data, error }) => {
    if (error) {
      document.getElementById('box').innerHTML += `<br><br><b style="color:red">4. خطأ: ${error.message}</b>`
      return
    }
    document.getElementById('box').innerHTML += `<br>4. نجح! لقيت ${data.length} صورة 🎉`
    
    data.forEach(f => {
      const url = supabase.storage.from('aamal-images').getPublicUrl('صور/' + f.name).data.publicUrl
      document.getElementById('box').innerHTML += `<br><img src="${url}" style="width:100px; margin:5px">`
    })
  })
  
}).catch(e => {
  document.getElementById('box').innerHTML = "فشل تحميل مكتبة Supabase: " + e.message
})
</script>

</body>
</html>
