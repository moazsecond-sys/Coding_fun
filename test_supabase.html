<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختبار Supabase</title>
<style>
body{font-family:tahoma;padding:20px;background:#f5f5f5}
.box{background:white;padding:20px;border-radius:10px;margin-bottom:15px}
.ok{color:green;font-weight:bold}
.no{color:red;font-weight:bold}
img{max-width:200px;margin:5px;border:2px solid #ddd;border-radius:8px}
#log{white-space:pre-wrap;font-size:13px;background:#222;color:#0f0;padding:10px;border-radius:5px}
</style>
</head>
<body>
<h2>🧪 اختبار اتصال Supabase</h2>

<div class="box">
<h3>1. حالة الاتصال</h3>
<div id="status">جاري الفحص...</div>
</div>

<div class="box">
<h3>2. الصور الموجودة في المجلد</h3>
<div id="images">جاري التحميل...</div>
</div>

<div class="box">
<h3>3. سجل العمليات</h3>
<div id="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kuXmAppdiHaZ1OKlWsHbBg_QUebJHdu';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const log = (msg) => {
  document.getElementById('log').innerText += msg + '\n';
  console.log(msg);
}

async function test() {
  try {
    // 1. فحص الاتصال
    const { data, error } = await supabase.from('users').select('count').limit(1);
    if(error && error.code != 'PGRST116') throw error;
    document.getElementById('status').innerHTML = '<span class="ok">✅ الاتصال ناجح</span>';
    log('✅ الاتصال بـ Supabase ناجح');

    // 2. جلب الصور من مجلد images
    log('🔍 جاري البحث في مجلد images...');
    const { data: files, error: err2 } = await supabase.storage
      .from('aamal-images')
      .list('images', { limit: 20 });
    
    if(err2) throw err2;
    
    if(!files || files.length == 0) {
      document.getElementById('images').innerHTML = '<span class="no">❌ ما لقيت صور في مجلد images</span>';
      log('❌ المجلد فاضي. ارفع صورة test.jpg داخل images');
      return;
    }
    
    document.getElementById('images').innerHTML = `<span class="ok">✅ نجح! لقيت ${files.length} صورة</span><br><br>`;
    log(`✅ لقيت ${files.length} ملف`);
    
    files.forEach(file => {
      if(file.name && !file.name.endsWith('/')) {
        const { data: urlData } = supabase.storage
          .from('aamal-images')
          .getPublicUrl('images/' + file.name);
        
        document.getElementById('images').innerHTML += 
          `<img src="${urlData.publicUrl}" alt="${file.name}"><br>${file.name}<br><br>`;
        log(`صورة: ${file.name} → ${urlData.publicUrl}`);
      }
    });

  } catch(e) {
    document.getElementById('status').innerHTML = `<span class="no">❌ خطأ: ${e.message}</span>`;
    log('❌ خطأ: ' + e.message);
  }
}

test();
</script>
</body>
</html>
