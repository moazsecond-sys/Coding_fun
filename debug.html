<!DOCTYPE html>

  <title>فحص اتصال Supabase</title>
  <style>
    body { font-family: Tahoma; padding: 20px; background: #f5f5f5; }
    #grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px; 
      margin-top: 20px;
    }
    .item { 
      background: white; 
      padding: 10px; 
      border-radius: 8px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }
    .item img { 
      width: 100%; 
      height: 150px; 
      object-fit: cover; 
      border-radius: 5px;
    }
    #status { 
      background: #e3f2fd; 
      padding: 10px; 
      border-radius: 5px; 
      margin-bottom: 10px;
    }
  </style>
</head>
