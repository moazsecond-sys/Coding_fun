<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>أعمالي - تجربة</title>
  <style>
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .work-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }
    .work-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .work-card h3 {
      padding: 10px;
      margin: 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h2 style="text-align:center">معرض الأعمال</h2>
  <div id="grid"></div>
  <div id="empty" style="display:none; text-align:center; padding:40px">لا توجد أعمال حالياً</div>

  <!-- الترتيب مهم جداً -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
