  if(data && data.length > 0) {
    // 2. نطلع رابط أول صورة
    const firstFile = data[0].name
    const { data: urlData } = supabase.storage.from('aamal-images').getPublicUrl(`images/${firstFile}`)
    console.log('رابط الصورة:', urlData.publicUrl)

    // 3. نعرضها مباشر
    document.body.innerHTML += `<img src="${urlData.publicUrl}" style="width:200px;border:3px solid red">`
  }
}
test()
