<!DOCTYPE html>
<html>
<head>
  <title>فحص Supabase</title>
  <style>
    body { font-family: sans-serif; padding: 20px; direction: rtl; }
    pre { background: #f4f4f4; padding: 10px; border-radius: 5px; overflow-x: auto; }
    .error { color: red; font-weight: bold; }
    .success { color: green; font-weight: bold; }
  </style>
</head>
<body>
  <h3>🔍 فحص الاتصال بـ Supabase</h3>
  <div id="log">جاري التحميل...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // حط بياناتك هنا
    const SUPABASE_URL = "https://mirrxytqttjglglxrarq.supabase.co"
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo"

    const log = document.getElementById('log');
    
    function addLog(text, type = '') {
      log.innerHTML += `<pre class="${type}">${text}</pre>`;
    }

    addLog('1. بدأ الاختبار...');
    addLog('URL: ' + SUPABASE_URL);

    try {
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      addLog('2. تم إنشاء العميل بنجاح ✅', 'success');

      supabase.storage.from('aamal-images').list()
        .then(({ data, error }) => {
          if (error) {
            addLog('3. ❌ خطأ من Supabase: ' + error.message, 'error');
            addLog('تفاصيل: ' + JSON.stringify(error));
          } else {
            addLog('3. ✅ نجح! المجلدات الموجودة:', 'success');
            addLog(JSON.stringify(data, null, 2));
          }
        })
        .catch(err => {
          addLog('3. ❌ خطأ فادح: ' + err.message, 'error');
        });

    } catch (e) {
      addLog('2. ❌ خطأ في إنشاء العميل: ' + e.message, 'error');
    }
  </script>
</body>
</html>
