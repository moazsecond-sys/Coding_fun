<!DOCTYPE html>
<html lang='ar' dir='rtl'>
<head>
<meta charset='UTF-8'>
<title>تشريح المشكلة</title>
<script src='https://unpkg.com/@supabase/supabase-js@2'></script>
<style>
body{background:#000;color:#0f0;font-family:monospace;padding:20px;font-size:16px}
div{border:1px solid #0f0;margin:5px;padding:10px;border-radius:5px}
.red{color:red;border-color:red}
.green{color:#0f0}
</style>
</head>
<body>
<h2>🔬 تشريح كود أعمالي</h2>
<div id='s1'>1. بدأ...</div>
<div id='s2'></div>
<div id='s3'></div>
<div id='s4'></div>
<div id='s5'></div>
<div id='out'></div>

<script>
function write(id,msg){document.getElementById(id).innerHTML=msg}

write('s2','2. سكربت Supabase محمل: '+typeof window.supabase)

try{
  const supabaseUrl = 'https://mirrxytqttjglglxrarq.supabase.co'
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo'
  write('s3','3. المفتاح والرابط جاهزين')
  
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)
  write('s4','4. تم انشاء client')
  
  write('s5','5. برسل طلب لـ works...')
  
  supabase.from('works').select('*').then(res=>{
    if(res.error){
      write('out','<div class=red>خطأ Supabase: '+res.error.message+'</div>')
      return
    }
    write('out','<div class=green>6. جات البيانات عدد='+res.data.length+'</div>')
    write('out','<div class=green>7. برسم الكروت...</div>')
    
    try{
      const html = res.data.map(w=>`<div style="border:1px solid #0f0;margin:10px;padding:10px">${w.title}</div>`).join('')
      document.getElementById('out').innerHTML += html
      write('out','<div class=green>8. تم الرسم بنجاح!</div>')
    }catch(e){
      write('out','<div class=red>خطأ في الرسم: '+e.message+'</div>')
    }
  })
  
}catch(e){
  write('s5','<div class=red>خطأ فادح: '+e.message+'</div>')
}
</script>
</body>
</html>
