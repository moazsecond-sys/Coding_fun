<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>أعمالي</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{font-family:'Tajawal',sans-serif;background:#0a0a0a;color:#fff;text-align:center;padding:50px}
.card{background:#1a1a1a;margin:20px;padding:20px;border-radius:15px;display:inline-block;width:300px}
#loading{color:#00ff88;font-size:20px}
</style>
</head>
<body>
<h1>معرض أعمالي</h1>
<div id="loading">جاري التحميل...</div>
<div id="works-grid"></div>

<script>
// === حط الرابط والمفتاح حقك هنا ===
const supabaseUrl = https://mirrxytqtjglxrarq.supabase.co
const supabaseKey = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdGpnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTcxNjY5NjMsImV4cCI6MjA3Mjc0Mjk2M30.PTvNgqjPIPZJ9b5f_1FuNzkyPec6afcgMynSQ7CFeyI
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

async function loadWorks() {
  try {
    const { data, error } = await supabase.from('works').select('*').order('created_at', { ascending: false })
    if(error) throw error
    
    document.getElementById('loading').style.display = 'none'
    const grid = document.getElementById('works-grid')
    
    if(data.length === 0) {
      grid.innerHTML = '<p>لا توجد أعمال بعد</p>'
      return
    }
    
    grid.innerHTML = data.map(work => `
      <div class="card">
        <h3>${work.title}</h3>
        <p>${work.description}</p>
      </div>
    `).join('')
    
    console.log('✅ تم تحميل ' + data.length + ' عمل')
  } catch(e) {
    document.getElementById('loading').innerHTML = '❌ خطأ: ' + e.message
  }
}

loadWorks()
</script>
</body>
</html>
