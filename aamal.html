<!DOCTYPE html>
<html lang='ar' dir='rtl'>
<head>
<meta charset='UTF-8'>
<title>معرض أعمالي</title>
<script src='https://unpkg.com/@supabase/supabase-js@2'></script>
<style>
body{font-family:Tajawal,sans-serif;background:#0a0a0a;color:#fff;text-align:center;padding:40px}
.works-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:30px}
.card{background:#1a1a1a;border-radius:20px;padding:20px;border:1px solid #333}
.card-img{width:100%;height:220px;object-fit:cover;border-radius:15px}
#loading{color:#00ff88;font-size:1.5rem}
</style>
</head>
<body>
<h1>معرض أعمالي</h1>
<div id='loading'>جاري التحميل...</div>
<div id='works-grid'></div>

<script>
const supabaseUrl = 'https://mirrxytqttjglglxrarq.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo'
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

supabase.from('works').select('*').then(({data, error})=>{
  document.getElementById('loading').style.display='none'
  if(error){document.getElementById('works-grid').innerHTML='خطأ: '+error.message; return}
  
  const grid = document.getElementById('works-grid')
  grid.innerHTML = data.map(work=>`
    <div class='card'>
      <img src='${work.image_url || 'images/placeholder.jpg'}' class='card-img'>
      <h3>${work.title}</h3>
      <p>${work.description}</p>
    </div>
  `).join('')
})
</script>
</body>
</html>
