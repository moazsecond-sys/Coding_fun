<!DOCTYPE html>
<html lang='ar' dir='rtl'>
<head>
<meta charset='UTF-8'>
<title>معرض أعمالي</title>
<script type="importmap">
{
  "imports": {
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
  }
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tajawal,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;padding:50px 20px}
h1{color:#00ff88;font-size:3rem;text-align:center;margin-bottom:50px;text-shadow:0 0 20px #00ff88}
.works-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:30px;max-width:1200px;margin:0 auto}
.card{background:linear-gradient(145deg,#1a1a1a,#0f0f0f);border-radius:25px;padding:30px;border:2px solid #333;transition:all 0.3s;text-align:right}
.card:hover{border-color:#00ff88;transform:translateY(-10px);box-shadow:0 15px 40px rgba(0,255,136,0.3)}
.card h3{color:#00ff88;font-size:1.8rem;margin-bottom:15px}
.card .desc{color:#ccc;line-height:1.8;font-size:1.1rem;margin:20px 0;min-height:60px}
.card .meta{display:flex;justify-content:space-between;align-items:center;margin-top:25px;padding-top:20px;border-top:1px solid #333}
.card .category{background:#00ff88;color:#000;padding:8px 18px;border-radius:25px;font-weight:bold;font-size:0.9rem}
.card .price{color:#00ff88;font-size:1.5rem;font-weight:bold}
.empty{text-align:center;color:#666;font-size:1.4rem;margin-top:100px}
@media(max-width:768px){h1{font-size:2rem}.works-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>معرض أعمالي</h1>
<div class='works-grid' id='works-grid'></div>

<script type="module">
import { createClient } from '@supabase/supabase-js'

const supabase = createClient(
  'https://mirrxytqttjglglxrarq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo'
)

supabase.from('works').select('*').order('created_at',{ascending:false}).then(({data, error})=>{
  if(error || !data || data.length === 0){
    document.getElementById('works-grid').innerHTML = '<p class="empty">لا توجد أعمال حالياً</p>'
    return
  }
  
  document.getElementById('works-grid').innerHTML = data.map(w=>`
    <div class='card'>
      <h3>${w.title}</h3>
      <p class='desc'>${w.description || 'لا يوجد وصف'}</p>
      <div class='meta'>
        <span class='category'>${w.category || 'عام'}</span>
        <span class='price'>${w.price ? w.price + ' ريال' : 'تواصل للسعر'}</span>
      </div>
    </div>
  `).join('')
})
</script>
</body>
</html>
