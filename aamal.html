<!DOCTYPE html>

<style>
body{background:#000;color:#0f0;font-family:monospace;padding:30px;font-size:18px}
.box{border:2px solid #0f0;padding:20px;margin:10px;border-radius:10px}
.ok{color:#0f0} .no{color:red}
</style>
</head>
<body>
<h1>🔍 فحص الموقع</h1>
<div id='log'></div>

<script>
const log = msg => document.getElementById('log').innerHTML += `<div class='box'>${msg}</div>`

log('1. بدأ الفحص...')

try {
  const supabaseUrl = 'https://mirrxytqttjglglxrarq.supabase.co'
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo'
  
  log('2. <span class=ok>المفتاح والرابط موجودين</span>')
  
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)
  log('3. <span class=ok>اتصل بـ Supabase بنجاح</span>')
  
  log('4. جاري سحب البيانات من جدول works...')
  
  supabase.from('works').select('*').limit(1).then(res=>{
    if(res.error){
      log(`5. <span class=no>❌ خطأ Supabase: ${res.error.message}</span>`)
      log(`6. <span class=no>الحل: افتح Supabase → Table Editor → شوف اسم الجدول صح؟ وروح Authentication → Policies → فعل Select للـ anon</span>`)
    } else {
      log(`5. <span class=ok>✅ جات البيانات! عدد السجلات: ${res.data.length}</span>`)
      log(`6. <span class=ok>المشكلة من الكود حق العرض بس. الجدول شغال</span>`)
    }
  })
  
} catch(e){
  log(`2. <span class=no>❌ خطأ فادح: ${e.message}</span>`)
  log(`3. <span class=no>معناها المفتاح مو بين ' او في حرف ناقص</span>`)
}
</script>
</body>
</html>
