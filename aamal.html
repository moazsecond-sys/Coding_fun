<!DOCTYPE html>
<html lang='ar' dir='rtl'>
<head>
<meta charset='UTF-8'>
<title>معرض أعمالي</title>
<script src='https://unpkg.com/@supabase/supabase-js@2'></script>
<style>
body{font-family:Tajawal,sans-serif;background:#0a0a0a;color:#fff;text-align:center;padding:40px}
h1{color:#00ff88;font-size:2.5rem;margin-bottom:30px}
.works-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:25px;max-width:1200px;margin:30px auto}
.card{background:#1a1a1a;border-radius:20px;padding:25px;border:2px solid #333;text-align:right;transition:0.3s}
.card:hover{border-color:#00ff88;transform:translateY(-5px)}
.card h3{color:#00ff88;font-size:1.6rem;margin-bottom:10px}
.card .desc{color:#aaa;line-height:1.7;margin:15px 0}
.card .meta{display:flex;justify-content:space-between;margin-top:15px;font-size:0.95rem}
.card .category{background:#00ff88;color:#000;padding:5px 12px;border-radius:20px;font-weight:bold}
.card .price{color:#00ff88;font-size:1.3rem;font-weight:bold}
.empty{color:#888;font-size:1.3rem;margin-top:50px}
</style>
</head>
<body>
<h1>معرض أعمالي</h1>
<div id='works-grid'></div>

<script>
const supabase = window.supabase.createClient(
  'https://mirrxytqttjglglxrarq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo'
)

supabase.from('works').select('*').order('created_at',{ascending:false}).then(({data, error})=>{
  const grid = document.getElementById('works-grid')
  
  if(error){
    grid.innerHTML = '<p style="color:red">خطأ: '+error.message+'</p>'
    return
  }
  
  if(!data || data.length === 0){
    grid.innerHTML = '<p class="empty">📦 الجدول فاضي حالياً</p>'
    return
  }
  
  grid.innerHTML = data.map(w=>`
    <div class='card'>
      <h3>${w.title}</h3>
      <p class='desc'>${w.description || 'لا يوجد وصف'}</p>
      <div class='meta'>
        <span class='category'>${w.category || 'عام'}</span>
        <span class='price'>${w.price ? w.price + ' ريال' : 'السعر عند التواصل'}</span>
      </div>
    </div>
  `).join('')
})
</script>
</body>
</html>
