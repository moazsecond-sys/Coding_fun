<script>
const log = document.getElementById('log')
const add = (t)=> log.innerHTML += '<br>'+t

add('2. Supabase محمل')

const supabase = window.supabase.createClient(
  'https://mirrxytqttjglglxrarq.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo'
)

add('3. الاتصال جاهز... بطلب البيانات')

supabase.from('works').select('*').limit(5).then(res=>{
  add('4. وصل الرد من Supabase')
  add('5. Error: '+JSON.stringify(res.error))
  add('6. Data length: '+(res.data?res.data.length:'null'))
  add('7. البيانات: '+JSON.stringify(res.data))

  else if(!res.data || res.data.length==0) add('8. الجدول فاضي!')
  else add('8. نجح! فيه '+res.data.length+' أعمال')
})
