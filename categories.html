<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المحتوى الديني</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; font-family: 'Cairo', Tahoma, sans-serif; }
body { background: #0a0a0a; color: #f0f0f0; margin: 0; padding: 20px; font-size: 20px; }
.container { max-width: 800px; margin: 0 auto; }
h1 { font-size: 36px; color: #4ade80; text-align: center; margin-bottom: 40px; }
.card { background: #1a1a1a; border: 1px solid #333; border-radius: 16px; padding: 30px; margin-bottom: 25px; }
.badge { background: #2a2a2a; padding: 10px 16px; border-radius: 8px; font-size: 18px; }
h3 { font-size: 28px; color: #4ade80; margin-top: 15px; }
p { line-height: 2; font-size: 22px; margin-top: 15px; }
.date { color: #666; font-size: 18px; margin-top: 25px; }
.filter { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
.filter button { flex: 1; min-width: 120px; padding: 15px; background: #1a1a1a; border: 2px solid #333; color: #fff; border-radius: 10px; font-size: 18px; cursor: pointer; }
.filter button.active { background: #4ade80; color: #000; border-color: #4ade80; }
</style>
</head>
<body>
<div class="container">
  <h1>📚 المحتوى الديني</h1>
  
  <div class="filter">
    <button class="active" onclick="filterType('all')">الكل</button>
    <button onclick="filterType('post')">📝 مقالات</button>
    <button onclick="filterType('question')">❓ استفسارات</button>
    <button onclick="filterType('thesis')">📚 اطروحات</button>
  </div>
  
  <div id="contentList">جاري التحميل...</div>
</div>

<script>
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');

let allContent = [];

async function loadContent() {
  const { data } = await sb.from('content').select('*').order('created_at', { ascending: false });
  allContent = data || [];
  displayContent(allContent);
}

function displayContent(items) {
  const div = document.getElementById('contentList');
  if (!items.length) return div.innerHTML = '<p style="text-align:center; color:#888; padding:60px; font-size:22px">لا يوجد محتوى بعد 📭</p>';
  
  div.innerHTML = items.map(item => {
    const typeName = item.type === 'post' ? '📝 مقال ديني' 
                    : item.type === 'question' ? '❓ استفسار شرعي' 
                    : '📚 اطروحة/بحث';
    
    return `
    <div class="card">
      <span class="badge">${typeName}</span>
      <h3>${item.title}</h3>
      <p>${item.content}</p>
      <div class="date">📅 ${new Date(item.created_at).toLocaleDateString('ar-EG')}</div>
    </div>
    `;
  }).join('');
}

function filterType(type) {
  document.querySelectorAll('.filter button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  if (type === 'all') displayContent(allContent);
  else displayContent(allContent.filter(c => c.type === type));
}

loadContent();
</script>
</body>
</html>
