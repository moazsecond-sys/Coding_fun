<!DOCTYPE html>
<html>
<head>
<title>بوت ذكي v4.4</title>
<style>
body{font-family:'Segoe UI';max-width:600px;margin:50px auto;padding:20px;background:#f5f5f5}
#chat{height:400px;border:2px solid #4CAF50;border-radius:10px;padding:15px;overflow-y:auto;background:white;margin-bottom:10px}
.msg{margin:8px 0;padding:10px;border-radius:8px}
.user{background:#DCF8C6;text-align:right}
.bot{background:#E8E8E8}
input{width:75%;padding:12px;border:2px solid #4CAF50;border-radius:8px;font-size:16px}
button{width:22%;padding:12px;background:#4CAF50;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px}
button:hover{background:#45a049}
</style>
</head>
<body>
<h2>🧠 بوت ذكي v4.4 - بذاكرة برو</h2>
<div id="chat"></div>
<input id="msg" placeholder="اكتبلي أي حاجة...">
<button onclick="send()">إرسال</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const chat = document.getElementById('chat');
const input = document.getElementById('msg');

function addMsg(text, who){
 chat.innerHTML += `<div class="msg ${who}">${text}</div>`;
 chat.scrollTop = chat.scrollTopMax;
}

async function send(){
 let userMsg = input.value;
 if(!userMsg) return;
 
 addMsg(userMsg, 'user');
 input.value = '';
 
 // تنضيف أقوى v4.4
 let cleanMsg = userMsg.trim().toLowerCase().replace(/[؟?!.,،]/g, '');
 
 // شوف الكلمة دي اتقالت كام مرة
 const { data } = await supabase
  .from('chat_history')
  .select('*')
  .eq('user_msg', cleanMsg);
 
 let reply = '';
 
 if(data.length === 0){
  // أول مرة
  if(cleanMsg.includes('اسمي') || cleanMsg.includes('انا')){
   reply = `تشرفنا! هحفظ اسمك عندي 🧠 قولي اسمك بس؟`;
  } else {
   reply = `أول مرة أسمع "${userMsg}"... حفظتها في الذاكرة 🧠`;
  }
  await supabase.from('chat_history').insert({
   user_msg: cleanMsg, 
   bot_reply: reply,
   count: 1
  });
 } else {
  // قولتها قبل كده
  let count = data[0].count + 1;
  let savedReply = data[0].bot_reply;
  
  // لو بيقول اسمه نحفظه
  if(cleanMsg.includes('اسمي') && userMsg.split(' ').length > 1){
   let name = userMsg.split('اسمي')[1].trim();
   await supabase.from('chat_history').update({bot_reply: `أهلاً ${name} يا غالي 🌸`}).eq('user_msg', cleanMsg);
   reply = `أهلاً ${name} يا غالي 🌸 دي المرة رقم ${count} نتكلم`;
  } else {
   const extras = [
    `😎 فاكرك قولتها قبل كده`,
    `🧠 دي المرة رقم ${count} يا معلم`,
    `💪 ذاكرتي حديد`,
    `🌸 منور تاني`,
    `🔥 رجعت امتى؟`
   ];
   let randomExtra = extras[Math.floor(Math.random() * extras.length)];
   reply = savedReply + ' + randomExtra;
  }
  
  await supabase.from('chat_history').update({count: count}).eq('user_msg', cleanMsg);
 }
 
 addMsg(reply, 'bot');
}

input.addEventListener('keypress', e => {if(e.key==='Enter') send()});
addMsg('أهلاً! أنا بوت v4.4 الجديد. قولي اسمك عشان أحفظه 😊', 'bot');
</script>
</body>
</html>
