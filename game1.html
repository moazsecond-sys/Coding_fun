<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بوت ذكي v4.4.2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:'Segoe UI';margin:0;padding:20px;background:#667eea;min-height:100vh}
.container{max-width:600px;margin:0 auto;background:white;border-radius:15px;padding:20px}
h2{text-align:center;color:#4CAF50}
#chat{height:400px;border:2px solid #4CAF50;border-radius:10px;padding:15px;overflow-y:auto;background:#f9f9f9;margin-bottom:15px}
.msg{margin:10px 0;padding:12px;border-radius:12px;max-width:80%}
.user{background:#DCF8C6;margin-left:auto;text-align:right}
.bot{background:#E3F2FD;margin-right:auto}
.input-area{display:flex;gap:10px}
input{flex:1;padding:14px;border:2px solid #4CAF50;border-radius:10px;font-size:16px}
button{padding:14px 25px;background:#4CAF50;color:white;border:none;border-radius:10px;cursor:pointer;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<h2>🧠 بوت ذكي v4.4.2</h2>
<div id="chat"></div>
<div class="input-area">
<input id="msg" placeholder="اكتبلي أي حاجة...">
<button onclick="send()">إرسال</button>
</div>
</div>

<!-- مكتبة بديلة أسرع + مع فحص -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
// فحص المكتبة اشتغلت ولا لأ
if(typeof supabase === 'undefined'){
 alert('⚠️ خطأ: مكتبة Supabase محملتش! اتأكد من النت واعمل Refresh');
}

const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';

// فحص المفاتيح
if(SUPABASE_URL.includes('YOUR-PROJECT')){
 alert('⚠️ غير رابط SUPABASE_URL و SUPABASE_KEY بتوعك الأول!');
}

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const chat = document.getElementById('chat');
const input = document.getElementById('msg');

function addMsg(text, who){
 chat.innerHTML += `<div class="msg ${who}">${text}</div>`;
 chat.scrollTop = chat.scrollHeight;
}

async function send(){
 let userMsg = input.value.trim();
 if(!userMsg) return;

 addMsg(userMsg, 'user');
 input.value = '';

 try {
 let cleanMsg = userMsg.toLowerCase().replace(/[؟?!.,،\s]+$/g, '');

 const { data, error } = await client
.from('chat_history')
.select('*')
.eq('user_msg', cleanMsg)
.limit(1);

 if(error) throw error;

 let reply = data.length === 0
? `أول مرة أسمع "${userMsg}"... حفظتها 🧠`
 : data[0].bot_reply + ` 😎 المرة رقم ${(data[0].count||1)+1}`;

 if(data.length === 0){
 await client.from('chat_history').insert({user_msg: cleanMsg, bot_reply: reply, count: 1});
 } else {
 await client.from('chat_history').update({count: (data[0].count||1)+1}).eq('user_msg', cleanMsg);
 }

 addMsg(reply, 'bot');

 } catch(err){
 addMsg('⚠️ خطأ: ' + err.message, 'bot');
 console.error('تفاصيل الخطأ:', err);
 }
}

input.addEventListener('keypress', e => {if(e.key==='Enter') send()});
addMsg('أهلاً! بوت v4.4.2 جاهز. لو المكتبة حملت هتلاقي الرسالة دي 😊', 'bot');
</script>
</body>
</html>
