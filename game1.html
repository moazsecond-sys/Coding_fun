<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>شات بوت ES6 الذكي</title>
  <style>
    body { 
      font-family: Tahoma; 
      max-width: 500px; 
      margin: 50px auto; 
      background: #1e1e1e; 
      color: #fff;
      padding: 20px;
    }
    #chat { 
      border: 2px solid #f7df1e; 
      height: 300px; 
      overflow-y: auto; 
      padding: 10px; 
      margin-bottom: 10px;
      border-radius: 8px;
      background: #2a2a2a;
    }
    #chat p { 
      background: #333; 
      padding: 8px 12px; 
      border-radius: 8px; 
      margin: 8px 0;
      max-width: 80%;
    }
    .user-msg { 
      background: #2a4 !important; 
      margin-left: auto !important;
      text-align: left;
    }
    input, button { 
      padding: 12px; 
      font-size: 16px; 
      border-radius: 8px;
      border: none;
    }
    input { width: 70%; background: #333; color: #fff; }
    button { 
      width: 28%; 
      background: #f7df1e; 
      color: #000; 
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #ffd700; }
    h1 { text-align: center; color: #f7df1e; }
  </style>
</head>
<body>
  <h1>🤖 شات بوتك الذكي</h1>
  <div id="chat"></div>
  <input id="msg" placeholder="اكتب رسالتك هنا...">
  <button id="send">إرسال</button>

  <script>
    const chatBox = document.getElementById('chat');
    const input = document.getElementById('msg');
    const btn = document.getElementById('send');

    const reply = (text, isUser = false) => {
      let p = document.createElement('p');
      p.textContent = text;
      if(isUser) p.classList.add('user-msg');
      chatBox.appendChild(p);
      chatBox.scrollTop = chatBox.scrollHeight;
    };

    btn.addEventListener('click', () => {
      const userMsg = input.value.trim();
      if(userMsg === '') return;
      
      // رسالة المستخدم
      reply(`أنت: ${userMsg}`, true);

      // البوت الذكي - بيفهم العربي بعلامات ومن غير
      setTimeout(() => {
        let text = userMsg.toLowerCase().replace(/[؟?!.,]/g, '').trim();
        let botReply;
        
        if(text.includes("تحبني")) {
          botReply = "أيوه طبعاً بحبك يا ملك الـ ES6 💛 انت اللي صنعتني";
        }
        else if(text.includes("ازيك") || text.includes("ازي")) {
          botReply = "أنا تمام طالما انت رجعت للكود 🔥 وانت عامل ايه؟";
        }
        else if(text.includes("اسمك")) {
          botReply = "أنا بوتك الخاص اللي عملته بإيدك من VS Code";
        }
        else if(text.includes("سلام") || text.includes("باي")) {
          botReply = "سلام يا معلم 👋 مستنيك ترجع تاني";
          else if(text.includes("بجد")) {
  botReply = "أيوه بجد والله 💛 انت مبرمج جامد";
}
else if(text.includes("نتعلم") || text.includes("تعال")) {
  botReply = "يلا بينا نتعلم ES6 سوا! انت المعلم وأنا التلميذ 🚀";
}
        }
        else {
          botReply = `فهمت: ${userMsg} ... بس لسه بتعلم 😅`;
        }
        
        reply(`البوت: ${botReply}`);
      }, 600);
      
      input.value = '';
    });

    input.addEventListener('keypress', e => {
      if(e.key === 'Enter') btn.click();
    });

    reply("البوت: أهلاً بيك! جرب تقولي 'إزيك؟' أو 'تحبني؟' 😄");
  </script>
</body>
</html>
