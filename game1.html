<!DOCTYPE html>
<html>
<body>
<h2>Wasserspender</h2>
<button onclick="gießeWasser()">صب ماية</button>
<p id="glas">Glas ist leer - الكوباية فاضية</p>

<script>
let wasser = 0; // wasser = ماء

function gießeWasser() {
  wasser = wasser + 1;
  
  if (wasser == 1) {
    document.getElementById("glas").innerHTML = "Glas ist halb voll - نص الكوباية";
  } else if (wasser >= 2) {
    document.getElementById("glas").innerHTML = "Glas ist voll! - الكوباية مليانة stark!";
    wasser = 0; // نرجع نصفر عشان نشرب ونسقي تاني
  }
}
</script>
</body>
</html>
