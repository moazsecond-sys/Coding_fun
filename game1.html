<!DOCTYPE html>
<html>
<body>
<h2>Wasserreiniger</h2>
<button onclick="macheSchmutzig()">وسخ الماية</button>
<button onclick="reinigeWasser()">نضف الماية</button>

<p id="wasser">Wasser ist sauber - الماية نضيفة stark!</p>

<script>
let istSauber = true; // istSauber = هل هي نضيفة؟ true = نعم

function macheSchmutzig() {
  istSauber = false;
  document.getElementById("wasser").innerHTML = "Wasser ist schmutzig! - الماية وسخة 🫠";
}

function reinigeWasser() {
  if (istSauber == false) {
    istSauber = true;
    document.getElementById("wasser").innerHTML = "Wasser ist sauber! - الماية نضيفة wieder stark!";
  } else {
    document.getElementById("wasser").innerHTML = "Wasser ist schon sauber - الماية نضيفة أصلاً 😄";
  }
}
</script>
</body>
</html>
