<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صفحات - GREEN APPLE DESIGN</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Cairo',sans-serif;background:#f8f8f8;color:#333;text-align:center;padding-bottom:100px}
    
    #loader{
      position: fixed;
      top: 0;left: 0;
      width: 100%;height: 100%;
      background: #2E7D32;
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transition: opacity 0.5s ease;
    }
    
    .apple-loader{
      width: 120px;
      animation: spin 2s linear infinite, glow 2s infinite;
    }
    
    @keyframes spin{0%{transform: rotate(0deg);}100%{transform: rotate(360deg);}}
    @keyframes glow{0%, 100%{filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));}50%{filter: drop-shadow(0 0 30px rgba(255,255,255,0.8));}}
    
    .loading-text{color: white;font-size: 20px;margin-top: 20px;font-weight: 700;letter-spacing: 1px}
    
    header{background:#2E7D32;padding:40px 20px;color:white}
    .logo{max-width:160px;width:100%;height:auto;margin-bottom:15px;display:block;margin:auto}
    h1{font-size:32px;margin-top:10px}
    
    nav{margin-top:15px}
    nav a{color:white;margin:0 10px;text-decoration:none;font-size:18px;font-weight:700;transition:0.3s}
    nav a:hover{opacity:0.8}
    nav a.active{opacity:0.6;text-decoration:underline;cursor:default}
    
    .content{padding:50px 20px;max-width:800px;margin:auto;background:white;border-radius:12px;margin-top:30px;box-shadow:0 4px 15px rgba(0,0,0,0.1)}
    footer{background:#2E7D32;color:white;padding:20px;margin-top:50px}
    .chat-btn{position:fixed;bottom:20px;left:20px;background:#25D366;color:white;padding:15px 25px;border-radius:50px;text-decoration:none;font-size:18px;font-weight:700;box-shadow:0 4px 15px rgba(37,211,102,0.4);z-index:999;transition:0.3s}
    .chat-btn:hover{transform:scale(1.05)}
    
    @media (max-width: 600px){
      h1{font-size:26px}
      .logo{max-width:120px}
      .apple-loader{width:90px}
      nav a{font-size:16px;margin:0 7px}
      .content{padding:30px 15px}
    }
  </style>
</head>
<body>

  <div id="loader">
    <img src="../images/logo.png" alt="Loading" class="apple-loader">
    <p class="loading-text">GREEN APPLE DESIGN</p>
  </div>

  <header>
    <img src="../images/logo.png" alt="GREEN APPLE DESIGN Logo" class="logo">
    <h1>GREEN APPLE DESIGN</h1>
   <nav>
     <a href="../index.html">الرئيسية</a>
     <a href="#" class="active" onclick="return false">صفحات</a>
     <a href="aamal.html">أعمالنا</a>
   </nav>
  </header>

  <main>
    <div class="content">
      <h2>من نحن</h2>
      <p style="font-size:20px;margin-top:20px;line-height:2">
        GREEN APPLE DESIGN فريق تصميم متخصص في عمل لوجوهات وبنرات احترافية.<br>
        هدفنا: تصميم يخلي العميل يشتري من أول نظرة.<br><br>
        اطلب تصميمك الآن وخلينا نصنع لك هوية تفرق 👇
      </p>

      <!-- زر التواصل - يودي لصفحة contact.html -->
      <a href="contact.html" style="display:inline-block;background:#25D366;color:white;padding:15px 30px;border-radius:50px;text-decoration:none;font-size:18px;margin-top:20px;font-weight:700;transition:0.3s" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">📩 اطلب تصميم الآن</a>
    </div>
  </main>

  <footer>
    <p>© 2026 GREEN APPLE DESIGN</p>
  </footer>

  <a href="https://wa.me/2126XXXXXXXX?text=مرحبا" class="chat-btn" target="_blank">💬 شات واتساب</a>

  <script>
  document.addEventListener('DOMContentLoaded', function() {
    if (sessionStorage.getItem('visited') !== 'yes') {
      sessionStorage.setItem('visited', 'yes');
      window.addEventListener('load', function(){
        setTimeout(function(){
          document.getElementById('loader').style.opacity = '0';
          setTimeout(function(){document.getElementById('loader').style.display = 'none'}, 500);
        }, 2000);
      });
    } else {
      document.getElementById('loader').style.display = 'none';
    }
  });
  </script>
  <script src="console.js"></script>
</body>
</html>
