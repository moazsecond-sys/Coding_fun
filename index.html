<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>دخول الادمن - Green Apple</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Tahoma;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.box{background:#1e293b;padding:30px;border-radius:12px;width:320px}
input{width:100%;padding:12px;margin:8px 0;border:1px solid #334155;border-radius:8px;background:#0f172a;color:white}
button{width:100%;padding:12px;background:#2ecc71;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px;margin-top:10px}
#error{color:#ff6b6b;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="box">
  <h2 style="text-align:center">دخول الادمن</h2>
  <input type="email" id="email" placeholder="الايميل">
  <input type="password" id="password" placeholder="كلمة السر">
  <button onclick="login()">دخول</button>
  <p id="error"></p>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  'https://mirrxytqttjglxrarq.supabase.co',
  'حط_المفتاح_الجديد_anon_هنا'
);

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const { data, error } = await supabaseClient.auth.signInWithPassword({email, password});
  
  if(error) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = error.message;
  } else {
    alert('تم الدخول بنجاح ✅');
    window.location.href = 'dashboard.html'; // غيرها لصفحة لوحتك
  }
}
</script>
</body>
</html>
