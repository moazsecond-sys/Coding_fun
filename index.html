<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">المحتوى الديني</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Tajawal', sans-serif; background: #f8f9fa; color: #222; padding: 20px; }
body[dir="ltr"] { font-family: 'Poppins', sans-serif; }
h1 { text-align: center; color: #2d5a3d; margin: 30px 0; }
.container { max-width: 700px; margin: auto; }
.post { background: white; padding: 20px; border-radius: 15px; margin: 15px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.category { color: #2d5a3d; font-weight: bold; font-size: 14px; }
.controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
.controls select,.controls input,.controls button { padding: 10px 15px; border: 2px solid #4ade80; border-radius: 25px; font-family: inherit; }
.lang-switch { position: fixed; top: 20px; left: 20px; padding: 8px 12px; border: 2px solid #4ade80; background: white; border-radius: 20px; }
.pagination { display: flex; gap: 8px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
.pagination button { padding: 8px 14px; border: 2px solid #4ade80; background: white; border-radius: 10px; cursor: pointer; }
.pagination button.active { background: #4ade80; color: white; }
.btn { padding: 6px 12px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
.share-btn { background: #25D366; color: white; }
.copy-btn { background: #3b82f6; color: white; }
</style>
</head>
<body>
<select class="lang-switch" onchange="changeLang(this.value)" id="langSelect">
<option value="ar">🌍 العربية</option>
<option value="en">🇬🇧 English</option>
<option value="es">🇪🇸 Español</option>
<option value="pt">🇧🇷 Português</option>
<option value="de">🇩🇪 Deutsch</option>
</select>

<div class="controls">
<input type="text" id="searchBox" placeholder="ابحث..." onkeyup="render()">
<select id="catFilter" onchange="render()">
<option value="all">كل التصنيفات</option>
<option value="آية">آيات</option>
<option value="حديث">أحاديث</option>
<option value="دعاء">أدعية</option>
<option value="سؤال ديني">أسئلة</option>
</select>
<select id="perPage" onchange="render()">
<option value="10">10 في الصفحة</option>
<option value="20" selected>20 في الصفحة</option>
<option value="50">50 في الصفحة</option>
</select>
</div>

<h1>📖 <span data-ar="المحتوى الديني" data-en="Islamic Content">المحتوى الديني</span></h1>
<div class="container" id="posts">جاري التحميل...</div>
<div class="pagination" id="pages"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/+esm'

const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';

const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
let allPosts = [];
let currentPage = 1;
let currentLang = localStorage.getItem('lang') || 'ar';

const t = {
ar: {title:"المحتوى الديني",loading:"جاري التحميل...",no:"لا يوجد نتائج",page:"صفحة",of:"من",prev:"السابق",next:"التالي",copied:"تم النسخ",share:"مشاركة"},
en: {title:"Islamic Content",loading:"Loading...",no:"No results",page:"Page",of:"of",prev:"Previous",next:"Next",copied:"Copied",share:"Share"},
es: {title:"Contenido Islámico",loading:"Cargando...",no:"Sin resultados",page:"Página",of:"de",prev:"Anterior",next:"Siguiente",copied:"Copiado",share:"Compartir"},
pt: {title:"Conteúdo Islâmico",loading:"Carregando...",no:"Sem resultados",page:"Página",of:"de",prev:"Anterior",next:"Próximo",copied:"Copiado",share:"Compartilhar"},
de: {title:"Islamische Inhalte",loading:"Lädt...",no:"Keine Ergebnisse",page:"Seite",of:"von",prev:"Zurück",next:"Weiter",copied:"Kopiert",share:"Teilen"}
};

window.changeLang = function(lang) {
currentLang = lang;
localStorage.setItem('lang', lang);
document.getElementById('htmlTag').dir = lang === 'ar'? 'rtl' : 'ltr';
document.body.style.fontFamily = lang === 'ar'? "'Tajawal'" : "'Poppins'";
document.getElementById('pageTitle').textContent = t[lang].title;
document.querySelectorAll('[data-ar]').forEach(el => el.textContent = el.getAttribute(`data-${lang}`));
render();
}

async function load() {
const {data, error} = await sb.from('posts').select('*').order('created_at', {ascending:false});
if(error) { document.getElementById('posts').innerHTML = 'خطأ: ' + error.message; return; }
allPosts = data || [];
changeLang(currentLang);
render();
}

window.render = function() {
const search = document.getElementById('searchBox').value.toLowerCase();
const cat = document.getElementById('catFilter').value;
const perPage = parseInt(document.getElementById('perPage').value);

let posts = allPosts.filter(p =>
(cat === 'all' || p.category === cat) &&
(p.title + p.content + p.category).toLowerCase().includes(search)
);

const totalPages = Math.ceil(posts.length / perPage);
currentPage = Math.min(currentPage, totalPages || 1);

const start = (currentPage - 1) * perPage;
const pagePosts = posts.slice(start, start + perPage);

document.getElementById('posts').innerHTML = pagePosts.length?
pagePosts.map(p => `
<div class="post">
<h3>${p.title} <span class="category">${p.category}</span></h3>
<p style="line-height:1.8">${p.content}</p>
<button class="btn copy-btn" onclick="navigator.clipboard.writeText(\`${p.content}\`); alert(t[currentLang].copied)">📋</button>
<button class="btn share-btn" onclick="navigator.share?navigator.share({title:'${p.title}',text:\`${p.content}\`}):navigator.clipboard.writeText(\`${p.title}\n\n${p.content}\`)">📤 ${t[currentLang].share}</button>
</div>
`).join('') : `<p style="text-align:center">${t[currentLang].no}</p>`;

let pagesHTML = '';
if(totalPages > 1) {
pagesHTML += `<button onclick="currentPage--; render()" ${currentPage===1?'disabled':''}>${t[currentLang].prev}</button>`;
for(let i=1; i<=totalPages; i++) {
pagesHTML += `<button class="${i===currentPage?'active':''}" onclick="currentPage=${i}; render()">${i}</button>`;
}
pagesHTML += `<button onclick="currentPage++; render()" ${currentPage===totalPages?'disabled':''}>${t[currentLang].next}</button>`;
}
document.getElementById('pages').innerHTML = pagesHTML;
}

load();
</script>
</body>
</html>
