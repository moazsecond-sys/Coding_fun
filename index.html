<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول الادمن</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: 'Cairo', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h2 { text-align: center; margin-bottom: 20px; }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background: #334155;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #16a34a; }
    #error {
      color: #ef4444;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>دخول الادمن</h2>
    <input type="email" id="email" placeholder="الايميل" required>
    <input type="password" id="password" placeholder="كلمة السر" required>
    <button onclick="login()">دخول</button>
    <div id="error"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // حط مفاتيحك هنا
    const SUPABASE_URL = "https://mirrxytqttjglglxrarq.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_FXUmqRa_eAjdgWdZpFl-tA_YQM4FSnQ";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      errorDiv.textContent = '';

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        errorDiv.textContent = 'خطأ: ' + error.message;
        return;
      }

      // فحص اذا ادمن
      if (data.user?.app_metadata?.role === 'admin') {
        window.location.href = 'dashboard.html';
      } else {
        errorDiv.textContent = 'غير مصرح لك بالدخول';
        await supabaseClient.auth.signOut();
      }
    }
  </script>
</body>
</html>
