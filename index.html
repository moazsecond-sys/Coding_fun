<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>دخول</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh">
<div style="background:#1e293b;padding:30px;border-radius:10px">
<h2>تسجيل دخول</h2>
<input id="email" type="email" placeholder="الايميل"><br><br>
<input id="pass" type="password" placeholder="كلمة السر"><br><br>
<button onclick="login()">دخول</button>
<p id="err" style="color:red"></p>
</div>

<script>
const SUPABASE_URL = 'https://mirrxytqttjglxrarq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login(){
document.getElementById('err').textContent = 'جاري الدخول...';
const email = document.getElementById('email').value;
const pass = document.getElementById('pass').value;

const {data, error} = await supabase.auth.signInWithPassword({email, password: pass});

if(error){
document.getElementById('err').textContent = error.message;
return;
}

// هنا نفرق بين الادمن والمستخدم
const role = data.user.app_metadata.role;

if(role === 'admin'){
window.location.href = 'admin.html';
} else {
window.location.href = 'user.html';
}
</script>
</body>
</html>
