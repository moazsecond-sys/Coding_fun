<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متجر سيف - المحتوى الديني</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { 
      font-family: 'Tajawal', sans-serif; 
      background: #f8f9fa; 
      color: #222; 
      padding: 20px; 
      transition: 0.3s ease;
    }
    h1 { text-align: center; color: #2d5a3d; margin: 30px 0; font-size: 32px; }
    .container { max-width: 700px; margin: auto; }
    
    .post { 
      background: white; 
      padding: 20px; 
      border-radius: 15px; 
      margin: 15px 0; 
      border: 1px solid #e0e0e0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      animation: fadeInUp 0.5s ease;
      transition: transform 0.2s;
    }
    .post:hover { transform: translateY(-3px); }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .category { color: #2d5a3d; font-weight: bold; font-size: 14px; }
    .date { color: #666; font-size: 13px; }
    .admin-link { text-align: center; margin-top: 40px; }
    .admin-link a { color: #666; text-decoration: none; font-size: 12px; }

    .filter-buttons {
      display: flex; gap: 12px; justify-content: center; 
      flex-wrap: wrap; margin: 25px 0;
    }
    .filter-buttons button {
      padding: 10px 16px; border: 1px solid #4ade80; 
      background: white; color: #2d5a3d; 
      border-radius: 25px; cursor: pointer; font-family: 'Tajawal';
      font-size: 15px; transition: 0.2s;
    }
    .filter-buttons button.active, 
    .filter-buttons button:hover {
      background: #4ade80; color: white;
    }
    
    .btn {
      border: none; padding: 8px 14px; border-radius: 8px; 
      cursor: pointer; font-size: 14px; font-family: 'Tajawal';
      transition: 0.2s;
    }
    .btn:hover { opacity: 0.8; transform: scale(1.05); }
    .share-btn { background: #25D366; color: white; }
    .copy-btn { background: #3b82f6; color: white; }
    
    #themeBtn {
      padding: 10px 18px; border: none; border-radius: 25px;
      background: #f0f0f0; color: #333; cursor: pointer;
      font-family: 'Tajawal'; font-size: 15px;
    }
    #searchBox {
      width: 85%; max-width: 420px; padding: 12px 18px; 
      border-radius: 25px; border: 2px solid #4ade80; 
      font-family: 'Tajawal'; font-size: 16px; text-align: center;
      outline: none; transition: 0.2s;
    }
    #searchBox:focus { border-color: #2d5a3d; box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.1); }

    body.dark {
      background: #0f0f0f;
      color: #e0e0e0;
    }
    body.dark h1 { color: #4ade80; }
    body.dark .post {
      background: #1e1e1e;
      border-color: #333;
      box-shadow: none;
    }
    body.dark .category { color: #4ade80; }
    body.dark .date { color: #999; }
    body.dark .filter-buttons button {
      background: transparent;
      border-color: #4ade80;
      color: #4ade80;
    }
    body.dark .filter-buttons button.active {
      background: #4ade80;
      color: #0f0f0f;
    }
    body.dark #themeBtn {
      background: #333;
      color: white;
    }
    body.dark #searchBox {
      background: #1a1a1a;
      color: white;
      border: 2px solid #4ade80;
    }
    .post-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-start;
  margin-top: 12px;
  flex-wrap: wrap;
}

.post-actions .btn {
  flex: 0 1 auto;
  min-width: 90px;
}

/* للموبايل الصغير */
@media (max-width: 480px) {
  .post-actions {
    gap: 6px;
  }
  .post-actions .btn {
    min-width: 80px;
    font-size: 13px;
    padding: 6px 10px;
  }
}
  </style>
</head>
<body>
  <div class="filter-buttons">
    <button onclick="filterPosts('all', this)" class="active">الكل</button>
    <button onclick="filterPosts('آية', this)">آيات</button>
    <button onclick="filterPosts('حديث', this)">أحاديث</button>
    <button onclick="filterPosts('دعاء', this)">أدعية</button>
    <button onclick="filterPosts('سؤال ديني', this)">أسئلة</button>
  </div>
  
  <div style="text-align:center; margin: 15px 0;">
    <button id="themeBtn" onclick="toggleTheme()">🌙 وضع ليلي</button>
  </div>
  
  <div style="text-align:center; margin: 20px 0;">
    <input type="text" id="searchBox" placeholder="ابحث عن آية، حديث، دعاء..." onkeyup="searchPosts(this.value)">
  </div>
  
  <h1>📖 المحتوى الديني</h1>
  <div class="container" id="postsContainer">جاري التحميل...</div>
  
  <div class="admin-link">
    <a href="admin.html">لوحة التحكم</a>
  </div>

  <script>
    const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let allPosts = [];

    async function loadPosts() {
      const { data, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });
      if(error) { console.log(error); return; }
      allPosts = data;
      displayPosts(allPosts);
    }

    function displayPosts(posts) {
      const container = document.getElementById('postsContainer');
      
      if(!posts || posts.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#666; padding:40px">لم نجد نتائج 🔍</p>';
        return;
      }

      container.innerHTML = posts.map(p => `
        <div class="post" onclick="addView(${p.id})">
          <h3 style="margin-bottom:12px">${p.title} <span class="category">${p.category}</span></h3>
          <p style="line-height: 1.8; margin: 10px 0;" id="content-${p.id}">${p.content}</p>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px; flex-wrap:wrap; gap:10px">
            <div class="date">${new Date(p.created_at).toLocaleDateString('ar-EG', {day:'numeric', month:'long', year:'numeric'})} • 👁️ ${p.views || 0} قراءة</div>
            <div>
              <button class="btn copy-btn" onclick="copyPost(${p.id}); event.stopPropagation()">📋 نسخ</button>
              <button class="btn share-btn" onclick="sharePost(\`${p.title}\`, \`${p.content}\`); event.stopPropagation()">📤 مشاركة</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterPosts(category, btn) {
      document.querySelectorAll('.filter-buttons button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      if(category === 'all') displayPosts(allPosts);
      else displayPosts(allPosts.filter(p => p.category === category));
    }

    function searchPosts(keyword) {
      keyword = keyword.trim().toLowerCase();
      
      if(keyword === '') {
        displayPosts(allPosts);
        document.querySelector('.filter-buttons button').classList.add('active');
        return;
      }
      
      const results = allPosts.filter(p => 
        p.title.toLowerCase().includes(keyword) ||
        p.content.toLowerCase().includes(keyword) ||
        p.category.toLowerCase().includes(keyword)
      );
      
      displayPosts(results);
      document.querySelectorAll('.filter-buttons button').forEach(b => b.classList.remove('active'));
    }

    async function addView(id) {
      const post = allPosts.find(p => p.id === id);
      if(!post) return;
      
      const newViews = (post.views || 0) + 1;
      await sb.from('posts').update({ views: newViews }).eq('id', id);
      post.views = newViews;
      
      const el = document.querySelector(`#content-${id}`).parentElement.querySelector('.date');
      el.innerHTML = `${new Date(post.created_at).toLocaleDateString('ar-EG')} • 👁️ ${newViews} قراءة`;
    }

    function copyPost(id) {
      const text = document.getElementById(`content-${id}`).innerText;
      navigator.clipboard.writeText(text);
      alert('تم نسخ النص 📋');
    }

    function sharePost(title, content) {
      const text = `${title}\n\n${content}\n\nمن موقع المحتوى الديني`;
      if(navigator.share) {
        navigator.share({ title, text });
      } else {
        navigator.clipboard.writeText(text);
        alert('تم نسخ المنشور 🌸');
      }
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      const btn = document.getElementById('themeBtn');
      if(document.body.classList.contains('dark')) {
        btn.textContent = '☀️ وضع نهاري';
        localStorage.setItem('theme', 'dark');
      } else {
        btn.textContent = '🌙 وضع ليلي';
        localStorage.setItem('theme', 'light');
      }
    }

    window.onload = () => {
      if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        document.getElementById('themeBtn').textContent = '☀️ وضع نهاري';
      }
      loadPosts();
    }
  </script>
</body>
</html>
