<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المحتوى الديني</title>
  <style>
    body { font-family: 'Tajawal', sans-serif; background: #f5f5f5; padding: 20px; }
    .post { background: white; padding: 15px; margin: 15px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .post h3 { color: #2c5f2d; margin: 0 0 10px 0; }
    .post small { color: #666; }
  </style>
</head>
<body>
  <h2 style="text-align:center">المحتوى الديني 📖</h2>
  <div id="postsContainer">جاري التحميل...</div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/+esm'

    const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';

    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadPosts() {
      const { data, error } = await sb.from('posts').select('*').order('created_at', {ascending: false});
      
      if(error) {
        document.getElementById('postsContainer').innerHTML = '❌ خطأ: ' + error.message;
        return;
      }
      
      if(!data || data.length === 0) {
        document.getElementById('postsContainer').innerHTML = 'لا يوجد بوستات بعد';
        return;
      }
      
      let html = '';
      data.forEach(p => {
        html += `
          <div class="post">
            <h3>${p.title}</h3>
            <p>${p.content}</p>
            <small>التصنيف: ${p.category} | المشاهدات: ${p.views || 0}</small>
          </div>
        `;
      });
      
      document.getElementById('postsContainer').innerHTML = html;
    }
    
    loadPosts();
  </script>
</body>
</html>
