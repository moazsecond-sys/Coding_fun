<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول الادمن</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body {
  background: #0a0a0a;
  color: #eee;
  font-family: 'Cairo', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
.container {
  background: #1a1a1a;
  padding: 40px;
  border-radius: 12px;
  border: 1px solid #333;
  width: 100%;
  max-width: 400px;
}
h1 { color: #4ade80; text-align: center; margin-bottom: 30px; }
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  background: #2a2a2a;
  border: 1px solid #444;
  color: #fff;
  border-radius: 8px;
  box-sizing: border-box;
}
button {
  width: 100%;
  background: #4ade80;
  color: #000;
  border: none;
  padding: 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  margin-top: 10px;
}
button:hover { background: #22c55e; }
.msg { padding: 10px; margin: 10px 0; border-radius: 8px; text-align: center; }
.error { background: #7f1d1d; }
</style>
</head>
<body>

<div class="container">
  <h1>🔐 تسجيل دخول الادمن</h1>
  <div id="msg"></div>
  <form id="loginForm">
    <input type="email" id="email" placeholder="الايميل" required>
<input type="password" id="password" placeholder="كلمة السر" required>
    <button type="submit">دخول</button>
  </form>
</div>

<script>
const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// لو مسجل دخول روح للوحة التحكم
checkSession();

async function checkSession() {
  const { data: { session } = await sb.auth.getSession();
  if (session) {
    window.location.href = 'home.html';
  }
}

document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  
  const { error } = await sb.auth.signInWithPassword({ email, password });
  
  if (error) {
    document.getElementById('msg').className = 'msg error';
    document.getElementById('msg').textContent = 'خطأ: ' + error.message;
    return;
  }
  
  window.location.href = 'home.html';
};
</script>

</body>
</html>
