<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>متجر سيف - المحتوى الديني</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Tajawal', sans-serif; background: #0a0a0a; color: white; padding: 20px; }
    h1 { text-align: center; color: #4ade80; margin: 30px 0; }
    .container { max-width: 700px; margin: auto; }
    .post { background: #1a1a1a; padding: 20px; border-radius: 15px; margin: 15px 0; border: 1px solid #333; }
    .category { color: #4ade80; font-weight: bold; }
    .date { color: #666; font-size: 13px; margin-top: 10px; }
    .admin-link { text-align: center; margin-top: 40px; }
    .admin-link a { color: #666; text-decoration: none; font-size: 12px; }
  </style>
</head>
<body>
  <h1>📖 المحتوى الديني</h1>
  <div class="container" id="postsContainer">جاري التحميل...</div>
  
  <div class="admin-link">
    <a href="admin.html">لوحة التحكم</a>
  </div>

  <script>
    const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadPosts() {
      const { data } = await sb.from('posts').select('*').order('created_at', { ascending: false });
      const container = document.getElementById('postsContainer');
      
      if(!data || data.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#666;">لا يوجد محتوى بعد</p>';
        return;
      }
      
      container.innerHTML = data.map(p => `
        <div class="post">
          <h3>${p.title} <span class="category">- ${p.category}</span></h3>
          <p style="line-height: 1.8; margin: 15px 0;">${p.content}</p>
          <div class="date">${new Date(p.created_at).toLocaleDateString('ar-EG')}</div>
        </div>
      `).join('');
    }

    loadPosts();
  </script>
</body>
</html>
