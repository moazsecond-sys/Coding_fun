<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>دخول الادمن</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh">
<div style="background:#1e293b;padding:30px;border-radius:10px;text-align:center">
<h2>دخول الادمن</h2>
<input id="email" type="email" placeholder="الايميل" style="width:250px;padding:10px"><br><br>
<input id="pass" type="password" placeholder="كلمة السر" style="width:250px;padding:10px"><br><br>
<button onclick="login()" style="width:270px;padding:12px;background:#22c55e;border:none;color:white">دخول</button>
<p id="err" style="color:red;margin-top:10px"></p>
</div>

<script>
alert('1- الكود بدأ'); // لو طلع هذا معناه الملف شغال

const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';

alert('2- المفتاح انقرأ'); // لو وقف هنا معناه المفتاح غلط

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login(){
document.getElementById('err').textContent = 'جاري الدخول...';
const email = document.getElementById('email').value;
const pass = document.getElementById('pass').value;

const {data, error} = await supabase.auth.signInWithPassword({email:email,password:pass});

if(error){
alert('الخطأ من Supabase: ' + error.message); // هذا بيطلع السبب
document.getElementById('err').textContent = error.message;
return;
}

alert('دخلنا! نوع المستخدم: ' + data.user.app_metadata.role); // بيعرض نوعك

if(data.user.app_metadata.role==='admin'){
window.location.href='dashboard.html';
}else{
document.getElementById('err').textContent = 'انت مو ادمن. دورك: ' + data.user.app_metadata.role;
supabase.auth.signOut();
}
}
</script>
</body>
</html>
