<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>التحقق...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>body{background:#0b1020; color:#eaf2ff; display:flex; align-items:center; justify-content:center; height:100vh; font-family:tahoma; margin:0; text-align:center}</style>
</head>
<body>
<div id="msg">جاري التحقق من الصلاحيات...</div>

<script>
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','sb_publishable_FXUmqRa_eAjdgWdZpFl-tA_YQM4FSnQ');

sb.auth.getUser().then(function(res){
  document.getElementById('msg').innerText = 'تم استلام البيانات...';
  
  if(res.error){
    document.getElementById('msg').innerText = 'خطأ: ' + res.error.message;
    setTimeout(function(){ location.href = 'login.html' }, 2000);
    return;
  }
  
  var user = res.data.user;
  
  if(!user){
    document.getElementById('msg').innerText = 'ما فيه مستخدم';
    setTimeout(function(){ location.href = 'login.html' }, 1000);
    return;
  }
  
  var role = user.app_metadata.role;
  document.getElementById('msg').innerText = 'الدور حقك: ' + role;
  
  if(role != 'admin'){
    sb.auth.signOut();
    setTimeout(function(){ location.href = 'login.html' }, 1000);
    return;
  }
  
  document.getElementById('msg').innerText = 'تمام انت ادمن، جاري الدخول...';
  setTimeout(function(){ location.href = 'home.html' }, 500);
});
</script>
</body>
</html>
