  <style>
    body {
      font-family: 'Tajawal', sans-serif;
      background: #f8f9fa;
      color: #222;
      padding: 20px;
      transition: 0.3s ease;
    }
    body[dir="ltr"] { font-family: 'Poppins', sans-serif; }

    h1 { text-align: center; color: #2d5a3d; margin: 30px 0; font-size: 32px; }
  .container { max-width: 700px; margin: auto; }

  .post {
      background: white;
      padding: 20px;
      border-radius: 15px;
      margin: 15px 0;
      border: 1px solid #e0e0e0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      animation: fadeInUp 0.5s ease;
      transition: transform 0.2s;
    }
  .post:hover { transform: translateY(-3px); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

  .category { color: #2d5a3d; font-weight: bold; font-size: 14px; }
  .admin-link { text-align: center; margin-top: 40px; }
  .admin-link a { color: #666; text-decoration: none; font-size: 12px; }

  .controls {
      display: flex; gap: 12px; justify-content: center;
      flex-wrap: wrap; margin: 25px 0;
    }
  .controls button,.controls select,.controls input {
      padding: 10px 16px; border: 2px solid #4ade80;
      background: white; color: #2d5a3d;
      border-radius: 25px; cursor: pointer; font-family: inherit;
      font-size: 15px; transition: 0.2s; outline: none;
    }
  .controls button.active,
  .controls button:hover {
      background: #4ade80; color: white;
    }
  .controls input:focus {
      border-color: #2d5a3d; box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.1);
    }

  .btn {
      border: none; padding: 8px 14px; border-radius: 8px;
      cursor: pointer; font-size: 14px; font-family: inherit;
      transition: 0.2s;
    }
  .btn:hover { opacity: 0.8; transform: translateY(-2px); }
  .share-btn { background: #25D366; color: white; }
  .copy-btn { background: #3b82f6; color: white; }
  .reset-btn { background: #ef4444; color: white; }

    #themeBtn {
      padding: 10px 18px; border: none; border-radius: 25px;
      background: #f0f0f0; color: #333; cursor: pointer;
      font-family: inherit; font-size: 15px;
    }
    #searchBox {
      width: 85%; max-width: 420px; padding: 12px 18px;
      border-radius: 25px; border: 2px solid #4ade80;
      font-family: inherit; font-size: 16px; text-align: center;
      outline: none; transition: 0.2s;
    }
    #searchBox:focus { border-color: #2d5a3d; box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.1); }

  .post-footer {
      margin-top: 15px;
      padding-top: 12px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
  .post-meta {
      font-size: 13px;
      color: #666;
    }
  .post-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

  .pagination {
      display: flex; gap: 10px; justify-content: center;
      margin: 30px 0; flex-wrap: wrap; align-items: center;
    }
  .pagination button {
      padding: 10px 16px; border: 2px solid #4ade80;
      background: white; color: #2d5a3d; border-radius: 12px;
      cursor: pointer; font-family: inherit; font-weight: bold;
      transition: 0.2s;
    }
  .pagination button:disabled {
      opacity: 0.4; cursor: not-allowed;
    }
  .pagination button.active {
      background: #4ade80; color: white;
    }
  .page-info {
      text-align: center; color: #2d5a3d; margin: 10px 0; font-size: 15px; font-weight: bold;
    }
  .jump-input {
      width: 70px; padding: 8px; border-radius: 8px; border: 2px solid #4ade80;
      text-align: center; font-family: inherit;
    }

  .lang-switch {
      position: fixed; top: 20px; left: 20px; z-index: 999;
      padding: 8px 12px; border: 2px solid #4ade80;
      background: white; color: #2d5a3d; border-radius: 20px;
      cursor: pointer; font-weight: bold; font-family: inherit;
      transition: 0.2s;
    }
  .lang-switch:hover { background: #4ade80; color: white; }

    body.dark {
      background: #0f0f0f; color: #e0e0e0;
    }
    body.dark h1, body.dark.page-info { color: #4ade80; }
    body.dark.post { background: #1e1e1e; border-color: #333; }
    body.dark.category { color: #4ade80; }
    body.dark.date, body.dark.post-meta { color: #999; }
    body.dark.post-footer { border-top-color: #333; }
    body.dark.controls button, body.dark.controls select, body.dark.controls input {
      background: #1e1e1e; border-color: #4ade80; color: #4ade80;
    }
    body.dark.controls button.active {
      background: #4ade80; color: #0f0f0f;
    }
    body.dark.pagination button {
      background: #1e1e1e; border-color: #4ade80; color: #4ade80;
    }
    body.dark.pagination button.active {
      background: #4ade80; color: #0f0f0f;
    }
    body.dark.jump-input {
      background: #1e1e1e; color: white; border-color: #4ade80;
    }
    body.dark #themeBtn { background: #333; color: white; }
    body.dark #searchBox { background: #1a1a1a; color: white; border: 2px solid #4ade80; }

    @media (max-width: 480px) {
    .post-actions.btn { min-width: 80px; font-size: 13px; padding: 6px 10px; }
    .post-footer { flex-direction: column; align-items: flex-start; }
    .controls { gap: 8px; }
    .controls button,.controls select,.controls input { font-size: 13px; padding: 8px 12px; }
    .lang-switch { top: 10px; left: 10px; font-size: 13px; padding: 6px 10px; }
    }
  </style>
</head>

<script>
const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo'; // 👈 حط المفتاح بتاعك هنا

    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    let allPosts = [];
    let currentFilter = 'all';
    let currentPage = 1;
    let postsPerPage = 20;
    let currentLang = localStorage.getItem('lang') || 'ar';

    const translations = {
      ar: {
        title: "متجر سيف - المحتوى الديني",

      },
      en: {

        noResults: "No results found 🔍 Try another keyword",
        found: "Found", of: "of", post: "posts", show: "Showing", perPage: "per page",

      es: {

        loading: "Cargando...",
        noResults: "No se encontraron resultados 🔍 Prueba otra palabra clave",
        found: "Encontrados", of: "de", post: "publicaciones", show: "Mostrando", perPage: "por página",
        page: "Página", ofPage: "de", prev: "⏮️ Anterior", next: "Siguiente ⏭️",
        views: "vistas", copied: "Texto copiado 📋", shared: "Publicación copiada 🌸",
        exported: "Exportadas", postAsCSV: "publicaciones como CSV 📊"
      },
      pt: {
        title: "Loja Seif - Conteúdo Islâmico",
        loading: "Carregando...",
        noResults: "Nenhum resultado encontrado 🔍 Tente outra palavra-chave",
        found: "Encontrados", of: "de", post: "publicações", show: "Mostrando", perPage: "por página",
        page: "Página", ofPage: "de", prev: "⏮️ Anterior", next: "Próximo ⏭️",
        views: "visualizações", copied: "Texto copiado 📋", shared: "Publicação copiada 🌸",
        exported: "Exportadas", postAsCSV: "publicações como CSV 📊"
      },
      de: {
        title: "Seif Shop - Islamische Inhalte",
        loading: "Lädt...",
        noResults: "Keine Ergebnisse gefunden 🔍 Versuchen Sie ein anderes Stichwort",
        found: "Gefunden", of: "von", post: "Beiträge", show: "Zeige", perPage: "pro Seite",
        page: "Seite", ofPage: "von", prev: "⏮️ Zurück", next: "Weiter ⏭️",
        views: "Aufrufe", copied: "Text kopiert 📋", shared: "Beitrag kopiert 🌸",
        exported: "Exportiert", postAsCSV: "Beiträge als CSV 📊"
      }
    };

    function changeLang(lang) {
      currentLang = lang;
      localStorage.setItem('lang', currentLang);
      applyLanguage();
      applyAll();
    }

    function applyLanguage() {
      const html = document.getElementById('htmlTag');
      const t = translations[currentLang];

      if(currentLang === 'ar') {
        html.lang = 'ar';
        html.dir = 'rtl';
        document.body.style.fontFamily = "'Tajawal', sans-serif";
      } else {
        html.lang = currentLang;
        html.dir = 'ltr';
        document.body.style.fontFamily = "'Poppins', sans-serif";
      }

      document.getElementById('langSelect').value = currentLang;

      document.querySelectorAll('[data-ar]').forEach(el => {
        const text = el.getAttribute(`data-${currentLang}`);
        if(el.tagName === 'INPUT') {
          el.placeholder = text;
        } else {
          el.textContent = text;
        }
      });

      document.getElementById('pageTitle').textContent = t.title;
      const isDark = document.body.classList.contains('dark');
      const themeText = isDark
       ? (currentLang === 'ar'? 'وضع نهاري' : currentLang === 'en'? 'Light Mode' : currentLang === 'es'? 'Modo claro' : currentLang === 'pt'? 'Modo claro' : 'Heller Modus')
        : (currentLang === 'ar'? 'وضع ليلي' : currentLang === 'en'? 'Dark Mode' : currentLang === 'es'? 'Modo oscuro' : currentLang === 'pt'? 'Modo escuro' : 'Dunkler Modus');
      document.getElementById('themeBtn').innerHTML = isDark? `☀️ ${themeText}` : `🌙 ${themeText}`;
    }

    async function loadPosts() {
  document.getElementById('postsContainer').innerHTML = '1- بدأ التحميل... المفتاح: ' + SUPABASE_KEY.substring(0,10) + '...';
  
  try {
    document.getElementById('postsContainer').innerHTML += '<br>2- بحاول أتصل بـ Supabase...';
    
    const { data, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });
    
    if(error) {
      document.getElementById('postsContainer').innerHTML = '❌ خطأ من Supabase: ' + error.message + '<br>الكود: ' + error.code;
      return;
    }
    
    document.getElementById('postsContainer').innerHTML = '✅ الداتا وصلت! عدد البوستات: ' + data.length + '<br>جاري العرض...';
    
    allPosts = data;
    applyLanguage();
    applyAll();
    
  } catch(e) {
    document.getElementById('postsContainer').innerHTML = '💥 الكود وقع قبل ما يوصل: ' + e.message;
  }
}

    function applyAll() {
      let result = [...allPosts];

      if(currentFilter!== 'all') {
        result = result.filter(p => p.category === currentFilter);
      }

      const catFilter = document.getElementById('categoryFilter').value;
      if(catFilter!== 'all') {
        result = result.filter(p => p.category === catFilter);
      }

      const keyword = document.getElementById('searchBox').value.trim().toLowerCase();
      const surahKeyword = document.getElementById('surahFilter').value.trim().toLowerCase();

      if(keyword || surahKeyword) {
        result = result.filter(p => {
          const text = (p.title + ' + p.content + ' + p.category).toLowerCase();
          let matchKeyword =!keyword || text.includes(keyword);
          let matchSurah =!surahKeyword || text.includes(surahKeyword);
          return matchKeyword && matchSurah;
        });
      }

      const sortBy = document.getElementById('sortSelect').value;
      if(sortBy === 'oldest') result.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      else if(sortBy === 'title') result.sort((a, b) => a.title.localeCompare(b.title, currentLang));
      else if(sortBy === 'views') result.sort((a, b) => (b.views || 0) - (a.views || 0));
      else result.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      displayPosts(result);
      renderPagination(result.length);
      updateStats(result.length, allPosts.length);
    }

    function displayPosts(posts) {
      const container = document.getElementById('postsContainer');
      const t = translations[currentLang];

      if(!posts || posts.length === 0) {
        container.innerHTML = `<p style="text-align:center; color:#666; padding:40px">${t.noResults}</p>`;
        return;
      }

      const start = (currentPage - 1) * postsPerPage;
      const pagePosts = posts.slice(start, start + postsPerPage);

      container.innerHTML = pagePosts.map(p => `
        <div class="post" onclick="addView(${p.id})">
          <h3 style="margin-bottom:12px">${p.title} <span class="category">${p.category}</span></h3>
          <p style="line-height: 1.8; margin: 10px 0;" id="content-${p.id}">${p.content}</p>

          <div class="post-footer">
            <div class="post-meta">
              📅 ${new Date(p.created_at).toLocaleDateString(currentLang === 'ar'? 'ar-EG' : currentLang, {day:'numeric', month:'long', year:'numeric'})}
              - 👁️ ${p.views || 0} ${t.views}
            </div>
            <div class="post-actions">
              <button class="btn copy-btn" onclick="copyPost(${p.id}); event.stopPropagation()">📋 ${currentLang === 'ar'? 'نسخ' : currentLang === 'en'? 'Copy' : currentLang === 'es'? 'Copiar' : currentLang === 'pt'? 'Copiar' : 'Kopieren'}</button>
              <button class="btn share-btn" onclick="sharePost(\`${p.title.replace(/`/g, '\\`')}\`, \`${p.content.replace(/`/g, '\\`')}\`); event.stopPropagation()">📤 ${currentLang === 'ar'? 'مشاركة' : currentLang === 'en'? 'Share' : currentLang === 'es'? 'Compartir' : currentLang === 'pt'? 'Compartilhar' : 'Teilen'}</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderPagination(totalPosts) {
      const totalPages = Math.ceil(totalPosts / postsPerPage);
      const paginationDiv = document.getElementById('pagination');
      const pageInfo = document.getElementById('pageInfo');
      const t = translations[currentLang];

      if(totalPages <= 1) {
        paginationDiv.innerHTML = '';
        pageInfo.innerHTML = '';
        return;
      }

      pageInfo.innerHTML = `${t.page} ${currentPage} ${t.ofPage} ${totalPages}`;

      let buttons = '';
      buttons += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 1? 'disabled' : ''}>${t.prev}</button>`;

      const startPage = Math.max(1, currentPage - 2);
      const endPage = Math.min(totalPages, startPage + 4);

      for(let i = startPage; i <= endPage; i++) {
        buttons += `<button onclick="goToPage(${i})" class="${i === currentPage? 'active' : ''}">${i}</button>`;
      }

      buttons += `<button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages? 'disabled' : ''}>${t.next}</button>`;
      buttons += `<input type="number" class="jump-input" min="1" max="${totalPages}" placeholder="${currentLang === 'ar'? 'رقم' : 'No.'}" onkeypress="if(event.key==='Enter') jumpToPage(this.value, ${totalPages})">`;

      paginationDiv.innerHTML = buttons;
    }

    function updateStats(total, all) {
      const t = translations[currentLang];
      document.getElementById('statsInfo').innerHTML =
        `📊 ${t.found} ${total} ${t.of} ${all} ${t.post} | ${t.show} ${postsPerPage} ${t.perPage}`;
    }

    function goToPage(page) {
      currentPage = page;
      applyAll();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function jumpToPage(page, max) {
      page = parseInt(page);
      if(page >= 1 && page <= max) {
        currentPage = page;
        applyAll();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function changePerPage() {
      postsPerPage = parseInt(document.getElementById('perPageSelect').value);
      currentPage = 1;
      applyAll();
    }

    function setFilter(category, btn) {
      currentFilter = category;
      currentPage = 1;
      document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyAll();
    }

    function clearAllFilters() {
      document.getElementById('searchBox').value = '';
      document.getElementById('surahFilter').value = '';
      document.getElementById('categoryFilter').value = 'all';
      currentFilter = 'all';
      currentPage = 1;
      document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
      document.querySelector('.controls button').classList.add('active');
      applyAll();
    }

    function resetAll() {
      clearAllFilters();
      document.getElementById('sortSelect').value = 'newest';
      document.getElementById('perPageSelect').value = '20';
      postsPerPage = 20;
      applyAll();
    }

    async function addView(id) {
      const post = allPosts.find(p => p.id === id);
      if(!post) return;

      const newViews = (post.views || 0) + 1;
      await sb.from('posts').update({ views: newViews }).eq('id', id);
      post.views = newViews;

      const postEl = document.querySelector(`#content-${id}`)?.closest('.post');
      const metaEl = postEl?.querySelector('.post-meta');
      if(metaEl) {
        const t = translations[currentLang];
        metaEl.innerHTML = metaEl.innerHTML.replace(/👁️ \d+.+/, `👁️ ${newViews} ${t.views}`);
      }
    }

    function copyPost(id) {
      const text = document.getElementById(`content-${id}`).innerText;
      navigator.clipboard.writeText(text);
      alert(translations[currentLang].copied);
    }

    function sharePost(title, content) {
      const t = translations[currentLang];
      const shareText = currentLang === 'ar'? 'من موقع المحتوى الديني' :
                       currentLang === 'en'? 'From Islamic Content Website' :
                       currentLang === 'es'? 'Del sitio de Contenido Islámico' :
                       currentLang === 'pt'? 'Do site de Conteúdo Islâmico' :
                       'Von der Islamische Inhalte Website';
      const text = `${title}\n\n${content}\n\n${shareText}`;
      if(navigator.share) {
        navigator.share({ title, text });
      } else {
        navigator.clipboard.writeText(text);
        alert(t.shared);
      }
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      const t = translations[currentLang];
      const isDark = document.body.classList.contains('dark');
      const themeText = isDark
       ? (currentLang === 'ar'? 'وضع نهاري' : currentLang === 'en'? 'Light Mode' : currentLang === 'es'? 'Modo claro' : currentLang === 'pt'? 'Modo claro' : 'Heller Modus')
        : (currentLang === 'ar'? 'وضع ليلي' : currentLang === 'en'? 'Dark Mode' : currentLang === 'es'? 'Modo oscuro' : currentLang === 'pt'? 'Modo escuro' : 'Dunkler Modus');
      document.getElementById('themeBtn').innerHTML = isDark? `☀️ ${themeText}` : `🌙 ${themeText}`;
      localStorage.setItem('theme', isDark? 'dark' : 'light');
    }

    window.onload = () => {
      if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
      }
      loadPosts();
    }

    function exportCSV() {
      let result = currentFilter === 'all'? [...allPosts] : allPosts.filter(p => p.category === currentFilter);

      const keyword = document.getElementById('searchBox').value.trim().toLowerCase();
      const surahKeyword = document.getElementById('surahFilter').value.trim().toLowerCase();
      if(keyword || surahKeyword) {
        result = result.filter(p => {
          const text = (p.title + ' + p.content + ' + p.category).toLowerCase();
          let matchKeyword =!keyword || text.includes(keyword);
          let matchSurah =!surahKeyword || text.includes(surahKeyword);
          return matchKeyword && matchSurah;
        });
      }

      const sortBy = document.getElementById('sortSelect').value;
      if(sortBy === 'oldest') result.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
      else if(sortBy === 'title') result.sort((a, b) => a.title.localeCompare(b.title, currentLang));
      else if(sortBy === 'views') result.sort((a, b) => (b.views || 0) - (a.views || 0));
      else result.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      const start = (currentPage - 1) * postsPerPage;
      const pagePosts = result.slice(start, start + postsPerPage);
      const t = translations[currentLang];

      const headers = currentLang === 'ar'? 'العنوان,التصنيف,المحتوى,التاريخ,المشاهدات\n' :
                     currentLang === 'de'? 'Titel,Kategorie,Inhalt,Datum,Aufrufe\n' :
                     'Title,Category,Content,Date,Views\n';

      let csv = headers;
      pagePosts.forEach(p => {
        const title = `"${p.title.replace(/"/g, '""')}"`;
        const category = `"${p.category}"`;
        const content = `"${p.content.replace(/"/g, '""').replace(/\n/g, ' ')}"`;
        const date = new Date(p.created_at).toLocaleDateString(currentLang === 'ar'? 'ar-EG' : currentLang);
        const views = p.views || 0;
        csv += `${title},${category},${content},${date},${views}\n`;
      });

      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', `posts-page${currentPage}.csv`);
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      alert(`${t.exported} ${pagePosts.length} ${t.postAsCSV}`);
    }
  </script>
</body>
</html>
