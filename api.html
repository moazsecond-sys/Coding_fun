<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>منيو البرجر</title>
</head>
<body>
  <h1>قائمة البرجر من الـ API</h1>
  <ul id="menu-list"></ul>

  <!-- المكتبة الأول -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- الكود بتاعنا بعدها -->
  <script>
  const SUPABASE_URL = 'https://mirrxytqttjglxrarq.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';
  
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const list = document.getElementById("menu-list");
  
  async function loadMenu() {
    list.innerHTML = '<li>جاري التحميل...</li>';
    
    const { data, error, count } = await supabase.from('menu').select('*', { count: 'exact' });
    
    console.log('Error:', error);
    console.log('Count:', count); 
    console.log('Data:', data);
    
    if (error) {
      list.innerHTML = `<li>خطأ Supabase: ${error.message}</li>`;
      return;
    }
    
    if (count === 0) {
      list.innerHTML = '<li>الجدول فاضي - مفيهوش أي صفوف</li>';
      return;
    }
    
    list.innerHTML = `<li>لقيت ${count} صنف</li>`;
    data.forEach(item => {
      list.innerHTML += `<li>${JSON.stringify(item)}</li>`;
    });
  }
  
  loadMenu();
  </script>
</body>
</html>
