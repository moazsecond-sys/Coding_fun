    // 2. نجيب الداتا من Supabase ونعرضها
const list = document.getElementById("menu-list");

async function loadMenu() {
  list.innerHTML = '<li>جاري التحميل...</li>';
  
  const { data, error } = await supabase.from('menu').select('*');
  
  console.log('Data:', data); // افتح F12 وشوف الـ Console
  console.log('Error:', error);
  
  if (error) {
    list.innerHTML = '<li>خطأ: ' + error.message + '</li>';
    return;
  }
  
  if(!data || data.length === 0) {
    list.innerHTML = '<li>الداتا فاضية - الجدول مفيهوش صفوف</li>';
    return;
  }
  
  list.innerHTML = '';
  data.forEach(item => {
    list.innerHTML += `<li>${item.name} - ${item.price}$</li>`;
  });
}

loadMenu();
</script>
