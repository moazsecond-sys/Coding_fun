<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>منيو البرجر</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:Tahoma;padding:20px;background:#fff3e0;text-align:center}
    h1{color:#e65100}
    .item{background:white;padding:15px;margin:10px auto;border-radius:10px;max-width:400px;display:flex;justify-content:space-between;font-size:18px}
    .price{color:#d32f2f;font-weight:bold}
  </style>
</head>
<body>
  <h1>🍔 منيو البرجر</h1>
  <div id="list">جاري التحميل...</div>
  
  <script>
  // دول صح خلاص من الصورة بتاعتك
  const URL = 'https://mirrxytqttjglxrarq.supabase.co';
  const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';
  
  const supabase = window.supabase.createClient(URL, KEY);
  
  supabase.from('menu').select('*').then(({data,error})=>{
    if(error){
      document.getElementById('list').innerHTML = 'خطأ: ' + error.message;
      return;
    }
    if(data.length === 0){
      document.getElementById('list').innerHTML = 'الجدول فاضي';
      return;
    }
    document.getElementById('list').innerHTML = data.map(i=>`
      <div class="item">
        <span>${i.name}</span>
        <span class="price">${i.price}$</span>
      </div>
    `).join('');
  });
  </script>
</body>
</html>
