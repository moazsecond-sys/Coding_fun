<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تشخيص Supabase</title>
  <style>body{font-family:Arial;padding:20px} li{background:#fff;padding:10px;margin:5px;border-radius:5px}</style>
</head>
<body>
  <h1>تشخيص الاتصال</h1>
  <ul id="menu-list"><li>1. بدأ التحميل...</li></ul>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  const list = document.getElementById("menu-list");
  
  async function loadMenu() {
    list.innerHTML += '<li>2. المكتبة اتحملت</li>';
    
    const supabase = window.supabase.createClient(
      'https://mirrxytqttjglxrarq.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo'
    );
    
    list.innerHTML += '<li>3. Client اتعمل</li>';
    
    try {
      list.innerHTML += '<li>4. قبل ما نطلب الداتا...</li>';
      const { data, error } = await supabase.from('menu').select('*');
      list.innerHTML += '<li>5. بعد ما طلبنا الداتا</li>';
      
      if (error) list.innerHTML += `<li style="color:red">خطأ: ${error.message}</li>`;
      else list.innerHTML += `<li>الداتا: ${JSON.stringify(data)}</li>`;
      
    } catch (err) {
      list.innerHTML += `<li style="color:red">Catch Error: ${err.message}</li>`;
    }
  }
  
  loadMenu();
  </script>
</body>
</html>
