<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>دخول</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-family:tahoma}
.box{background:#1e293b;padding:30px;border-radius:12px;width:320px}
input{width:100%;padding:10px;margin:8px 0;border:0;border-radius:6px;background:#334155;color:white}
button{width:100%;padding:12px;margin-top:12px;background:#3b82f6;color:white;border:0;border-radius:6px;cursor:pointer}
#err{color:#f87171;text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="box">
<h2>دخول الادمن</h2>
<input id="email" type="email" placeholder="الايميل">
<input id="pass" type="password" placeholder="الباسورد">
<button onclick="doLogin()">دخول</button>
<p id="err"></p>
</div>

<script>
const SUPABASE_URL = "https://mirrxytqttjglglxrarq.supabase.co";
const SUPABASE_KEY = "sb_publishable_FXUmqRa_eAjdgWdZpFl-tA_YQM4FSnQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function doLogin(){
alert('1- الزر ضغط');
const email = document.getElementById('email').value.trim();
const pass = document.getElementById('pass').value;

alert('2- الايميل: ' + email);

const {data, error} = await supabase.auth.signInWithPassword({email, password: pass});

if(error){
alert('3- خطأ تسجيل: ' + error.message);
document.getElementById('err').textContent = error.message;
return;
}

alert('4- تسجيل ناجح! بنفحص الرول');
const role = data.user?.app_metadata?.role;
alert('5- الرول حقك: ' + role);

if(role === 'admin'){
alert('6- انت ادمن! بنحولك');
window.location.href = 'index.html';
} else {
await supabase.auth.signOut();
alert('7- مو ادمن. الرول = ' + role);
document.getElementById('err').textContent = 'مو ادمن';
}
</script>
</body>
</html>
