<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول الادمن</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Tahoma; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .box { background: #1e293b; padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
    h2 { color: #38bdf8; margin-bottom: 30px; }
    input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; background: #334155; color: white; font-size: 16px; }
    button { width: 100%; padding: 15px; background: #0ea5e9; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; }
    button:disabled { background: #475569; }
    #error { color: #f87171; margin-top: 15px; display: none; }
  </style>
</head>
<body>
  <div class="box">
    <h2>تسجيل دخول الادمن</h2>
    <input type="email" id="email" placeholder="الايميل" value="moazsecond@gmail.com">
    <input type="password" id="password" placeholder="كلمة السر">
    <button onclick="login()">دخول</button>
    <p id="error"></p>
  </div>

  <script>
    const SUPABASE_URL = "https://mirrxytqttjglglxrarq.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.querySelector('button');
      const error = document.getElementById('error');
      
      btn.disabled = true;
      btn.innerText = 'جاري الدخول...';
      error.style.display = 'none';

      // 1. سجل دخول اول
      const { data, error: loginError } = await supabase.auth.signInWithPassword({
        email, password
      });

      if (loginError) {
        error.innerText = 'كلمة السر او الايميل غلط';
        error.style.display = 'block';
        btn.disabled = false;
        btn.innerText = 'دخول';
        return;
      }

      // 2. بعد الدخول، جدد التوكن وجيب البيانات
      await supabase.auth.refreshSession();
      const { data: { user } = await supabase.auth.getUser();

      // 3. فحص الادمن من الداتا بيز
      if (user.user_metadata?.role === 'admin') {
        // حط في localStorage عشان الصفحات الثانية
        localStorage.setItem('role', 'authenticated');
        localStorage.setItem('user_email', user.email);
        
        // روح للوحة التحكم
        window.location.href = 'home.html';
      } else {
        error.innerText = 'انت مو ادمن - تواصل مع المالك';
        error.style.display = 'block';
        await supabase.auth.signOut();
        btn.disabled = false;
        btn.innerText = 'دخول';
      }
    }
  </script>
</body>
</html>
