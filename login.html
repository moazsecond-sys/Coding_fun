<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>دخول الادمن</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3"></script>
<style>body{font-family:Cairo;background:#0f172a;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}.box{background:#1e293b;padding:30px;border-radius:16px;width:340px}input{width:100%;padding:14px;margin:10px 0;border:1px solid #334155;border-radius:10px;background:#0f172a;color:#fff}button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;background:#38bdf8;color:#0f172a;font-weight:bold;cursor:pointer}#error{display:none;margin-top:12px;text-align:center;padding:10px;border-radius:8px}</style>
</head>
<body>
<div class="box">
<h2 style="text-align:center;color:#38bdf8">دخول لوحة التحكم</h2>
<input type="email" id="email" value="moazsecond@gmail.com" readonly>
<input type="password" id="password" placeholder="كلمة السر">
<button onclick="login()">دخول</button>
<div id="error"></div>
</div>
<script>
const supabaseUrl = 'https://mirrxytqttjglglxrarq.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function login(){
  const err=document.getElementById('error');err.style.display='none';
  const pass=document.getElementById('password').value.trim();
  if(!pass){err.innerText='⚠️ ادخل كلمة السر';err.style.display='block';err.style.background='#7f1d1d';err.style.color='#fecaca';return}
  err.innerText='⏳ جاري التحقق...';err.style.display='block';err.style.background='#1e3a8a';err.style.color='#bfdbfe';
  try{
    await supabase.auth.signInWithPassword({email:document.getElementById('email').value,password:pass});
    const {data:{user}}=await supabase.auth.getUser();
    if(user?.app_metadata?.role==='admin'){
      err.innerText='✅ نجحت! جاري الدخول...';err.style.background='#14532d';err.style.color='#bbf7d0';
      setTimeout(()=>window.location.href='home.html',1000)
    }else{
      err.innerText='❌ انت مو ادمن - روح سوي SQL';err.style.background='#7f1d1d';err.style.color='#fecaca';
      await supabase.auth.signOut()
    }
  }catch(e){err.innerText='❌ خطأ: '+e.message;err.style.background='#7f1d1d';err.style.color='#fecaca'}
}
</script>
</body>
</html>
