<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول الادمن</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3"></script>
<style>
* {box-sizing: border-box;}
body {font-family: 'Cairo', Tahoma; background: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;}
.box {background: #1e293b; padding: 30px; border-radius: 16px; width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
h2 {text-align: center; margin: 0 0 20px; color: #38bdf8;}
input {width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #334155; border-radius: 10px; background: #0f172a; color: #fff; font-size: 16px; outline: none;}
input:focus {border-color: #38bdf8;}
button {width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 10px; background: #38bdf8; color: #0f172a; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s;}
button:hover {background: #0ea5e9;}
#error {display: none; margin-top: 12px; font-size: 14px; text-align: center; padding: 10px; border-radius: 8px;}
</style>
</head>
<body>
<div class="box">
<h2>دخول لوحة التحكم</h2>
<input type="email" id="email" value="moazsecond@gmail.com" readonly>
<input type="password" id="password" placeholder="كلمة السر" autocomplete="current-password">
<button onclick="login()">دخول</button>
<div id="error"></div>
</div>

<script>
// 1. حط رابط مشروعك هنا
const supabaseUrl = 'https://mirrxytqttjglglxrarq.supabase.co';

// 2. حط anon key هنا - انسخ لصق بدون مسافات
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';

// 3. انشاء الاتصال
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function login() {
  const err = document.getElementById('error');
  err.style.display = 'none';
  
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value.trim();

  if(!pass) {
    err.innerText = '⚠️ ادخل كلمة السر';
    err.style.display = 'block';
    err.style.background = '#7f1d1d';
    err.style.color = '#fecaca';
    return;
  }

  err.innerText = '⏳ جاري التحقق...';
  err.style.display = 'block';
  err.style.background = '#1e3a8a';
  err.style.color = '#bfdbfe';

  try {
    // تسجيل الدخول
    const { error } = await supabase.auth.signInWithPassword({email, password: pass});
    if(error) throw error;

    // نجيب بيانات المستخدم عشان نقرأ role من app_metadata
    const { data: { user } = await supabase.auth.getUser();

    if(user?.app_metadata?.role === 'admin') {
      err.innerText = '✅ نجحت! جاري الدخول للوحة...';
      err.style.background = '#14532d';
      err.style.color = '#bbf7d0';
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 1000);
    } else {
      err.innerText = '❌ انت مو ادمن';
      err.style.background = '#7f1d1d';
      err.style.color = '#fecaca';
      await supabase.auth.signOut();
    }

  } catch(e) {
    err.innerText = '❌ خطأ: ' + e.message;
    err.style.background = '#7f1d1d';
    err.style.color = '#fecaca';
  }
}

// دخول بزر Enter
document.getElementById('password').addEventListener('keypress', e => {
  if(e.key === 'Enter') login();
});
</script>
</body>
</html>
