<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#0f172a;color:white;display:flex;align-items:center;justify-content:center;height:100vh;font-family:tahoma;margin:0}
.box{background:#1e293b;padding:30px;border-radius:12px;width:320px}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:0}
button{background:#38bdf8;color:#0f172a;font-weight:bold;cursor:pointer}
button:hover{background:#0ea5e9}
h2{text-align:center;margin-bottom:20px;color:#38bdf8}
</style>
</head>
<body>
<div class="box">
  <h2>تسجيل دخول الادمن</h2>
  <input type="email" id="email" placeholder="الايميل">
  <input type="password" id="pass" placeholder="كلمة السر">
  <button onclick="login()">دخول</button>
  <p id="msg" style="color:#f87171;margin-top:10px"></p>
</div>

<script>
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');

// ==========================================
// كود مسح التوكن القديم - انسخه الحين بس
// بعد ما تسجل دخول مرة وحدة وتضبط، احذف السطرين هذي
// ==========================================
sb.auth.signOut();
localStorage.clear();
sessionStorage.clear();
// ==========================================
// انتهى كود المسح
// ==========================================

async function login(){
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;
  const msg = document.getElementById('msg');
  
  const {data, error} = await sb.auth.signInWithPassword({email, pass});
  
  if(error){
    msg.innerText = 'خطأ: ' + error.message;
    return;
  }
  
  const role = data.user.app_metadata?.role;
  
  if(role === 'admin'){
    window.location.replace('home.html');
  } else {
    msg.innerText = 'انت مو ادمن';
    await sb.auth.signOut();
  }
}
</script>
</body>
</html>
