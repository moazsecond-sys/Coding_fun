<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-family:tahoma}
.box{background:#1e293b;padding:30px;border-radius:12px;width:320px}
h2{text-align:center;margin-bottom:20px}
input{width:100%;padding:10px;margin:8px 0;border:0;border-radius:6px;background:#334155;color:white;box-sizing:border-box}
button{width:100%;padding:12px;margin-top:12px;background:#3b82f6;color:white;border:0;border-radius:6px;cursor:pointer;font-weight:bold}
button:hover{background:#2563eb}
#err{color:#f87171;text-align:center;margin-top:10px;min-height:20px;font-size:14px}
</style>
</head>
<body>
<div class="box">
<h2>تسجيل دخول الادمن</h2>
<input id="email" type="email" placeholder="الايميل">
<input id="pass" type="password" placeholder="كلمة السر">
<button onclick="login()">دخول</button>
<p id="err"></p>
</div>

<script>
const SUPABASE_URL = "https://mirrxytqttjglglxrarq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login(){
document.getElementById('err').textContent = 'جاري الدخول...';
const email = document.getElementById('email').value.trim();
const pass = document.getElementById('pass').value;

const {data, error} = await supabase.auth.signInWithPassword({email, password: pass});

if(error){
document.getElementById('err').textContent = error.message;
return;
}

const user = data?.user;
const role = user?.app_metadata?.role;

if(role === 'admin'){
window.location.href = 'index.html';
} else {
await supabase.auth.signOut();
document.getElementById('err').textContent = 'غير مسموح: هذا الحساب مو ادمن';
}
</script>
</body>
</html>
