<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#0f172a;color:white;display:flex;align-items:center;justify-content:center;height:100vh;font-family:tahoma;margin:0}
.box{background:#1e293b;padding:30px;border-radius:12px;width:320px}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:0}
button{background:#38bdf8;color:#0f172a;font-weight:bold;cursor:pointer}
button:hover{background:#0ea5e9}
h2{text-align:center;margin-bottom:20px;color:#38bdf8}
</style>
</head>
<body>
<div class="box">
  <h2>تسجيل دخول الادمن</h2>
  <input type="email" id="email" placeholder="الايميل">
  <input type="password" id="pass" placeholder="كلمة السر">
  <button onclick="login()">دخول</button>
  <p id="msg" style="color:#f87171;margin-top:10px"></p>
</div>

<script>
// ===== حط بياناتك هنا =====
const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
// =========================

async function login(){
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value.trim();
  const msg = document.getElementById('msg');
  
  if(!email || !pass){
    msg.innerText = 'اكتب الايميل والباسوورد';
    return;
  }
  
  msg.innerText = 'جاري التحقق...';
  
  // الغلطة كانت هنا: لازم password مو pass
  const {data, error} = await sb.auth.signInWithPassword({
    email: email, 
    password: pass
  });
  
  if(error){
    msg.innerText = 'خطأ: ' + error.message;
    console.log('تفاصيل الخطأ:', error);
    return;
  }
  
  const role = data.user.app_metadata?.role;
  
  if(role === 'admin'){
    msg.innerText = 'تم الدخول! جاري التحويل...';
    window.location.replace('home.html');
  } else {
    msg.innerText = 'انت مو ادمن';
    await sb.auth.signOut();
  }
}
</script>
</body>
</html>
