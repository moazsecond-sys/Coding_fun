<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>دخول</title>
<style>
body{margin:0;background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;font-family:tahoma}
.box{background:#16213e;padding:40px;border-radius:20px;text-align:center;color:white;width:90%;max-width:350px}
input{width:100%;padding:14px;margin:15px 0;border:0;border-radius:8px;font-size:18px;text-align:center;background:#0f3460;color:white}
button{width:100%;background:#e94560;border:0;padding:14px;border-radius:8px;color:white;font-size:18px;cursor:pointer;font-weight:bold}
.error{color:#ff6b6b;margin-top:10px}
</style>
</head>
<body>
<div class="box">
<h2>🔒 دخول اللوحة</h2>
<input type="password" id="pin" placeholder="اكتب الكود السري" autocomplete="off">
<button onclick="check()">دخول</button>
<p id="msg" class="error"></p>
</div>

<script>
function check() {
  const pin = document.getElementById('pin').value;
  const msg = document.getElementById('msg');
  
  // غير الكود هذا للكود اللي تبغاه انت بس
  if (pin === 'Moaz2026!@#') {
    localStorage.setItem('logged', 'true');
    window.location.href = 'home.html';
  } else {
    msg.innerText = 'كود غلط ❌';
    document.getElementById('pin').value = '';
  }
}
</script>
</body>
</html>
