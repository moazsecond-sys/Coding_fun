<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول الادمن</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body {font-family: 'Cairo', sans-serif; background: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;}
.box {background: #1e293b; padding: 30px; border-radius: 12px; width: 320px; box-shadow: 0 0 20px rgba(0,0,0,0.5);}
input {width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; background: #334155; color: #fff; font-size: 16px;}
button {width: 100%; padding: 12px; border: none; border-radius: 8px; background: #38bdf8; color: #0f172a; font-weight: bold; font-size: 16px; cursor: pointer;}
button:hover {background: #0ea5e9;}
#error {display: none; margin-top: 10px; font-size: 14px; text-align: center;}
</style>
</head>
<body>
<div class="box">
<h2 style="text-align:center; margin-bottom:20px;">دخول لوحة التحكم</h2>
<input type="email" id="email" placeholder="الايميل" value="moazsecond@gmail.com">
<input type="password" id="password" placeholder="كلمة السر">
<button onclick="login()">دخول</button>
<div id="error"></div>
</div>

<script>
const supabaseUrl = 'https://mirrxytqttjglglxrarq.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function login() {
  const err = document.getElementById('error');
  err.style.display = 'none';
  
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value.trim();

  if(!pass) {
    err.innerText = 'ادخل كلمة السر';
    err.style.display = 'block';
    err.style.color = '#f87171';
    return;
  }

  err.innerText = 'جاري التحقق...';
  err.style.display = 'block';
  err.style.color = '#38bdf8';

  try {
    const { data, error } = await supabase.auth.signInWithPassword({email, password: pass});

    if(error) {
      err.innerText = 'كلمة السر غلط';
      err.style.color = '#f87171';
      return;
    }

    // نجيب بيانات المستخدم كاملة عشان نقرأ app_metadata
    const { data: { user } = await supabase.auth.getUser();

    if(user?.app_metadata?.role === 'admin') {
      err.innerText = 'نجحت! جاري الدخول...';
      err.style.color = '#4ade80';
      setTimeout(() => {
        window.location.href = 'home.html';
      }, 800);
    } else {
      err.innerText = 'انت مو ادمن';
      err.style.color = '#f87171';
      await supabase.auth.signOut();
    }

  } catch(e) {
    err.innerText = 'خطأ: ' + e.message;
    err.style.color = '#f87171';
  }
}
</script>
</body>
</html>
