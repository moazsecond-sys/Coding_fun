<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نشر مشروع جديد ➕</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>نشر مشروع جديد ➕</h1>
      <a href="index.html" class="btn btn-primary">الصفحة الرئيسية</a>
      <a href="categories.html" class="btn">تصفح الأقسام 📁</a>
    </div>

    <div class="card">
      <div id="msg"></div>
      
      <label>عنوان المشروع</label>
      <input type="text" id="title" placeholder="مثال: موقع متجر إلكتروني">

      <label>الوصف</label>
      <textarea id="desc" rows="4" placeholder="اكتب وصف مختصر عن مشروعك..."></textarea>

      <label>رابط الصورة</label>
      <input type="url" id="img" placeholder="https://...">

      <label>القسم</label>
      <select id="cat">
        <option value="عام">عام 🌍</option>
        <option value="برمجة">برمجة 💻</option>
        <option value="تصميم">تصميم 🎨</option>
        <option value="مقالات">مقالات 📝</option>
      </select>

      <button class="btn btn-primary" onclick="publish()">نشر المشروع</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="add.js"></script>
</body>
</html>
