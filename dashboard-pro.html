<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة تحكم برو ماكس ألترا</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f7fa; --card:#ffffff; --text:#2d3748; --border:#e2e8f0; 
  --primary:#6366f1; --primary-dark:#4f46e5; --hover:#f8fafc; 
  --success:#10b981; --danger:#ef4444; --warning:#f59e0b;
  --shadow:0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
}
body.dark{
  --bg:#0f172a; --card:#1e293b; --text:#f1f5f9; --border:#334155; 
  --primary:#818cf8; --primary-dark:#6366f1; --hover:#1e293b; 
  --success:#34d399; --danger:#f87171; --warning:#fbbf24;
  --shadow:0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -1px rgba(0,0,0,0.2);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,0.4), 0 4px 6px -2px rgba(0,0,0,0.3);
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Tajawal', 'Segoe UI', Tahoma, sans-serif;
  padding:20px;max-width:1400px;margin:0 auto;
  background:var(--bg);color:var(--text);
  transition:background 0.3s, color 0.3s;
  font-weight:400;line-height:1.6
}

.box{
  padding:24px;background:var(--card);border-radius:16px;
  box-shadow:var(--shadow);margin-bottom:20px;
  border:1px solid var(--border);transition:all 0.3s
}
.box:hover{box-shadow:var(--shadow-lg)}

h2,h3{font-weight:800;margin-bottom:16px;color:var(--text)}

input,button,select{
  padding:14px 16px;margin:8px 0;width:100%;border-radius:12px;
  border:2px solid var(--border);font-size:15px;
  background:var(--card);color:var(--text);
  font-family:'Tajawal', sans-serif;font-weight:500;
  transition:all 0.2s
}
input:focus,select:focus{
  outline:none;border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(99,102,241,0.1)
}

button{
  background:linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color:white;border:none;cursor:pointer;font-weight:700;
  transition:all 0.2s;letter-spacing:0.3px
}
button:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(99,102,241,0.3)
}
button:active:not(:disabled){transform:translateY(0)}
button:disabled{background:#cbd5e1;cursor:not-allowed;transform:none}

.btn-danger{
  background:linear-gradient(135deg, var(--danger) 0%, #dc2626 100%)
}
.btn-danger:hover:not(:disabled){
  box-shadow:0 10px 20px rgba(239,68,68,0.3)
}
.btn-edit{
  background:linear-gradient(135deg, var(--warning) 0%, #d97706 100%);
  color:white
}
.btn-success{
  background:linear-gradient(135deg, var(--success) 0%, #059669 100%)
}
.btn-small{
  width:auto;padding:8px 16px;margin:4px;font-size:13px;
  border-radius:8px
}

#crud{display:none}

.top-bar{
  display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center
}
.top-bar input,.top-bar select{flex:1;min-width:160px;margin:0}

.stats{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;margin-bottom:24px
}
.stat-card{
  background:var(--card);padding:20px;border-radius:16px;
  text-align:center;border:2px solid var(--border);
  transition:all 0.3s;box-shadow:var(--shadow)
}
.stat-card:hover{
  transform:translateY(-4px);border-color:var(--primary);
  box-shadow:var(--shadow-lg)
}
.stat-num{
  font-size:36px;font-weight:800;color:var(--primary);margin-bottom:8px
}
.stat-card div:last-child{
  font-size:14px;color:var(--text);opacity:0.7;font-weight:500
}

.loading{
  text-align:center;padding:60px;color:var(--text);
  font-size:18px;font-weight:500;opacity:0.6
}

/* Toast */
.toast{
  position:fixed;top:24px;left:50%;transform:translateX(-50%);
  background:var(--card);padding:16px 28px;border-radius:12px;
  box-shadow:var(--shadow-lg);border-right:5px solid var(--success);
  z-index:9999;display:none;font-weight:600;font-size:15px
}
.toast.show{display:block;animation:slideDown 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes slideDown{
  from{top:-60px;opacity:0;transform:translateX(-50%) scale(0.9)}
  to{top:24px;opacity:1;transform:translateX(-50%) scale(1)}
}

/* جدول */
.table-wrap{
  overflow-x:auto;border:2px solid var(--border);
  border-radius:16px;max-height:600px;box-shadow:var(--shadow)
}
table{
  width:100%;border-collapse:collapse;text-align:right;
  min-width:800px;background:var(--card)
}
thead th{
  position:sticky;top:0;z-index:2;
  background:linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color:white;padding:18px 16px;border:none;font-weight:800;
  font-size:15px;cursor:pointer;transition:all 0.2s
}
thead th:hover{filter:brightness(1.1)}
th.sort-asc::after{content:" ▲";font-size:12px} 
th.sort-desc::after{content:" ▼";font-size:12px}
tbody td{
  padding:16px;border-bottom:1px solid var(--border);
  font-size:14px;font-weight:500
}
tbody tr:last-child td{border-bottom:none}
tbody tr:nth-child(even){background:var(--hover)}
tbody tr.selected{background:#fef3c7!important}
body.dark tbody tr.selected{background:#451a03!important}
tbody tr:hover{background:var(--hover)}
th:first-child, td:first-child{
  position:sticky;right:0;z-index:1;background:inherit;
  width:60px;text-align:center
}
th:last-child, td:last-child{
  position:sticky;left:0;z-index:1;background:inherit;
  box-shadow:-4px 0 8px rgba(0,0,0,0.05);min-width:180px
}
thead th:first-child{z-index:3} 
thead th:last-child{z-index:3}
.actions{white-space:nowrap;text-align:center}

/* Pagination */
.pagination{
  display:flex;gap:8px;justify-content:center;
  align-items:center;margin-top:24px;flex-wrap:wrap
}
.pagination button{
  min-width:44px;width:auto;padding:10px 14px;
  font-weight:600;border-radius:10px
}
.pagination button.active{
  background:var(--success);color:white;
  box-shadow:0 4px 12px rgba(16,185,129,0.3)
}
.pagination-info{
  color:var(--text);font-size:14px;font-weight:600;
  opacity:0.7;margin:0 12px
}

/* كروت */
.cards-wrap{
  display:none;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px
}
.card{
  border:2px solid var(--border);border-radius:20px;padding:20px;
  background:var(--card);box-shadow:var(--shadow);
  transition:all 0.3s;position:relative
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:var(--shadow-lg);border-color:var(--primary)
}
.card.selected{
  border-color:var(--primary);background:var(--hover);
  box-shadow:0 0 0 3px rgba(99,102,241,0.2)
}
.card-check{
  position:absolute;top:16px;left:16px;
  width:20px;height:20px;cursor:pointer
}
.card-id{
  font-size:13px;color:var(--text);opacity:0.5;
  margin-bottom:12px;font-weight:600
}
.card-title{
  font-size:20px;font-weight:800;margin-bottom:12px;
  color:var(--text);line-height:1.4
}
.card-date{
  font-size:13px;color:var(--text);opacity:0.6;
  margin-bottom:16px;font-weight:500
}
.card-actions{
  text-align:center;border-top:2px solid var(--border);
  padding-top:16px;margin-top:16px
}

/* موبايل */
@media screen and (max-width: 768px) {
  body{padding:12px}
  .box{padding:16px;border-radius:12px}
  h2{font-size:20px} h3{font-size:18px}
  
  thead{display:none}
  table, tbody, tr, td{display:block;width:100%}
  tr{
    margin-bottom:16px;border:2px solid var(--border);
    border-radius:16px;padding:16px;position:relative;
    background:var(--card);box-shadow:var(--shadow)
  }
  td{
    border:none;border-bottom:1px solid var(--border);
    padding:14px 5px;text-align:right;position:relative;
    padding-right:45%;font-size:15px
  }
  td::before{
    content: attr(data-label);position:absolute;right:12px;top:14px;
    font-weight:800;color:var(--primary);font-size:13px
  }
  td:first-child, td:last-child{
    position:static;box-shadow:none;padding-right:5px;
    text-align:center;border-bottom:none
  }
  .table-wrap{overflow-x:hidden;max-height:none;border:none;box-shadow:none}
  
  .top-bar{flex-direction:column;gap:10px}
  .top-bar input,.top-bar select{width:100%}
  
  .stats{grid-template-columns:repeat(2,1fr);gap:12px}
  .stat-num{font-size:28px}
  
  .cards-wrap{grid-template-columns:1fr}
}

/* زر اختبرني */
.test-btn{
  position:fixed;top:16px;left:16px;z-index:9999;
  background:linear-gradient(135deg, #10b981 0%, #059669 100%);
  color:white;padding:12px 20px;border-radius:12px;
  font-weight:700;font-size:14px;box-shadow:var(--shadow-lg);
  border:none;cursor:pointer
}
</style>
</head>
<body>
  <button class="test-btn" onclick="alert('الموقع عايش ✅')">اختبرني</button>

<div id="toast" class="toast"></div>
<button onclick="دخول_طوارئ()" style="background:linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);color:white;padding:14px;margin:16px 0;width:100%;border-radius:12px;font-weight:700">
🚨 دخول طوارئ - استخدمه مرة واحدة بس</button>
<div id="errorBox" style="background:#fee2e2;color:var(--danger);padding:16px;margin:16px 0;border:2px solid var(--danger);border-radius:12px;display:none;font-size:14px;text-align:center;font-weight:600"></div>

<div id="login" class="box">
  <h2>🔐 تسجيل دخول</h2>
  <p style="margin-bottom:20px;opacity:0.7;font-weight:500">سجل دخول بحساب GitHub بتاعك</p>
  <button onclick="تسجيل_بجيت_هب()" style="background:#24292e;color:white;padding:16px;width:100%;border:none;border-radius:12px;font-size:16px;cursor:pointer;font-weight:700">
    🐙 دخول بـ GitHub
  </button>
</div>

<div id="crud">
  <div class="box" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
    <h2>🚀 لوحة تحكم برو ماكس ألترا</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-small" onclick="تبديل_الثيم()">🌙 ثيم</button>
      <button class="btn-small" onclick="عرض_البيانات()">🔄 تحديث</button>
      <button onclick="تسجيل_خروج()">خروج</button>
    </div>
  </div>

  <div class="stats" id="statsBox"></div>

  <div class="box">
    <h3>➕ إضافة جديد</h3>
    <input id="title" placeholder="اكتب العنوان هنا + Enter" onkeypress="if(event.key=='Enter') اضافة()">
    <button id="btnAdd" onclick="اضافة()">نشر الآن</button>
  </div>

  <div class="box">
    <h3>📊 البيانات</h3>
    <div class="top-bar">
      <input id="search" placeholder="ابحث في الكل... Ctrl+F" onkeyup="بحث()">
      <select id="sortSelect" onchange="ترتيب_من_سلكت()">
        <option value="id-desc">ID تنازلي</option>
        <option value="id-asc">ID تصاعدي</option>
        <option value="عنوان-asc">العنوان أ-ي</option>
        <option value="عنوان-desc">العنوان ي-أ</option>
      </select>
      <select id="perPage" onchange="تغيير_عدد_الصفحات()">
        <option value="10">10 في الصفحة</option>
        <option value="25">25 في الصفحة</option>
        <option value="50">50 في الصفحة</option>
      </select>
      <button class="btn-success" onclick="تصدير_اكسل()">📥 Excel</button>
      <button class="btn-success" onclick="تبديل_العرض()">🔄 عرض</button>
      <button class="btn-danger" id="btnDeleteSelected" onclick="حذف_المحدد()" style="display:none">🗑️ حذف المحدد</button>
      <span id="count" style="font-weight:700">0 سجل</span>
    </div>

    <div id="tableView" class="table-wrap">
      <table id="dataTable">
        <thead>
          <tr>
            <th><input type="checkbox" id="checkAll" onchange="تحديد_الكل()"></th>
            <th onclick="ترتيب_عمود('id')">ID</th>
            <th onclick="ترتيب_عمود('عنوان')">العنوان</th>
            <th onclick="ترتيب_عمود('created_at')">التاريخ</th>
            <th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="tableBody"><tr><td colspan="5" class="loading">⏳ جاري التحميل...</td></tr></tbody>
      </table>
    </div>

    <div id="cardsView" class="cards-wrap"></div>

    <div id="paginationBox" class="pagination"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.skypack.dev/@supabase/supabase-js@2.45.4'
const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo' // <-- حط المفتاح هنا
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

let allData = [], filteredData = []
let selectedIds = new Set()
let viewMode = localStorage.getItem('view_mode') || 'table'
let sortColumn = localStorage.getItem('sort_col') || 'id'
let sortAsc = localStorage.getItem('sort_asc') === 'true'
let currentPage = 1
let perPage = parseInt(localStorage.getItem('per_page')) || 10

if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark')
document.getElementById('perPage').value = perPage

function showToast(msg, type='success') {
  const toast = document.getElementById('toast')
  toast.textContent = msg
  toast.style.borderRightColor = type==='success'? 'var(--success)' : 'var(--danger)'
  toast.classList.add('show')
  setTimeout(() => toast.classList.remove('show'), 3000)
}

window.تسجيل_بجيت_هب = async function() {
  const btn = document.querySelector('#login button')
  btn.disabled = true
  btn.textContent = 'بوديك GitHub...'

  try {
    const {error} = await supabase.auth.signInWithOAuth({
      provider: 'github',
      options: {
        redirectTo: 'https://moazsecond-sys.github.io/Coding_fun/dashboard-pro.html'
      }
    })
    if(error) throw error
  } catch(error) {
    showToast('فشل الدخول: ' + error.message, 'error')
    btn.disabled = false
    btn.textContent = 'دخول بـ GitHub 🐙'
  }
}

window.تسجيل_خروج = async function(){
  await supabase.auth.signOut()
  location.reload()
}

async function عرض_البيانات() {
  document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="loading">⏳ بجلب البيانات...</td></tr>'

  const { data, error } = await supabase.from('test').select('*')

  if(error) {
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" class="loading">❌ إيرور: ${error.message}</td></tr>`
    console.error('إيرور Supabase:', error)
    showToast('فشل جلب البيانات', 'error')
    return
  }

  allData = data || []
  filteredData = [...allData]
  currentPage = 1

  console.log('الداتا جت:', allData.length, 'سجل')

  ترتيب_وعرض()
  showToast('تم جلب البيانات ✅')
}

window.اضافة = async function() {
  const title = document.getElementById('title').value.trim()
  if(!title) return showToast('اكتب عنوان', 'error')
  const btn = document.getElementById('btnAdd')
  btn.disabled=true
  const { error } = await supabase.from('test').insert([{'عنوان': title}])
  btn.disabled=false
  if(error) showToast(error.message, 'error')
  else {
    document.getElementById('title').value=''
    عرض_البيانات()
    showToast('تم النشر بنجاح ✅')
  }
}

window.تعديل = async function(id, oldTitle) {
  const newTitle = prompt('العنوان الجديد:', oldTitle)
  if(!newTitle || newTitle === oldTitle) return
  const { error } = await supabase.from('test').update({'عنوان': newTitle}).eq('id', id)
  if(error) showToast(error.message, 'error')
  else {عرض_البيانات(); showToast('تم التعديل ✅')}
}

window.حذف = async function(id) {
  if(!confirm('حذف سجل رقم ' + id + '؟')) return
  const { error } = await supabase.from('test').delete().eq('id', id)
  if(error) showToast(error.message, 'error')
  else {عرض_البيانات(); showToast('تم الحذف 🗑️')}
}

window.بحث = function() {
  const val = document.getElementById('search').value.toLowerCase()
  filteredData = allData.filter(item =>
    String(item.id).includes(val) || (item['عنوان'] || '').toLowerCase().includes(val)
  )
  currentPage = 1
  ترتيب_وعرض()
}

window.ترتيب_عمود = function(col) {
  if(sortColumn === col) sortAsc =!sortAsc
  else {sortColumn = col; sortAsc = true}
  localStorage.setItem('sort_col', sortColumn)
  localStorage.setItem('sort_asc', sortAsc)
  document.getElementById('sortSelect').value = `${col}-${sortAsc?'asc':'desc'}`
  ترتيب_وعرض()
}

window.ترتيب_من_سلكت = function() {
  const [col, dir] = document.getElementById('sortSelect').value.split('-')
  sortColumn = col; sortAsc = dir === 'asc'
  localStorage.setItem('sort_col', sortColumn)
  localStorage.setItem('sort_asc', sortAsc)
  ترتيب_وعرض()
}

window.تبديل_العرض = function() {
  viewMode = viewMode === 'table'? 'cards' : 'table'
  localStorage.setItem('view_mode', viewMode)
  تحديث_الواجهة()
  ترتيب_وعرض()
}

window.تغيير_عدد_الصفحات = function() {
  perPage = parseInt(document.getElementById('perPage').value)
  localStorage.setItem('per_page', perPage)
  currentPage = 1
  ترتيب_وعرض()
}

window.تبديل_الثيم = function() {
  document.body.classList.toggle('dark')
  localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light')
}

window.تحديد_الكل = function() {
  const check = document.getElementById('checkAll').checked
  selectedIds.clear()
  if(check) getCurrentPageData().forEach(item => selectedIds.add(item.id))
  ترتيب_وعرض()
  تحديث_زرار_الحذف()
}

window.تحديد_سجل = function(id) {
  if(selectedIds.has(id)) selectedIds.delete(id)
  else selectedIds.add(id)
  const pageData = getCurrentPageData()
  document.getElementById('checkAll').checked = pageData.length > 0 && pageData.every(item => selectedIds.has(item.id))
  ترتيب_وعرض()
  تحديث_زرار_الحذف()
}

window.حذف_المحدد = async function() {
  if(!confirm(`حذف ${selectedIds.size} سجل؟`)) return
  const { error } = await supabase.from('test').delete().in('id', [...selectedIds])
  if(error) showToast(error.message, 'error')
  else {selectedIds.clear(); عرض_البيانات(); showToast('تم حذف المحدد 🗑️')}
}

function تحديث_زرار_الحذف() {
  document.getElementById('btnDeleteSelected').style.display = selectedIds.size > 0? 'inline-block' : 'none'
}

window.تصدير_اكسل = function() {
  let csv = 'ID,العنوان,التاريخ\n'
  filteredData.forEach(item => csv += `${item.id},"${item['عنوان'] || ''}","${item.created_at || ''}"\n`)
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'})
  const link = document.createElement('a')
  link.href = URL.createObjectURL(blob)
  link.download = `data_${new Date().toLocaleDateString('ar-EG')}.csv`
  link.click()
  showToast('تم التصدير 📥')
}

function عرض_احصائيات() {
  document.getElementById('statsBox').innerHTML = `
    <div class="stat-card"><div class="stat-num">${allData.length}</div><div>إجمالي السجلات</div></div>
    <div class="stat-card"><div class="stat-num">${filteredData.length}</div><div>النتائج الحالية</div></div>
    <div class="stat-card"><div class="stat-num">${selectedIds.size}</div><div>محدد</div></div>
    <div class="stat-card"><div class="stat-num">${Math.ceil(filteredData.length/perPage)}</div><div>عدد الصفحات</div></div>
  `
}

function getCurrentPageData() {
  const start = (currentPage - 1) * perPage
  const end = start + perPage
  return filteredData.slice(start, end)
}

function عرض_Pagination() {
  const totalPages = Math.ceil(filteredData.length / perPage)
  let html = `<div class="pagination-info">صفحة ${currentPage} من ${totalPages}</div>`

  if(totalPages > 1) {
    if(currentPage > 1) html += `<button onclick="تغيير_صفحة(${currentPage-1})">◀ السابق</button>`

    let startPage = Math.max(1, currentPage - 2)
    let endPage = Math.min(totalPages, currentPage + 2)

    for(let i=startPage; i<=endPage; i++) {
      html += `<button class="${i===currentPage?'active':''}" onclick="تغيير_صفحة(${i})">${i}</button>`
    }

    if(currentPage < totalPages) html += `<button onclick="تغيير_صفحة(${currentPage+1})">التالي ▶</button>`
  }

  document.getElementById('paginationBox').innerHTML = html
}

window.تغيير_صفحة = function(page) {
  currentPage = page
  ترتيب_وعرض()
}

function تحديث_الواجهة() {
  try {
    عرض_احصائيات()
  } catch(e) {
    console.error('إيرور الواجهة:', e)
  }
}

function ترتيب_وعرض() {
  try {
    filteredData.sort((a,b) => {
      let valA = a[sortColumn], valB = b[sortColumn]
      if(typeof valA === 'string') valA = valA.toLowerCase()
      if(typeof valB === 'string') valB = valB.toLowerCase()
      return sortAsc? (valA>valB?1:-1) : (valA<valB?1:-1)
    })

    document.querySelectorAll('th').forEach(th => th.classList.remove('sort-asc','sort-desc'))
    const th = document.querySelector(`th[onclick="ترتيب_عمود('${sortColumn}')"]`)
    if(th) th.classList.add(sortAsc? 'sort-asc' : 'sort-desc')

    document.getElementById('count').textContent = `${filteredData.length} من ${allData.length} سجل`
    عرض_احصائيات()
    عرض_Pagination()

    const pageData = getCurrentPageData()
    console.log('برسم:', pageData.length, 'سجل')

    if(pageData.length === 0) {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="loading">مفيش بيانات لعرضها</td></tr>'
      document.getElementById('cardsView').innerHTML = '<div class="loading" style="grid-column:1/-1">مفيش بيانات</div>'
      return
    }

    if(viewMode === 'table') {
      document.getElementById('tableView').style.display = 'block'
      document.getElementById('cardsView').style.display = 'none'
      let rows = ''
      pageData.forEach(item => {
        const date = item.created_at ? new Date(item.created_at).toLocaleDateString('ar-EG', {year:'numeric', month:'short', day:'numeric'}) : ''
        rows += `
          <tr class="${selectedIds.has(item.id)?'selected':''}">
          <td><input type="checkbox" ${selectedIds.has(item.id)?'checked':''} onchange="تحديد_سجل(${item.id})"></td>
          <td data-label="ID">${item.id}</td>
          <td data-label="العنوان">${item['عنوان'] || ''}</td>
          <td data-label="التاريخ">${date}</td>
          <td class="actions" data-label="إجراءات">
          <button class="btn-edit btn-small" onclick="تعديل(${item.id}, '${(item['عنوان'] || '').replace(/'/g, "\\'")}')">تعديل</button>
          <button class="btn-danger btn-small" onclick="حذف(${item.id})">حذف</button>
          </td>
          </tr>
        `
      })
      document.getElementById('tableBody').innerHTML = rows
    }
    else {
      document.getElementById('tableView').style.display = 'none'
      document.getElementById('cardsView').style.display = 'grid'
      let cards = ''
      pageData.forEach(item => {
        const date = item.created_at ? new Date(item.created_at).toLocaleDateString('ar-EG', {year:'numeric', month:'long', day:'numeric'}) : ''
        cards += `
          <div class="card ${selectedIds.has(item.id)?'selected':''}">
            <input type="checkbox" class="card-check" ${selectedIds.has(item.id)?'checked':''} onchange="تحديد_سجل(${item.id})">
            <div class="card-id">ID: ${item.id}</div>
            <div class="card-title">${item['عنوان'] || ''}</div>
            <div class="card-date">📅 ${date}</div>
            <div class="card-actions">
              <button class="btn-edit btn-small" onclick="تعديل(${item.id}, '${(item['عنوان'] || '').replace(/'/g, "\\'")}')">تعديل</button>
              <button class="btn-danger btn-small" onclick="حذف(${item.id})">حذف</button>
            </div>
          </div>
        `
      })
      document.getElementById('cardsView').innerHTML = cards
    }

  } catch(e) {
    console.error('إيرور في الرسم:', e)
    document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" class="loading">❌ إيرور رسم: ${e.message}</td></tr>`
  }
}

async function دخول_طوارئ() {
  const box = document.getElementById('errorBox')
  box.style.display = 'block'
  box.innerText = '1. الزرار اشتغل ✅'

  try {
    const email = prompt('اكتب إيميلك بتاع Supabase:')
    box.innerText += '\n2. كتبت الإيميل ✅'

    const password = prompt('اكتب الباسورد:')
    box.innerText += '\n3. كتبت الباسورد ✅'

    if(!email ||!password) {
      box.innerText += '\n❌ لغيت العملية'
      return
    }

    box.innerText += '\n4. بحاول أسجل دخول...'

    const {data, error} = await supabase.auth.signInWithPassword({
      email: email.trim(),
      password: password
    })

    if(error) {
      box.innerText += '\n❌ فشل: ' + error.message
      alert('فشل: ' + error.message)
    } else {
      box.innerText += '\n✅ نجح! بعمل ريلود...'
      alert('دخلت! الصفحة هتحدث')
      location.reload()
    }
  } catch(e) {
    box.innerText += '\n💥 إيرور قاتل: ' + e.message
    alert('إيرور: ' + e.message)
  }
}
