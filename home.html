<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقعي - الصفحة الرئيسية</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:'Tajawal',sans-serif;background:#f5f5f5;margin:0;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
.btn{background:#4CAF50;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer}
.btn-danger{background:#f44336}
.btn-edit{background:#2196F3}
.btn-small{padding:5px 10px;font-size:13px}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:15px;box-shadow:0 2px 5px rgba(0,0,0,0.1);position:relative}
.actions{position:absolute;top:15px;left:15px;display:flex;gap:5px}
.card img{width:100%;max-height:300px;object-fit:cover;border-radius:8px;margin:10px 0}
.date{color:#888;font-size:13px;margin-top:10px}
input,textarea{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:8px;font-family:inherit}
.stats{display:flex;gap:20px;margin:20px 0}
.stat-box{background:#fff;padding:15px;border-radius:10px;flex:1;text-align:center}
</style>
</head>
<body>

<div class="header">
  <h1>موقعي</h1>
  <div>
    <span id="userEmail"></span>
    <button class="btn-danger" onclick="logout()">خروج</button>
  </div>
</div>

<div class="stats">
  <div class="stat-box"><h3 id="count">0</h3><p>مشروع</p></div>
  <div class="stat-box"><h3>نشط</h3><p>النظام</p></div>
  <div class="stat-box"><h3 id="qCount">0</h3><p>أسئلة</p></div>
</div>

<div class="card">
  <h3>نشر مشروع جديد</h3>
  <input id="title" placeholder="عنوان المشروع">
  <textarea id="desc" placeholder="الوصف"></textarea>
  <input id="img" placeholder="رابط الصورة">
  <button class="btn" onclick="addProject()">نشر</button>
</div>

<div id="projects"></div>

<h2>اسألني أي شيء</h2>
<div class="card">
  <input id="qName" placeholder="اسمك">
  <textarea id="qText" placeholder="سؤالك"></textarea>
  <button class="btn" onclick="askQuestion()">إرسال</button>
</div>
<div id="questions"></div>

<script>
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');
let currentUser = null;

sb.auth.getUser().then(({data:{user}})=>{
  if(!user) return location.href='login.html';
  currentUser = user;
  document.getElementById('userEmail').textContent = user.email;
  loadProjects();
  loadQuestions();
});

function logout(){
  sb.auth.signOut();
  location.href='login.html';
}

async function loadProjects(){
  const {data} = await sb.from('projects').select('*').order('id',{ascending:false});
  document.getElementById('count').textContent = data.length;
  if(!data.length) return projects.innerHTML = '<p>لا توجد مشاريع بعد</p>';

  projects.innerHTML = data.map(p=>`
    <div class="card">
      <div class="actions">
        ${p.user_id == currentUser.id? `
        <button class="btn btn-edit btn-small" onclick='editProject(${p.id},"${p.title.replace(/"/g, '&quot;')}","${(p.description||'').replace(/"/g, '&quot;')}","${p.image_url||''}")'>تعديل</button>
        <button class="btn-danger btn-small" onclick="deleteProject(${p.id})">حذف</button>
        ` : ''}
      </div>
      <h3>${p.title}</h3>
      <p>${p.description || 'بدون وصف'}</p>
      ${p.image_url? `<img src="${p.image_url}">` : ''}
      <div class="date">${formatDate(p.created_at)}</div>

      <!-- التعليقات للمسجلين فقط -->
      <div style="margin-top:15px;border-top:1px solid #eee;padding-top:15px">
        <h4>💬 التعليقات</h4>
        <div id="comments-${p.id}"></div>
        <input id="comment-${p.id}" placeholder="اكتب تعليقك...">
        <button class="btn btn-small" onclick="addComment(${p.id})">إرسال</button>
      </div>
    </div>
  `).join('');

  data.forEach(p=>loadComments(p.id));
}

function formatDate(d){return new Date(d).toLocaleDateString('ar-EG')}

async function addProject(){
  const title = document.getElementById('title').value;
  const desc = document.getElementById('desc').value;
  const img = document.getElementById('img').value;
  if(!title) return alert('اكتب العنوان');

  await sb.from('projects').insert({title,description:desc,image_url:img,user_id:currentUser.id});
  document.getElementById('title').value = '';
  document.getElementById('desc').value = '';
  document.getElementById('img').value = '';
  loadProjects();
}

async function deleteProject(id){
  if(!confirm('متأكد تبي تحذف المشروع؟')) return;
  await sb.from('projects').delete().eq('id',id);
  loadProjects();
}

async function editProject(id,title,desc,img){
  const newTitle = prompt('العنوان الجديد:',title);
  if(!newTitle) return;
  const newDesc = prompt('الوصف الجديد:',desc);
  const newImg = prompt('رابط الصورة الجديد:',img);

  await sb.from('projects').update({
    title:newTitle,
    description:newDesc,
    image_url:newImg
  }).eq('id',id);
  loadProjects();
}

async function loadComments(project_id){
  const {data} = await sb.from('comments').select('*').eq('project_id',project_id).order('id',{ascending:true});
  document.getElementById(`comments-${project_id}`).innerHTML =
    data.map(c=>`<p><b>${c.user_name}:</b> ${c.comment}</p>`).join('') || '<p style="color:#999">لا توجد تعليقات</p>';
}

async function addComment(project_id){
  const input = document.getElementById(`comment-${project_id}`);
  if(!input.value) return;
  await sb.from('comments').insert({
    project_id,
    user_name:currentUser.email.split('@')[0],
    comment:input.value
  });
  input.value = '';
  loadComments(project_id);
}

async function loadQuestions(){
  const {data} = await sb.from('questions').select('*').order('id',{ascending:false});
  document.getElementById('qCount').textContent = data.length;
  questions.innerHTML = data.map(q=>`
    <div class="card">
      <b>${q.user_name}:</b> ${q.question}
      ${q.answer? `<p style="margin-top:10px;color:#4CAF50"><b>الرد:</b> ${q.answer}</p>` : ''}
    </div>
  `).join('') || '<p>لا توجد أسئلة بعد</p>';
}

async function askQuestion(){
  const name = document.getElementById('qName').value || 'زائر';
  const question = document.getElementById('qText').value;
  if(!question) return alert('اكتب سؤالك');

  await sb.from('questions').insert({user_name:name,question});
  document.getElementById('qText').value = '';
  loadQuestions();
}
</script>

</body>
</html>
