<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الادمن</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>body{background:#0f172a;color:white;padding:20px;font-family:tahoma}button{background:#ef4444;color:white;border:0;padding:10px 20px;border-radius:6px;cursor:pointer}</style>
</head>
<body>

<h1>مرحبا يا ادمن</h1>
<p>هذي لوحة التحكم حقتك</p>
<button onclick="logout()">تسجيل خروج</button>

<script>
const SUPABASE_URL = "https://mirrxytqttjglglxrarq.supabase.co";
const SUPABASE_KEY = "sb_publishable_FXUmqRa_eAjdgWdZpFl-tA_YQM4FSnQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// فحص اول ما تفتح الصفحة
supabase.auth.getUser().then(({data: { user }}) => {
  if(!user || user.app_metadata?.role !== 'admin'){
    window.location.href = 'login.html';
  }
});

// فحص لو سويت خروج من تبويب ثاني
supabase.auth.onAuthStateChange((event, session) => {
  if(event === 'SIGNED_OUT' || !session){
    window.location.href = 'login.html';
  }
});

async function logout(){
  await supabase.auth.signOut();
  window.location.href = 'login.html';
}
</script>
</body>
</html>
