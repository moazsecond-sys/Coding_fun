<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الادمن</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#0f172a;color:white;padding:20px;font-family:tahoma;margin:0}
.loading{height:100vh;display:flex;align-items:center;justify-content:center}
#content{display:none}
button{background:#ef4444;color:white;border:0;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:bold}
button:hover{background:#dc2626}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
</style>
</head>
<body>

<div id="loading" class="loading">جاري التحقق...</div>

<div id="content">
  <div class="topbar">
    <h1>مرحبا يا ادمن</h1>
    <button onclick="logout()">تسجيل خروج</button>
  </div>
  
  <p>هذي لوحة التحكم حقتك</p>
  
  <!-- حط محتوى لوحتك هنا -->
</div>

<script>
const SUPABASE_URL = "https://mirrxytqttjglglxrarq.supabase.co";
const SUPABASE_KEY = "sb_publishable_FXUmqRa_eAjdgWdZpFl-tA_YQM4FSnQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function init(){
  const { data: { user } = await supabase.auth.getUser();
  
  if(!user || user.app_metadata?.role !== 'admin'){
    window.location.replace('login.html');
    return;
  }
  
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

init();

async function logout(){
  try {
    await supabase.auth.signOut();
    localStorage.clear();
    sessionStorage.clear();
    window.location.replace('login.html');
  } catch(e){
    alert('خطأ في الخروج: ' + e.message);
    window.location.replace('login.html');
  }
}
</script>
</body>
</html>
