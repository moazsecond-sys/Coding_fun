<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اللوحة</title>
<style>
body{margin:0;background:#1a1a2e;display:flex;justify-content:center;align-items:center;height:100vh;font-family:tahoma}
.box{background:#16213e;padding:40px;border-radius:20px;text-align:center;color:white;width:90%;max-width:500px}
button{background:#e94560;color:white;border:0;padding:14px 40px;border-radius:8px;cursor:pointer;font-size:18px;font-weight:bold}
</style>
</head>
<body>
<div class="box" id="content" style="display:none">
<h1>👑 مرحبا يا معاذ</h1>
<p>هذي لوحتك الخاصة</p>
<button onclick="logout()">خروج</button>
</div>

<script>
if (localStorage.getItem('logged') !== 'true') {
  window.location.href = 'login.html';
} else {
  document.getElementById('content').style.display = 'block';
}

function logout() {
  localStorage.removeItem('logged');
  window.location.href = 'login.html';
}
</script>
</body>
</html>
