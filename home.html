<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الادمن 👑</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-family:tahoma;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:white;padding:40px;border-radius:20px;text-align:center;box-shadow:0 15px 50px rgba(0,0,0,0.3);max-width:400px}
h1{color:#333;margin-bottom:20px}
p{color:#28a745;font-size:18px;font-weight:bold}
button{background:#dc3545;color:white;border:0;padding:12px 30px;border-radius:10px;cursor:pointer;margin-top:20px;font-size:16px}
</style>
</head>
<body>
<div class="box">
<h1>لوحة الادمن 👑</h1>
<p id="status">جاري التحقق...</p>
<button onclick="logout()">تسجيل خروج</button>
</div>

<script>
const SUPABASE_URL = 'https://mirrxytqttjglglxrarq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function checkUser() {
  const { data: { session } = await supabase.auth.getSession();
  const status = document.getElementById('status');
  
  if (!session) {
    status.innerText = 'مافي جلسة! رجوع للدخول...';
    setTimeout(() => window.location.href = 'login.html?v=5000', 2000);
    return;
  }
  
  const email = session.user.email;
  const role = session.user_metadata?.role || session.user.app_metadata?.role;
  
  if (email === 'moazsecond@gmail.com' && role === 'admin') {
    status.innerText = 'مرحبا يا معاذ! دخلت بنجاح 🎉';
    status.style.color = '#28a745';
  } else {
    status.innerText = 'ممنوع الدخول! ايميلك: ' + email;
    status.style.color = 'red';
    setTimeout(() => logout(), 3000);
  }
}

async function logout() {
  await supabase.auth.signOut();
  window.location.href = 'login.html?v=5000';
}

checkUser();
</script>
</body>
</html>
