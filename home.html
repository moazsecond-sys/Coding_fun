<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقعي | مقالات وأسئلة</title>
  <meta name="theme-color" content="#4ade80">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* تكبير للشاشة البعيدة */
* { font-size: 18px; }

h1 { font-size: 32px !important; }
h3 { font-size: 22px !important; }

.stat-box h3 { font-size: 2.5rem !important; }
.stat-box p { font-size: 18px !important; }

input, textarea, select {
  font-size: 20px !important;
  padding: 18px !important;
}

.btn, .filter-btn, .btn-publish {
  font-size: 19px !important;
  padding: 16px 20px !important;
}

.card h3 { font-size: 22px !important; }
.card p { font-size: 19px !important; }
    :root {
      --bg-main: #f8f9fa;
      --bg-card: #ffffff;
      --text-main: #1a1a1a;
      --text-muted: #666;
      --border: #e0e0e0;
      --accent: #4ade80;
      --danger: #ef4444;
    }
    body.dark-mode {
      --bg-main: #0a0a0a;
      --bg-card: #1a1a1a;
      --text-main: #f0f0f0;
      --text-muted: #aaa;
      --border: #333;
    }
    * { box-sizing: border-box; }
    body { background: var(--bg-main); color: var(--text-main); transition: 0.3s; font-family: 'Cairo', sans-serif; margin: 0; }

    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin: 15px; transition: 0.3s; }
    .card:hover { border-color: var(--accent); }

    input, textarea, select { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); border-radius: 8px; padding: 12px; width: 100%; margin: 8px 0; font-family: inherit; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }

    .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn:hover { transform: translateY(-2px); }
    .btn-small { padding: 6px 12px; font-size: 13px; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-edit { background: #3b82f6; color: white; }

    .btn-publish {
      background: linear-gradient(135deg, var(--accent), #22c55e);
      color: #000; font-size: 16px; padding: 14px; width: 100%; margin-top: 10px;
    }
    .btn-publish:disabled { opacity: 0.6; cursor: not-allowed; }

    #toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
      background: var(--bg-card); color: var(--text-main); padding: 15px 25px; border-radius: 10px;
      border-left: 4px solid var(--accent); box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 10001;
      opacity: 0; transition: 0.4s; min-width: 250px; text-align: center;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { border-left-color: #22c55e; }
    #toast.error { border-left-color: var(--danger); }

    .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--bg-card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 999; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 25px 15px; }
    .stat-box { text-align: center; padding: 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 15px; }
    .stat-box h3 { font-size: 2rem; color: var(--accent); margin: 0; }

    .filter-bar { display: flex; gap: 10px; justify-content: center; margin: 20px 15px; padding: 15px; background: var(--bg-card); border-radius: 15px; border: 1px solid var(--border); }
    .filter-btn { padding: 8px 16px; border: 2px solid var(--border); background: transparent; color: var(--text-main); border-radius: 25px; cursor: pointer; font-weight: bold; }
    .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

    .badge { background: linear-gradient(135deg, var(--accent), #22c55e); color: #000; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
    .actions { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div id="toast"></div>

  <div class="header">
    <a href="contact.html" class="btn btn-small" style="background:var(--accent)">📧 تواصل</a>
    <h1>🍏 موقعي</h1>
    <div>
      <a href="categories.html" class="btn btn-small">📂 الأقسام</a>
      <button class="btn btn-small" onclick="logout()">خروج</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box"><h3 id="count">0</h3><p>📦 الكل</p></div>
    <div class="stat-box"><h3 id="postCount">0</h3><p>📝 مقالات</p></div>
    <div class="stat-box"><h3 id="qCount">0</h3><p>❓ أسئلة</p></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterContent('all', event)">🌍 الكل</button>
    <button class="filter-btn" onclick="filterContent('post', event)">📝 مقالات</button>
    <button class="filter-btn" onclick="filterContent('question', event)">❓ أسئلة</button>
  </div>

  <div class="card">
    <form id="postForm">
      <h3 id="formTitle">نشر جديد</h3>
      <input id="title" placeholder="العنوان" required maxlength="100">
      <textarea id="content" placeholder="المحتوى أو السؤال" rows="4" required></textarea>
      
      <select id="type" required>
        <option value="">اختر النوع</option>
        <option value="post">📝 مقال</option>
        <option value="question">❓ سؤال</option>
      </select>

      <button class="btn-publish" type="submit" id="publishBtn" style="font-size:22px; padding:20px">🚀 انشر الحين</button>
      <button type="button" class="btn" onclick="cancelEdit()" id="cancelBtn" style="display:none; margin-top:8px; background:var(--text-muted); color:white">إلغاء التعديل</button>
    </form>
  </div>

  <div id="content-list"></div>

  <script>
    const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');
    let currentUser = null;
    let editId = null;
    let allContent = [];

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'show ' + type;
      setTimeout(() => { toast.className = toast.className.replace('show', ''); }, 3000);
    }

    function timeAgo(dateString) {
      const date = new Date(dateString);
      const seconds = Math.floor((new Date() - date) / 1000);
      if (seconds < 60) return `منذ ${seconds} ثانية`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `منذ ${minutes} دقيقة`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `منذ ${hours} ساعة`;
      const days = Math.floor(hours / 24);
      return `منذ ${days} يوم`;
    }

    sb.auth.getUser().then(({ data: { user } }) => {
      if (!user) return location.href = 'login.html';
      currentUser = user;
      loadContent();
    });

    function logout() { sb.auth.signOut(); location.href = 'login.html'; }

    function filterContent(type, event) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      if (type === 'all') displayContent(allContent);
      else displayContent(allContent.filter(c => c.type === type));
    }

    document.getElementById('postForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        title: document.getElementById('title').value,
        content: document.getElementById('content').value,
        type: document.getElementById('type').value
      };

      if (editId) {
        const { error } = await sb.from('content').update(data).eq('id', editId);
        if (error) return showToast('خطأ: ' + error.message, 'error');
        showToast('تم التعديل ✓');
        cancelEdit();
      } else {
        const { error } = await sb.from('content').insert(data);
        if (error) return showToast('خطأ: ' + error.message, 'error');
        showToast('تم النشر 🚀');
      }

      e.target.reset();
      loadContent();
    });

    function cancelEdit() {
      editId = null;
      document.getElementById('formTitle').textContent = 'نشر جديد';
      document.getElementById('publishBtn').textContent = '🚀 نشر';
      document.getElementById('cancelBtn').style.display = 'none';
    }

    async function loadContent() {
      const { data } = await sb.from('content').select('*').order('created_at', { ascending: false });
      allContent = data || [];
      document.getElementById('count').textContent = allContent.length;
      document.getElementById('postCount').textContent = allContent.filter(c => c.type === 'post').length;
      document.getElementById('qCount').textContent = allContent.filter(c => c.type === 'question').length;
      displayContent(allContent);
    }

    function displayContent(items) {
      const div = document.getElementById('content-list');
      if (!items.length) return div.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding:40px">لا يوجد محتوى 📭</p>';

      div.innerHTML = items.map(item => `
        <div class="card">
          <div class="actions">
            <button class="btn btn-edit btn-small" onclick='editItem(${item.id}, "${item.title.replace(/"/g, '&quot;')}", "${item.content.replace(/"/g, '&quot;')}", "${item.type}")'>✏️ تعديل</button>
            <button class="btn-danger btn-small" onclick="deleteItem(${item.id})">🗑️ حذف</button>
          </div>
          <span class="badge">${item.type === 'post' ? 'مقال' : 'سؤال'}</span>
          <h3 style="margin-top:15px">${item.title}</h3>
          <p style="line-height:1.6">${item.content}</p>
          <div style="margin-top:15px; color:var(--text-muted); font-size:13px">📅 ${timeAgo(item.created_at)}</div>
        </div>
      `).join('');
    }

    function editItem(id, title, content, type) {
      editId = id;
      document.getElementById('title').value = title;
      document.getElementById('content').value = content;
      document.getElementById('type').value = type;
      document.getElementById('formTitle').textContent = 'تعديل';
      document.getElementById('publishBtn').textContent = '💾 حفظ';
      document.getElementById('cancelBtn').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteItem(id) {
      if (!confirm('متأكد تبغى تحذف؟')) return;
      const { error } = await sb.from('content').delete().eq('id', id);
      if (error) return showToast('خطأ: ' + error.message, 'error');
      showToast('تم الحذف 🗑️');
      loadContent();
    }
  </script>
</body>
</html>
