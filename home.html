<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تشخيص اللوحة</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>body{padding:20px;font-family:tahoma;background:#222;color:#0f0} pre{background:#000;padding:15px;border-radius:10px;overflow:auto}</style>
</head>
<body>
<h2>تشخيص الجلسة 🔍</h2>
<pre id="log">جاري الفحص...</pre>

<script>
const supabase = window.supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');

const log = document.getElementById('log');
let text = '';

function add(t){ text += t + '\n'; log.innerText = text; }

// 1. نشوف localStorage فيه ايه
add('1. localStorage Keys:');
add(Object.keys(localStorage).filter(k => k.includes('supabase')).join('\n') || 'مافي شي!');

// 2. ننتظر 3 ثواني ونفحص الجلسة
setTimeout(async () => {
  add('\n2. فحص الجلسة بعد 3 ثواني:');
  const {data, error} = await supabase.auth.getSession();
  
  if(error) add('خطأ: ' + error.message);
  else if(!data.session) add('مافي session = لازم تسجل دخول من جديد');
  else {
    add('Email: ' + data.session.user.email);
    add('Role: ' + JSON.stringify(data.session.user.app_metadata));
    add('\n3. لو انت ادمن المفروض تدخل الحين ✅');
  }
}, 3000);

// 3. نسمع اي تغيير
supabase.auth.onAuthStateChange((e,s) => {
  add('\n4. Auth Event: ' + e + ' | Email: ' + s?.user?.email);
});
</script>
</body>
</html>
