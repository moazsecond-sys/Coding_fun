<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#0f172a;color:#e2e8f0;font-family:tahoma;margin:0;padding:0}
.loading{height:100vh;display:flex;align-items:center;justify-content:center;font-size:18px}
.container{display:none;padding:30px;max-width:1000px;margin:auto}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;padding-bottom:15px;border-bottom:1px solid #334155}
h1{color:#38bdf8}
button{background:#ef4444;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:bold}
button:hover{background:#dc2626}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-top:20px}
</style>
</head>
<body>

<div id="loading" class="loading">جاري التحقق من صلاحياتك...</div>

<div id="content" class="container">
  <div class="topbar">
    <h1>لوحة الادمن</h1>
    <button onclick="logout()">تسجيل خروج</button>
  </div>
  
  <div class="card">
    <h3>مرحبا <span id="email"></span></h3>
    <p>انت داخل كـ <b>ادمن</b> ✅</p>
  </div>
  
  <!-- حط محتوى لوحتك هنا -->
  <div class="card">
    <p>هنا تضيف جداولك وأزرارك</p>
  </div>
</div>

<script>
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','sb_publishable_FXUmqRa_eAjdgWdZpFl-tA_YQM4FSnQ');

// شيك مرة وحدة بس، ما فيه لوب
sb.auth.getUser().then(({data:{user}}) => {
  if(!user || user.app_metadata?.role !== 'admin'){
    sb.auth.signOut();
    window.location.replace('login.html');
    return;
  }
  
  // انت ادمن - ور المحتوى
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('email').innerText = user.email;
});

// لو سجل خروج من تبويب ثاني
sb.auth.onAuthStateChange((event) => {
  if(event === 'SIGNED_OUT'){
    window.location.replace('login.html');
  }
});

// زر الخروج
async function logout(){
  await sb.auth.signOut();
  localStorage.clear();
  window.location.replace('login.html');
}
</script>
</body>
</html>
