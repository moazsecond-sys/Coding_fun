<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة التحكم</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#0b1020;color:white;font-family:tahoma;margin:0;padding:20px}
.top{background:linear-gradient(135deg,#1e3a8a 0%,#0b1020 100%);padding:25px;border-radius:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;flex-wrap:wrap;gap:15px}
.card{background:#1a1f36;padding:20px;margin:15px 0;border-radius:16px;border:1px solid #2a3050;position:relative;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.btn{padding:10px 18px;border-radius:8px;border:0;background:#3b82f6;color:white;font-weight:bold;cursor:pointer;margin:5px}
.btn:hover{background:#2563eb}
.btn-danger{background:#ef4444}
.btn-edit{background:#f59e0b}
.btn-small{padding:6px 12px;font-size:13px}
input,textarea{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #333;background:#0b1020;color:white;box-sizing:border-box}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:15px}
h2,h3,h4{margin:0 0 10px 0}
.welcome{font-size:16px;color:#93c5fd}
img{max-width:100%;border-radius:8px;margin-top:10px}
.actions{position:absolute;top:15px;left:15px;display:flex;gap:5px}
.date{color:#94a3b8;font-size:12px;margin-top:10px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center}
.modal-content{background:#1a1f36;padding:25px;border-radius:16px;width:90%;max-width:400px;border:1px solid #2a3050}
.comment-box{background:#0b1020;padding:10px;border-radius:8px;margin:8px 0;border-right:3px solid #3b82f6}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin:20px 0}
.stat-card{text-align:center;padding:15px}
</style>
</head>
<body>

<div class="top">
  <div>
    <h2 style="font-size:28px;margin:0">لوحة تحكمك 🌸</h2>
    <div class="welcome" id="userEmail">جاري التحميل...</div>
  </div>
  <div>
    <button class="btn btn-edit" onclick="openSettings()">⚙️ الإعدادات</button>
    <button class="btn-danger" onclick="logout()">تسجيل خروج</button>
  </div>
</div>

<!-- إحصائيات -->
<div class="stats">
  <div class="card stat-card">
    <div style="font-size:32px;font-weight:bold;color:#3b82f6" id="count">0</div>
    <div>المشاريع</div>
  </div>
  <div class="card stat-card">
    <div style="font-size:32px;font-weight:bold;color:#10b981">نشط</div>
    <div>النظام</div>
  </div>
  <div class="card stat-card">
    <div style="font-size:32px;font-weight:bold;color:#f59e0b" id="qcount">0</div>
    <div>الأسئلة</div>
  </div>
</div>

<!-- نشر مشروع -->
<div class="card">
  <h3>نشر مشروع جديد</h3>
  <input id="title" placeholder="عنوان المشروع" required>
  <textarea id="desc" rows="3" placeholder="وصف المشروع"></textarea>
  <input id="image" placeholder="رابط الصورة اختياري">
  <button class="btn" onclick="addProject()">نشر الآن</button>
</div>

<!-- المشاريع -->
<h3>مشاريعك</h3>
<div id="projects" class="grid">جاري التحميل...</div>

<!-- قسم الأسئلة مفتوح للكل -->
<div class="card">
  <h3>📮 اسألني أي شيء</h3>
  <input id="qname" placeholder="اسمك">
  <textarea id="qtext" rows="2" placeholder="سؤالك..."></textarea>
  <button class="btn" onclick="askQuestion()">إرسال السؤال</button>
  <div id="questionsList" style="margin-top:20px"></div>
</div>

<!-- مودال التعديل -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>تعديل المشروع</h3>
    <input id="editTitle" placeholder="العنوان">
    <textarea id="editDesc" rows="3"></textarea>
    <input id="editImage" placeholder="رابط الصورة">
    <div style="margin-top:15px">
      <button class="btn" onclick="saveEdit()">حفظ</button>
      <button class="btn-danger" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');
let currentUser = null;
let editId = null;

sb.auth.getSession().then(async ({data:{session}})=>{
  if(!session) return location.replace('login.html');
  currentUser = session.user;
  document.getElementById('userEmail').textContent = currentUser.email;
  loadProjects();
  loadQuestions();
});

function formatDate(d){return new Date(d).toLocaleString('ar-EG',{dateStyle:'medium',timeStyle:'short'})}

async function loadProjects(){
  const {data} = await sb.from('projects').select('*').order('created_at',{ascending:false});
  document.getElementById('count').textContent = data.length;
  if(!data.length) return projects.innerHTML = '<div class="card">مافي مشاريع لسه 👆</div>';
  
  projects.innerHTML = data.map(p=>`
    <div class="card">
      <div class="actions">
        ${p.user_id == currentUser.id ? `
        <button class="btn btn-edit btn-small" onclick='editProject(${p.id},"${p.title}","${p.description||''}","${p.image_url||''}")'>تعديل</button>
        <button class="btn-danger btn-small" onclick="deleteProject(${p.id})">حذف</button>` : ''}
      </div>
      <h3>${p.title}</h3>
      <p>${p.description || 'بدون وصف'}</p>
      ${p.image_url ? `<img src="${p.image_url}">` : ''}
      <div class="date">${formatDate(p.created_at)}</div>
      
      <!-- التعليقات للمسجلين فقط -->
      <div style="margin-top:15px;border-top:1px solid #2a3050;padding-top:15px">
        <h4>💬 التعليقات</h4>
        <div id="comments-${p.id}"></div>
        <input id="comment-${p.id}" placeholder="اكتب تعليقك..." style="width:70%">
        <button class="btn btn-small" onclick="addComment(${p.id})">إرسال</button>
      </div>
    </div>
  `).join('');
  
  data.forEach(p=>loadComments(p.id));
}

async function addProject(){
  const title = document.getElementById('title').value.trim();
  if(!title){alert('اكتب العنوان');return}
  await sb.from('projects').insert([{title, description:desc.value, image_url:image.value, user_id:currentUser.id}]);
  title.value = desc.value = image.value = '';
  loadProjects();
}

async function loadComments(projectId){
  const {data} = await sb.from('comments').select('*').eq('project_id',projectId).order('created_at');
  document.getElementById(`comments-${projectId}`).innerHTML = 
    data.map(c=>`<div class="comment-box"><b>${c.user_name}</b>: ${c.comment}<br><small style="color:#94a3b8">${formatDate(c.created_at)}</small></div>`).join('') || '<small>لا توجد تعليقات</small>';
}

async function addComment(projectId){
  const comment = document.getElementById(`comment-${projectId}`).value.trim();
  if(!comment) return;
  await sb.from('comments').insert([{project_id:projectId, user_name:currentUser.email.split('@')[0], comment}]);
  document.getElementById(`comment-${projectId}`).value = '';
  loadComments(projectId);
}

function editProject(id,t,d,i){editId=id;editTitle.value=t;editDesc.value=d;editImage.value=i;editModal.style.display='flex'}
async function saveEdit(){
  await sb.from('projects').update({title:editTitle.value,description:editDesc.value,image_url:editImage.value}).eq('id',editId);
  closeModal();loadProjects();
}
async function deleteProject(id){
  if(confirm('تحذف المشروع؟')){await sb.from('projects').delete().eq('id',id);loadProjects()}
}

async function askQuestion(){
  const name = qname.value.trim();
  const question = qtext.value.trim();
  if(!name || !question){alert('اكتب اسمك وسؤالك');return}
  await sb.from('questions').insert([{user_name:name,question}]);
  qname.value = qtext.value = '';
  alert('تم إرسال سؤالك 🌸');
  loadQuestions();
}

async function loadQuestions(){
  const {data} = await sb.from('questions').select('*').order('created_at',{ascending:false}).limit(5);
  document.getElementById('qcount').textContent = data.length;
  questionsList.innerHTML = data.map(q=>`
    <div class="comment-box">
      <b>${q.user_name}</b>: ${q.question}<br>
      ${q.answer ? `<div style="margin-top:8px;color:#10b981">↳ الرد: ${q.answer}</div>` : '<small style="color:#94a3b8">بانتظار الرد</small>'}
    </div>
  `).join('') || '<small>لا توجد أسئلة بعد</small>';
}

function closeModal(){editModal.style.display='none'}
function openSettings(){alert('صفحة الإعدادات الجاية 🌸')}
async function logout(){await sb.auth.signOut();location.replace('login.html')}
window.onclick = e => {if(e.target == editModal) closeModal()}
</script>
</body>
</html>
