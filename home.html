<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقعي - الصفحة الرئيسية</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h1>🍏 موقعي</h1>
  <div>
    <a href="categories.html" class="btn btn-small">📂 الأقسام</a>
    <span id="userEmail"></span>
    <button class="btn-danger btn-small" onclick="logout()">خروج</button>
  </div>
</div>

<div class="stats">
  <div class="stat-box"><h3 id="count">0</h3><p>مشروع</p></div>
  <div class="stat-box"><h3>نشط</h3><p>النظام</p></div>
  <div class="stat-box"><h3 id="qCount">0</h3><p>أسئلة</p></div>
</div>

<div class="card">
<form id="postForm" class="card">
  <h3>نشر مشروع جديد</h3>
  <input id="title" placeholder="عنوان المشروع" required>
  <textarea id="description" placeholder="الوصف" rows="4"></textarea>
  <input id="image_url" placeholder="رابط الصورة">
  
  <!-- ضيف هذا هنا -->
  <select id="category" required>
    <option value="">اختر القسم</option>
    <option value="برمجة">💻 برمجة</option>
    <option value="تصميم">🎨 تصميم</option>
    <option value="مقالات">📝 مقالات</option>
    <option value="عام">🌍 عام</option>
  </select>
  
  <button class="btn" type="submit">نشر</button>
</form>

<div id="projects"></div>

<h2 style="margin-top:40px;color:#4ade80">اسألني أي شيء</h2>
<div class="card">
  <input id="qName" placeholder="اسمك">
  <textarea id="qText" placeholder="سؤالك"></textarea>
  <button class="btn" onclick="askQuestion()">إرسال</button>
</div>
<div id="questions"></div>

<script>
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');
let currentUser = null;

sb.auth.getUser().then(({data:{user}})=>{
  if(!user) return location.href='login.html';
  currentUser = user;
  document.getElementById('userEmail').textContent = user.email;
  loadProjects();
  loadQuestions();
});

function logout(){
  sb.auth.signOut();
  location.href='login.html';
}

async function loadProjects(){
  const {data} = await sb.from('projects').select('*').order('id',{ascending:false});
  document.getElementById('count').textContent = data.length;
  if(!data.length) return projects.innerHTML = '<p style="text-align:center;color:#666">لا توجد مشاريع بعد</p>';

  projects.innerHTML = data.map(p=>`
    <div class="card">
      <div class="actions">
        ${p.user_id == currentUser.id? `
        <button class="btn btn-edit btn-small" onclick='editProject(${p.id},"${p.title.replace(/"/g, '&quot;')}","${(p.description||'').replace(/"/g, '&quot;')}","${p.image_url||''}")'>تعديل</button>
        <button class="btn-danger btn-small" onclick="deleteProject(${p.id})">حذف</button>
        ` : ''}
      </div>
      <h3>${p.title}</h3>
      <p>${p.description || 'بدون وصف'}</p>
      ${p.image_url? `<img src="${p.image_url}">` : ''}
      <div class="date">${formatDate(p.created_at)}</div>

      <div class="comments-section">
        <h4>💬 التعليقات</h4>
        <div id="comments-${p.id}"></div>
        <input id="comment-${p.id}" placeholder="اكتب تعليقك...">
        <button class="btn btn-small" onclick="addComment(${p.id})">إرسال</button>
      </div>
    </div>
  `).join('');

  data.forEach(p=>loadComments(p.id));
}

function formatDate(d){
  return new Date(d).toLocaleDateString('ar-EG',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

  const title = document.getElementById('title').value;
async function addProject(){
  const title = document.getElementById('title').value;
  const desc = document.getElementById('desc').value;
  const img = document.getElementById('img').value;
  if(!title) return alert('اكتب عنوان المشروع');

  const category = document.getElementById('category').value; // ضيف هذا هنا
  
  const {error} = await sb.from('projects').insert({
    title,description:desc,image_url:img,category,user_id:currentUser.id
  });
  if(error) return alert('خطأ: '+error.message);
  
  document.getElementById('title').value = '';
  document.getElementById('desc').value = '';
  document.getElementById('img').value = '';
  document.getElementById('category').value = ''; // فضي القسم بعد النشر
  loadProjects();
}
  if(error) return alert('خطأ: '+error.message);

  document.getElementById('title').value = '';
  document.getElementById('desc').value = '';
  document.getElementById('img').value = '';
  loadProjects();
}

async function deleteProject(id){
  if(!confirm('متأكد تبي تحذف المشروع؟')) return;
  await sb.from('projects').delete().eq('id',id);
  loadProjects();
}

async function editProject(id,title,desc,img){
  const newTitle = prompt('العنوان الجديد:',title);
  if(!newTitle) return;
  const newDesc = prompt('الوصف الجديد:',desc);
  const newImg = prompt('رابط الصورة الجديد:',img);

  await sb.from('projects').update({
    title:newTitle,description:newDesc,image_url:newImg
  }).eq('id',id);
  loadProjects();
}

async function loadComments(project_id){
  const {data} = await sb.from('comments').select('*').eq('project_id',project_id).order('id',{ascending:true});
  document.getElementById(`comments-${project_id}`).innerHTML =
    data.map(c=>`<p style="margin:5px 0"><b style="color:#4ade80">${c.user_name}:</b> ${c.comment}</p>`).join('') || '<p style="color:#666;font-size:13px">لا توجد تعليقات</p>';
}

async function addComment(project_id){
  const input = document.getElementById(`comment-${project_id}`);
  if(!input.value.trim()) return;
  await sb.from('comments').insert({
    project_id,user_name:currentUser.email.split('@')[0],comment:input.value.trim()
  });
  input.value = '';
  loadComments(project_id);
}

async function loadQuestions(){
  const {data} = await sb.from('questions').select('*').order('id',{ascending:false});
  document.getElementById('qCount').textContent = data.length;
  questions.innerHTML = data.map(q=>`
    <div class="card">
      <b style="color:#4ade80">${q.user_name}:</b> ${q.question}
      ${q.answer? `<p style="margin-top:10px;color:#22c55e"><b>الرد:</b> ${q.answer}</p>` : ''}
    </div>
  `).join('') || '<p style="color:#666">لا توجد أسئلة بعد</p>';
}

async function askQuestion(){
  const name = document.getElementById('qName').value.trim() || 'زائر';
  const question = document.getElementById('qText').value.trim();
  if(!question) return alert('اكتب سؤالك');

  await sb.from('questions').insert({user_name:name,question});
  document.getElementById('qText').value = '';
  loadQuestions();
}
</script>

</body>
</html>
