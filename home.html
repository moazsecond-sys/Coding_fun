<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>body{background:#0f172a;color:white;padding:30px;font-family:tahoma}</style>
</head>
<body>
<div id="debug">جاري التحقق...</div>

<script>
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','sb_publishable_FXUmqRa_eAjdgWdZpFl-tA_YQM4FSnQ');

// ما راح نرفرش ولا نحول إلا لو 100% مو ادمن
sb.auth.getUser().then(r => {
  const u = r.data.user;
  
  document.getElementById('debug').innerHTML = 
    'اليوزر: ' + (u?.email || 'مافي') + '<br>' +
    'app_metadata: ' + JSON.stringify(u?.app_metadata) + '<br>' +
    'user_metadata: ' + JSON.stringify(u?.user_metadata);
  
  // لو مافي يوزر بس، وقتها نطلع
  if(!u){
    setTimeout(() => location.replace('login.html'), 3000);
    return;
  }
  
  // لو فيه يوزر حتى لو مو ادمن نخليه يدخل ونشوف المشكلة
  // عشان نوقف اللوب
});
</script>
</body>
</html>
