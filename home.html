<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>body{background:#0b1020;color:white;font-family:tahoma;padding:20px}
.btn{background:#ef4444;border:0;padding:10px 20px;border-radius:8px;color:white;cursor:pointer;float:left}</style>
</head>
<body>
<button class="btn" onclick="logout()">تسجيل خروج</button>
<h2>لوحة التحكم</h2>
<div id="projects">جاري التحميل...</div>

<script>
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');

// شيك لو مافي جلسة ارميه login.html
sb.auth.getSession().then(({data:{session}})=>{
  if(!session) location.replace('login.html');
  else loadProjects();
});

async function loadProjects(){
  const {data,error} = await sb.from('projects').select('*');
  if(error) projects.innerHTML = 'خطأ: '+error.message;
  else if(!data.length) projects.innerHTML = 'مافي مشاريع';
  else projects.innerHTML = data.map(p=>`<div style="background:#1a1f36;padding:15px;margin:10px;border-radius:12px"><h3>${p.title}</h3><p>${p.description}</p></div>`).join('');
}

async function logout(){
  await sb.auth.signOut();
  location.replace('login.html');
}
</script></body></html>
