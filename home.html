<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الادمن 👑</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{margin:0;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-family:tahoma;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:white;padding:40px;border-radius:20px;text-align:center;box-shadow:0 15px 50px rgba(0,0,0,0.3)}
h1{color:#333} p{font-size:18px;font-weight:bold}
</style>
</head>
<body>
<div class="box">
<h1>لوحة الادمن 👑</h1>
<p id="status" style="color:#ff9800">جاري التحقق...</p>
<button onclick="logout()" style="background:red;color:white;border:0;padding:12px 30px;border-radius:10px;cursor:pointer;margin-top:20px">تسجيل خروج</button>
</div>

<script>
const supabase = window.supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');

const status = document.getElementById('status');

// ننتظر Supabase يقول "فيه مستخدم مسجل دخول"
supabase.auth.onAuthStateChange((event, session) => {
  console.log('Auth event:', event, session?.user?.email);
  
  if (!session) {
    status.innerText = 'مافي جلسة، برجعك للدخول...';
    status.style.color = 'red';
    setTimeout(() => window.location.href = 'login.html?v=9999', 2000);
    return;
  }
  
  const email = session.user.email;
  const role = session.user_metadata?.role || session.user.app_metadata?.role;
  
  if (email === 'moazsecond@gmail.com' && role === 'admin') {
    status.innerText = 'مرحبا يا معاذ! دخلت اللوحة بنجاح 🎉';
    status.style.color = '#28a745';
  } else {
    status.innerText = 'ممنوع! ايميلك: ' + email + ' - الدور: ' + role;
    status.style.color = 'red';
    setTimeout(logout, 3000);
  }
});

// فحص اولي سريع
supabase.auth.getSession();

async function logout() {
  await supabase.auth.signOut();
  window.location.href = 'login.html?v=9999';
}
</script>
</body>
</html>
