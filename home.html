<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة نشر المحتوى الديني</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body {
  background: #0a0a0a;
  color: #eee;
  font-family: 'Cairo', sans-serif;
  padding: 20px;
  margin: 0;
}
h1 { color: #4ade80; text-align: center; }
.container {
  max-width: 800px;
  margin: auto;
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #333;
}
input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  background: #2a2a2a;
  border: 1px solid #444;
  color: #fff;
  border-radius: 8px;
  box-sizing: border-box;
}
button {
  background: #4ade80;
  color: #000;
  border: none;
  padding: 12px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  margin: 5px;
}
button:hover { background: #22c55e; }
button.danger { background: #ef4444; color: #fff; }
button.danger:hover { background: #dc2626; }
.item {
  background: #2a2a2a;
  padding: 15px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #444;
}
.msg { padding: 10px; margin: 10px 0; border-radius: 8px; }
.success { background: #166534; }
.error { background: #7f1d1d; }
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📝 لوحة نشر المحتوى الديني</h1>
    <button onclick="logout()" class="danger">تسجيل خروج</button>
  </div>
  
  <div id="msg"></div>
  
  <h3>إضافة / تعديل محتوى</h3>
  <form id="publishForm">
    <input type="hidden" id="editId">
    <input type="text" id="title" placeholder="العنوان" required>
    <textarea id="content" placeholder="النص" rows="5" required></textarea>
    <select id="type">
      <option value="آية">آية</option>
      <option value="حديث">حديث</option>
      <option value="دعاء">دعاء</option>
      <option value="حكمة">حكمة</option>
    </select>
    <button type="submit" id="submitBtn">نشر</button>
    <button type="button" onclick="cancelEdit()" style="display:none" id="cancelBtn">إلغاء</button>
  </form>
  
  <hr style="margin: 30px 0; border-color: #444;">
  
  <h3>المحتوى المنشور</h3>
  <div id="contentList">جاري التحميل...</div>
</div>

<script>
const SUPABASE_URL = 'https://hpkuaivphtqzljyuwbpp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhwa3VhaXZwaHRxemxqeXV3YnBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAzMjU2NjAsImV4cCI6MjA3NTkwMTY2MH0.1l3OfYROVqSrMoAInMFEDlxeDclC3vfFMMtAeR6yNgc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// تحقق من تسجيل الدخول اول ما يفتح
checkAuth();

async function checkAuth() {
  const { data: { session } = await sb.auth.getSession();
  if (!session) {
    window.location.href = 'login.html';
  } else {
    loadContent();
  }
}

async function logout() {
  await sb.auth.signOut();
  window.location.href = 'login.html';
}

function showMsg(text, type) {
  const msg = document.getElementById('msg');
  msg.className = 'msg ' + type;
  msg.textContent = text;
  setTimeout(() => msg.textContent = '', 3000);
}

// تحميل المحتوى
async function loadContent() {
  const { data, error } = await sb.from('content').select('*').order('id', { ascending: false });
  if (error) {
    document.getElementById('contentList').innerHTML = 'خطأ في التحميل';
    return;
  }
  
  if (data.length === 0) {
    document.getElementById('contentList').innerHTML = 'لا يوجد محتوى بعد';
    return;
  }
  
  document.getElementById('contentList').innerHTML = data.map(item => `
    <div class="item">
      <h4>${item.title}</h4>
      <p>${item.content}</p>
      <small>النوع: ${item.type}</small>
      <br><br>
      <button onclick="editItem(${item.id}, '${item.title.replace(/'/g, "\\'")}', '${item.content.replace(/'/g, "\\'")}', '${item.type}')">✏️ تعديل</button>
      <button onclick="deleteItem(${item.id})" class="danger">🗑️ حذف</button>
    </div>
  `).join('');
}

// إضافة أو تعديل
document.getElementById('publishForm').onsubmit = async (e) => {
  e.preventDefault();
  
  const { data: { session } = await sb.auth.getSession();
  if (!session) {
    showMsg('سجل دخول اول', 'error');
    return;
  }
  
  const id = document.getElementById('editId').value;
  const title = document.getElementById('title').value;
  const content = document.getElementById('content').value;
  const type = document.getElementById('type').value;
  
  let error;
  
  if (id) {
    // تعديل
    const result = await sb.from('content').update({ title, content, type }).eq('id', id);
    error = result.error;
  } else {
    // إضافة جديدة
    const result = await sb.from('content').insert([{ title, content, type }]);
    error = result.error;
  }
  
  if (error) {
    console.error(error);
    showMsg('خطأ: ' + error.message, 'error');
    return;
  }
  
  showMsg(id ? 'تم التعديل بنجاح ✅' : 'تم النشر بنجاح ✅', 'success');
  cancelEdit();
  loadContent();
};

// تعبئة النموذج للتعديل
function editItem(id, title, content, type) {
  document.getElementById('editId').value = id;
  document.getElementById('title').value = title;
  document.getElementById('content').value = content;
  document.getElementById('type').value = type;
  document.getElementById('submitBtn').textContent = 'تعديل';
  document.getElementById('cancelBtn').style.display = 'inline-block';
  window.scrollTo(0, 0);
}

// إلغاء التعديل
function cancelEdit() {
  document.getElementById('editId').value = '';
  document.getElementById('publishForm').reset();
  document.getElementById('submitBtn').textContent = 'نشر';
  document.getElementById('cancelBtn').style.display = 'none';
}

// الحذف مع التحقق من الجلسة - مضبوط الأقواس
async function deleteItem(id) {
  if (!confirm('متأكد تبغى تحذف؟')) return;
  
  const { data: { session } = await sb.auth.getSession();
  if (!session) {
    alert('انت مو مسجل دخول! ارجع سجل دخول');
    window.location.href = 'login.html';
    return;
  }
  
  console.log('جاري الحذف... اليوزر:', session.user.id);
  
  const { error } = await sb.from('content').delete().eq('id', id);
  
  if (error) {
    console.error('خطأ الحذف:', error);
    return alert('خطأ: ' + error.message);
  }
  
  alert('تم الحذف بنجاح ✅');
  loadContent();
}
</script>

</body>
</html>
