<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#0f172a;color:white;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:tahoma}
#content{display:none;text-align:center}
button{background:red;color:white;border:0;padding:10px 20px;border-radius:5px;margin-top:20px;cursor:pointer}
</style>
</head>
<body>

<div id="loading">جاري التحقق من صلاحياتك...</div>

<div id="content">
  <h1>مرحبا ادمن ✅</h1>
  <p id="email"></p>
  <button onclick="logout()">خروج</button>
</div>

<script>
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','sb_publishable_FXUmqRa_eAjdgWdZpFl-tA_YQM4FSnQ');

// استخدم getSession بدل getUser عشان ما يعلق
sb.auth.getSession().then(({data:{session}}) => {
  const user = session?.user;
  
  if(!user){
    location.replace('login.html');
    return;
  }
  
  const role = user.user_metadata?.role || user.app_metadata?.role;
  
  if(role !== 'admin'){
    sb.auth.signOut();
    location.replace('login.html');
    return;
  }
  
  // تمام انت ادمن
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('email').innerText = user.email;
});

function logout(){
  sb.auth.signOut().then(() => location.replace('login.html'));
}
</script>
</body>
</html>
