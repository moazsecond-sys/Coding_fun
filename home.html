<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الادمن 👑</title>
<style>
body{margin:0;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-family:tahoma;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:white;padding:50px;border-radius:25px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:500px}
h1{color:#333;font-size:36px;margin-bottom:20px}
p{color:#28a745;font-size:22px;font-weight:bold;margin:20px 0}
button{background:#dc3545;color:white;border:0;padding:15px 40px;border-radius:12px;cursor:pointer;font-size:18px;font-weight:bold;margin-top:20px}
button:hover{background:#c82333}
</style>
</head>
<body>
<div class="box">
<h1>👑 لوحة الادمن</h1>
<p>مرحبا يا معاذ! دخلت بنجاح 🎉</p>
<p style="color:#666;font-size:16px">لو شفت هذي الصفحة معناها انت ادمن رسمي</p>
<button onclick="logout()">تسجيل خروج</button>
</div>

<script>
function logout() {
  // نطلع ونمسح الجلسة
  localStorage.clear();
  sessionStorage.clear();
  window.location.href = 'login.html?logout=1';
}
</script>
</body>
</html>
