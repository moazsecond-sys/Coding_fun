<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>موقعي | مشاريع برمجة وتصميم</title>
  <meta name="theme-color" content="#4ade80">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">

  <style>
    :root {
      --bg-main: #f8f9fa;
      --bg-card: #ffffff;
      --text-main: #1a1a1a;
      --text-muted: #666;
      --border: #e0e0e0;
      --accent: #4ade80;
    }

    body.dark-mode {
      --bg-main: #0a0a0a;
      --bg-card: #1a1a1a;
      --text-main: #f0f0f0;
      --text-muted: #aaa;
      --border: #333;
      --accent: #4ade80;
    }

    body { background: var(--bg-main); color: var(--text-main); transition: 0.3s; scroll-behavior: smooth; }
.card,.stat-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 15px; }
    input, textarea, select { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

.btn-publish {
      background: linear-gradient(135deg, var(--accent), #22c55e);
      color: #000;
      font-weight: bold;
      font-size: 16px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
    }
.btn-publish:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 0 30px rgba(74, 222, 128, 0.8); }

.file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
.file-input-wrapper input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.file-input-btn {
      display: block; padding: 12px; background: var(--bg-card);
      border: 2px dashed var(--accent); border-radius: 10px;
      text-align: center; color: var(--accent); font-weight: bold;
      cursor: pointer; transition: 0.3s;
    }
.file-input-btn:hover { background: rgba(74, 222, 128, 0.1); border-style: solid; }

    #backToTop {
      position: fixed; bottom: 90px; right: 20px; width: 50px; height: 50px;
      border-radius: 50%; background: var(--accent); color: #000; border: none;
      font-size: 24px; cursor: pointer; display: none; z-index: 998;
      box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4); transition: 0.3s;
    }
    #backToTop:hover { transform: translateY(-5px) scale(1.1); }

    #toast {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--bg-card); color: var(--text-main);
      padding: 15px 25px; border-radius: 10px; border-left: 4px solid var(--accent);
      box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 10001;
      opacity: 0; transition: 0.4s; min-width: 250px; text-align: center;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { border-left-color: #22c55e; }
    #toast.error { border-left-color: #ef4444; }

.typing {
      overflow: hidden; border-left: 3px solid var(--accent);
      white-space: nowrap; animation: typing 2s steps(20), blink 0.7s step-end infinite;
    }
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { 50% { border-left-color: transparent } }

    /* أزرار التفاعل */
.project-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
    }
.like-btn,.fav-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 15px;
      border: 2px solid var(--border);
      background: transparent;
      color: var(--text-main);
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
    }
.like-btn.liked {
      background: #ef4444;
      border-color: #ef4444;
      color: white;
    }
.fav-btn.favorited {
      background: #fbbf24;
      border-color: #fbbf24;
      color: #000;
    }
.like-btn:hover,.fav-btn:hover { transform: scale(1.05); }

    /* تأثير القلب */
    @keyframes heartBeat {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
.heart-animation {
      animation: heartBeat 0.5s ease;
    }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 25px 0; }
.stat-box { text-align: center; padding: 20px; transition: 0.3s; }
.stat-box:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(74, 222, 128, 0.2); border-color: var(--accent); }
.stat-box h3 { font-size: 2rem; color: var(--accent); margin: 0; }

.filter-bar { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 20px 0; padding: 15px; background: var(--bg-card); border-radius: 15px; border: 1px solid var(--border); }
.filter-btn { padding: 8px 16px; border: 2px solid var(--border); background: transparent; color: var(--text-main); border-radius: 25px; cursor: pointer; transition: 0.3s; font-weight: bold; }
.filter-btn.active,.filter-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(1.05); }
  </style>
</head>
<body>

  <div id="toast"></div>

  <div class="header">
    <a href="contact.html" class="btn btn-small" style="background:var(--accent)">📧 تواصل</a>
    <h1 class="typing">🍏 موقعي</h1>
    <div>
      <a href="categories.html" class="btn btn-small">📂 الأقسام</a>
      <button class="btn btn-small" onclick="openSettings()">⚙️ إعدادات</button>
      <button class="btn-danger btn-small" onclick="logout()">خروج</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-box"><h3 id="count">0</h3><p>📦 مشروع</p></div>
    <div class="stat-box"><h3 id="programmingCount">0</h3><p>💻 برمجة</p></div>
    <div class="stat-box"><h3 id="designCount">0</h3><p>🎨 تصميم</p></div>
    <div class="stat-box"><h3 id="qCount">0</h3><p>❓ أسئلة</p></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterProjects('all')">🌍 الكل</button>
    <button class="filter-btn" onclick="filterProjects('programming')">💻 برمجة</button>
    <button class="filter-btn" onclick="filterProjects('design')">🎨 تصميم</button>
    <button class="filter-btn" onclick="filterProjects('articles')">📝 مقالات</button>
    <button class="filter-btn" onclick="filterProjects('general')">🌐 عام</button>
    <button class="filter-btn" onclick="filterProjects('favorites')">⭐ مفضلاتي</button>
  </div>

  <div class="card">
    <form id="postForm">
      <h3>نشر مشروع جديد</h3>
      <input id="title" placeholder="عنوان المشروع" required maxlength="100">
      <textarea id="description" placeholder="الوصف" rows="4" maxlength="500"></textarea>
      <div class="char-count"><span id="charCount">0</span>/500 حرف</div>

      <label style="display:block; margin:10px 0; color:var(--accent)">🖼️ اختر صورة:</label>
      <div class="file-input-wrapper">
        <div class="file-input-btn" id="fileName">📁 اضغط لاختيار صورة</div>
        <input type="file" id="imageFile" accept="image/*">
      </div>
      <img id="imagePreview" style="max-width:100%; border-radius:12px; margin-top:10px; display:none">

      <select id="categories" required>
        <option value="">اختر القسم</option>
        <option value="programming">💻 برمجة</option>
        <option value="design">🎨 تصميم</option>
        <option value="articles">📝 مقالات</option>
        <option value="general">🌐 عام</option>
      </select>

      <button class="btn-publish" type="submit">🚀 نشر المشروع</button>
    </form>
  </div>

  <div id="projects"></div>

  <h2 style="margin-top:40px; color:var(--accent)">اسألني أي شيء</h2>
  <div class="card">
    <input id="qName" placeholder="اسمك">
    <textarea id="qText" placeholder="سؤالك" maxlength="300"></textarea>
    <button class="btn" onclick="askQuestion()">إرسال</button>
  </div>
  <div id="questions"></div>

  <button id="backToTop" onclick="scrollToTop()">⬆️</button>

  <script>
    const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pcnJ4eXRxdHRqZ2xnbHhyYXJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjE1MDMsImV4cCI6MjA5NjA5NzUwM30.I8EZoSupeqYZxPQvjNa4y0kq8XXZzfobhcHSFfVSbyo');
    let currentUser = null;
    let editProjectId = null;
    let deleteProjectId = null;
    let uploadedImageUrl = '';
    let editUploadedImageUrl = '';
    let allProjects = [];

    const catNames = {'articles':'مقالات','design':'تصميم','programming':'برمجة','general':'عام'};

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'show ' + type;
      setTimeout(() => { toast.className = toast.className.replace('show', ''); }, 3000);
    }

    window.onscroll = function() {
      document.getElementById('backToTop').style.display = window.scrollY > 300? 'block' : 'none';
    };
    function scrollToTop() { window.scrollTo({top: 0, behavior: 'smooth'}); }

    if(localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark-mode');
      document.getElementById('darkModeToggle').checked = true;
    }

    sb.auth.getUser().then(({data:{user}})=>{
      if(!user) return location.href='login.html';
      currentUser = user;
      loadProjects();
      loadQuestions();
    });

    function logout(){ sb.auth.signOut(); location.href='login.html'; }
    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

    document.getElementById('darkModeToggle').addEventListener('change', function(){
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('darkMode', this.checked);
    });

    function filterProjects(category){
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      if(category === 'all') {
        displayProjects(allProjects);
      } else if(category === 'favorites') {
        const favs = JSON.parse(localStorage.getItem('favorites_' + currentUser.id) || '[]');
        const filtered = allProjects.filter(p => favs.includes(p.id));
        displayProjects(filtered);
      } else {
        const filtered = allProjects.filter(p => p.categories === category);
        displayProjects(filtered);
      }
    }

    document.getElementById('description').addEventListener('input', e => {
      document.getElementById('charCount').textContent = e.target.value.length;
    });
    document.getElementById('editDesc').addEventListener('input', e => {
      document.getElementById('editCharCount').textContent = e.target.value.length;
    });

    document.getElementById('imageFile').addEventListener('change', async function(e){
      const file = e.target.files[0];
      if(!file) return;
      document.getElementById('fileName').textContent = '✅ ' + file.name;
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById('imagePreview').src = ev.target.result;
        document.getElementById('imagePreview').style.display = 'block';
      };
      reader.readAsDataURL(file);
      const fileName = `${Date.now()}_${file.name}`;
      const {data, error} = await sb.storage.from('projects').upload(fileName, file);
      if(error) return showToast('خطأ رفع الصورة: ' + error.message, 'error');
      const {data: urlData} = sb.storage.from('projects').getPublicUrl(fileName);
      uploadedImageUrl = urlData.publicUrl;
      showToast('تم رفع الصورة بنجاح ✓');
    });

    document.getElementById('postForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const {error} = await sb.from('projects').insert({
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        image_url: uploadedImageUrl,
        categories: document.getElementById('categories').value,
        user_id: currentUser.id,
        likes: 0
      });
      if(error) return showToast('خطأ: '+error.message, 'error');
      e.target.reset();
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('fileName').textContent = '📁 اضغط لاختيار صورة';
      uploadedImageUrl = '';
      document.getElementById('charCount').textContent = '0';
      showToast('تم نشر المشروع بنجاح 🚀');
      loadProjects();
    });

    async function loadProjects(){
      const {data} = await sb.from('projects').select('*').order('id',{ascending:false});
      allProjects = data || [];
      document.getElementById('count').textContent = allProjects.length;
      document.getElementById('programmingCount').textContent = allProjects.filter(p => p.categories === 'programming').length;
      document.getElementById('designCount').textContent = allProjects.filter(p => p.categories === 'design').length;
      displayProjects(allProjects);
    }

    function displayProjects(projects){
      const projectsDiv = document.getElementById('projects');
      if(!projects.length) return projectsDiv.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding:40px">لا توجد مشاريع في هذا القسم 📭</p>';

      const favorites = JSON.parse(localStorage.getItem('favorites_' + currentUser.id) || '[]');
      const likedProjects = JSON.parse(localStorage.getItem('liked_' + currentUser.id) || '[]');

      projectsDiv.innerHTML = projects.map(p=>{
        const isLiked = likedProjects.includes(p.id);
        const isFav = favorites.includes(p.id);
        return `
        <div class="card" data-category="${p.categories}">
          <div class="actions">
            ${p.user_id == currentUser.id? `
            <button class="btn btn-edit btn-small" onclick='editProject(${p.id},"${p.title.replace(/"/g, '&quot;')}","${(p.description||'').replace(/"/g, '&quot;')}","${p.image_url||''}")'>✏️ تعديل</button>
            <button class="btn-danger btn-small" onclick="openDelete(${p.id})">🗑️ حذف</button>
            ` : ''}
          </div>
          <span class="badge" style="background:linear-gradient(135deg, var(--accent), #22c55e); color:#000; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:bold">${catNames[p.categories] || p.categories}</span>
          <h3 style="margin-top:15px">${p.title}</h3>
          <p style="line-height:1.6">${p.description || 'بدون وصف'}</p>
          ${p.image_url? `<img src="${p.image_url}" style="max-width:100%; border-radius:12px; margin-top:15px">` : ''}
          <div class="date" style="margin-top:15px; color:var(--text-muted); font-size:13px">📅 ${formatDate(p.created_at)}</div>

          <!-- أزرار اللايك والمفضلة -->
          <div class="project-actions">
            <button class="like-btn ${isLiked? 'liked' : ''}" onclick="toggleLike(${p.id}, this)">
              <span class="${isLiked? 'heart-animation' : ''}">❤️</span>
              <span id="like-count-${p.id}">${p.likes || 0}</span>
            </button>
            <button class="fav-btn ${isFav? 'favorited' : ''}" onclick="toggleFavorite(${p.id}, this)">
              <span>⭐</span>
              <span>مفضلة</span>
            </button>
          </div>

          <div class="comments-section" style="margin-top:20px; padding-top:15px; border-top:1px solid var(--border)">
            <h4 style="color:var(--accent)">💬 التعليقات</h4>
            <div id="comments-${p.id}"></div>
            <div style="display:flex; gap:8px; margin-top:10px">
              <input id="comment-${p.id}" placeholder="اكتب تعليقك..." style="flex:1">
              <button class="btn btn-small" onclick="addComment(${p.id})">إرسال</button>
            </div>
          </div>
        </div>
      `}).join('');
      projects.forEach(p=>loadComments(p.id));
    }

    // دالة اللايك
    async function toggleLike(projectId, btn) {
      const likedProjects = JSON.parse(localStorage.getItem('liked_' + currentUser.id) || '[]');
      const likeCountEl = document.getElementById('like-count-' + projectId);
      let currentLikes = parseInt(likeCountEl.textContent);

      if(likedProjects.includes(projectId)) {
        // إلغاء اللايك
        likedProjects.splice(likedProjects.indexOf(projectId), 1);
        currentLikes--;
        btn.classList.remove('liked');
        showToast('تم إلغاء الإعجاب');
      } else {
        // إضافة لايك
        likedProjects.push(projectId);
        currentLikes++;
        btn.classList.add('liked');
        btn.querySelector('span').classList.add('heart-animation');
        setTimeout(() => btn.querySelector('span').classList.remove('heart-animation'), 500);
        showToast('أعجبك المشروع ❤️');
      }

      localStorage.setItem('liked_' + currentUser.id, JSON.stringify(likedProjects));
      likeCountEl.textContent = currentLikes;
      await sb.from('projects').update({likes: currentLikes}).eq('id', projectId);
    }

    // دالة المفضلة
    function toggleFavorite(projectId, btn) {
      const favorites = JSON.parse(localStorage.getItem('favorites_' + currentUser.id) || '[]');

      if(favorites.includes(projectId)) {
        favorites.splice(favorites.indexOf(projectId), 1);
        btn.classList.remove('favorited');
        showToast('تم حذف من المفضلة');
      } else {
        favorites.push(projectId);
        btn.classList.add('favorited');
        showToast('أضيف للمفضلة ⭐');
      }

      localStorage.setItem('favorites_' + currentUser.id, JSON.stringify(favorites));
    }

    function formatDate(d){
      return new Date(d).toLocaleDateString('ar-EG',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    }

    function openDelete(id){
      deleteProjectId = id;
      document.getElementById('deleteModal').style.display = 'flex';
    }
    function closeDelete(){
      document.getElementById('deleteModal').style.display = 'none';
      deleteProjectId = null;
    }
    async function confirmDelete(){
      await sb.from('projects').delete().eq('id',deleteProjectId);
      closeDelete();
      showToast('تم حذف المشروع 🗑️', 'success');
      loadProjects();
    }

    function editProject(id, title, desc, img){
      editProjectId = id;
      document.getElementById('editTitle').value = title;
      document.getElementById('editDesc').value = desc;
      if(img) {
        document.getElementById('editImagePreview').src = img;
        document.getElementById('editImagePreview').style.display = 'block';
        editUploadedImageUrl = img;
      }
      document.getElementById('editCharCount').textContent = desc.length;
      document.getElementById('editModal').style.display = 'flex';
    }
    function closeEdit(){ document.getElementById('editModal').style.display = 'none'; }

    async function saveEdit(){
      const newTitle = document.getElementById('editTitle').value;
      const newDesc = document.getElementById('editDesc').value;
      const newImg = editUploadedImageUrl || document.getElementById('editImagePreview').src;
      if(!newTitle.trim()) return showToast('العنوان مطلوب', 'error');
      await sb.from('projects').update({
        title:newTitle, description:newDesc, image_url:newImg
      }).eq('id', editProjectId);
      closeEdit();
      showToast('تم التعديل بنجاح ✓');
      loadProjects();
    }

    async function loadComments(project_id){
      const {data} = await sb.from('comments').select('*').eq('project_id',project_id).order('id',{ascending:true});
      document.getElementById(`comments-${project_id}`).innerHTML =
        data.map(c=>`<div style="display:flex; align-items:center; gap:10px; margin:8px 0; padding:8px; background:var(--bg-main); border-radius:8px">
        <div style="width:35px; height:35px; border-radius:50%; background:linear-gradient(135deg, var(--accent), #22c55e); color:white; display:flex; align-items:center; justify-content:center; font-weight:bold">${c.user_name.charAt(0).toUpperCase()}</div>
        <div><b style="color:var(--accent)">${c.user_name}:</b> <span>${c.comment}</span></div>
        </div>`).join('') || '<p style="color:var(--text-muted); font-size:13px; text-align:center; padding:10px">لا توجد تعليقات</p>';
    }

    async function addComment(project_id){
      const input = document.getElementById(`comment-${project_id}`);
      if(!input.value.trim()) return;
      await sb.from('comments').insert({
        project_id, user_name:currentUser.email.split('@')[0], comment:input.value.trim()
      });
      input.value = '';
      loadComments(project_id);
      showToast('تم إضافة التعليق 💬');
    }

    async function loadQuestions(){
      const {data} = await sb.from('questions').select('*').order('id',{ascending:false});
      document.getElementById('qCount').textContent = data.length;
      document.getElementById('questions').innerHTML = data.map(q=>`
        <div class="card">
          <div style="display:flex; align-items:center; gap:10px">
            <div style="width:40px; height:40px; border-radius:50%; background:var(--accent); color:#000; display:flex; align-items:center; justify-content:center; font-weight:bold">${q.user_name.charAt(0)}</div>
            <b style="color:var(--accent)">${q.user_name}:</b>
          </div>
          <p style="margin-top:10px">${q.question}</p>
          ${q.answer? `<div style="margin-top:10px; padding:10px; background:var(--bg-main); border-right:3px solid var(--accent); border-radius:5px"><b style="color:#22c55e">الرد:</b> ${q.answer}</div>` : ''}
        </div>
      `).join('') || '<p style="color:var(--text-muted); text-align:center; padding:20px">لا توجد أسئلة بعد</p>';
    }

    async function askQuestion(){
      const name = document.getElementById('qName').value.trim() || 'زائر';
      const question = document.getElementById('qText').value.trim();
      if(!question) return showToast('اكتب سؤالك', 'error');
      await sb.from('questions').insert({user_name:name, question});
      document.getElementById('qText').value = '';
      showToast('تم إرسال سؤالك ✓');
      loadQuestions();
    }
  </script>

  <style>
.float-btn{
      position:fixed; bottom:20px; width:55px; height:55px;
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      font-size:28px; color:#fff; text-decoration:none;
      box-shadow:0 4px 20px rgba(0,0,0,0.5); transition:0.3s; z-index:999;
    }
