  }

  console.log('بياناتك كاملة:', user.user_metadata); // شوف ايش يطلع هنا

    document.getElementById('admin-panel').style.display = 'block';
    console.log('✅ انت ادمن رسمي');
  } else {
    alert('لسا مو ادمن. Role = ' + user.user_metadata?.role);

    await supabase.auth.signOut();
  }
}
checkAuth();

async function logout() {
