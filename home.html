<!doctype html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8">
<title>التحقق...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0b1020; color:#eaf2ff; display:flex; align-items:center; justify-content:center; height:100vh; font-family:tahoma">
<div id="msg">جاري التحقق من الصلاحيات...</div>

<script>
const sb = supabase.createClient('https://mirrxytqttjglglxrarq.supabase.co','sb_publishable_FXUmqRa_eAjdgWdZpFl-tA_YQM4FSnQ');

async function checkAdmin(){
  const { data: { user } = await sb.auth.getUser();
  
  if(!user){
    document.getElementById('msg').innerHTML = 'مش مسجل دخول <br><a href="login.html" style="color:#3b82f6">روح سجل دخول</a>';
    return;
  }
  
  if(user.app_metadata.role !== 'admin'){
    await sb.auth.signOut();
    document.getElementById('msg').innerHTML = 'انت مو ادمن ❌ <br><a href="login.html" style="color:#3b82f6">ارجع للدخول</a>';
    return;
  }
  
  // انت ادمن - حوله على الموقع القديم
  location.href = 'home.html';
}

checkAdmin();
</script>
</body>
</html>
