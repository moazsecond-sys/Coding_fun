<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>الحظيرة مقفولة</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      margin: 0;
      padding: 0;
    }
    
    /* باب حديد يغطي الصفحة كلها */
    #باب_الحديد {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999; /* فوق الكل */
      text-align: center;
    }
    
    #باب_الحديد h1 {
      font-size: 48px;
      color: #e74c3c;
      animation: وميض 1s infinite;
    }
    
    @keyframes وميض {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .المحتوى_العادي {
      padding: 50px;
      text-align: center;
    }
    
    button {
      padding: 15px 30px;
      font-size: 20px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- المحتوى العادي بتاع الصفحة -->
  <div class="المحتوى_العادي">
    <h2>🐓 أهلا في حظيرة الديك 🐭</h2>
    <p>دي صفحة تجريبية</p>
    <button onclick="alert('أهلا بيك!')">دوس هنا</button>
    <input placeholder="اكتب هنا...">
  </div>

  <!-- باب الحديد - مخفي في الأول -->
  <div id="باب_الحديد" style="display: none;">
    <h1>🔴 ممنوع الدخول</h1>
    <p>🐓 الديك: انت مخالف لقوانين الحظيرة</p>
    <p>الحظر: مدى الحياة</p>
    <p style="font-size: 14px; margin-top: 30px;">عشان تفك الحظر للتجربة: افتح Console واكتب localStorage.clear()</p>
  </div>

<script>
// الديك يصحى ويبص في الدفتر أول ما الصفحة تفتح
window.onload = function() {
  let محظور = localStorage.getItem('حظر_مؤبد')
  
  if(محظور === 'نعم') {
    // 1. نزل باب الحديد
    document.getElementById('باب_الحديد').style.display = 'flex'
    
    // 2. عطل أي كلك في الصفحة
    document.body.style.pointerEvents = 'none'
    
    // 3. عطل أي كتابة
    document.addEventListener('keydown', function(e) {
      e.preventDefault()
    })
    
    console.log('🐓 الديك: الباب مقفول ومحدش يدخل!')
  }
}

// زر المخالفة - لو دوست عليه 3 مرات تتبند
let عدد_المخالفات = 0
document.querySelector('button').onclick = function() {
  عدد_المخالفات++
  
  if(عدد_المخالفات >= 3) {
    localStorage.setItem('حظر_مؤبد', 'نعم') // الديك يكتب اسمك
    location.reload() // اعمل ريفريش عشان الباب ينزل
  } else {
    alert('⚠️ تحذير ' + عدد_المخالفات + '/3')
  }
}
</script>

</body>
</html>
