<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>الديك المفتش vs الفار الحرامي</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #ffeaa7, #fab1a0);
      overflow: hidden;
    }
    
    h2 {
      color: #2d3436;
      margin-bottom: 40px;
      font-size: 28px;
    }
    
    #h1 {
      padding: 25px 50px;
      font-size: 26px;
      background: linear-gradient(45deg, #00b894, #00cec9);
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      font-weight: bold;
    }
    
    #h1:hover:not(:disabled) {
      transform: scale(1.08) rotate(2deg);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }
    
    #h1:disabled {
      cursor: not-allowed;
    }

    /* ===== الأنيميشن الحقي ===== */
    
    /* الديك يرف بجناحه ويهجم */
    @keyframes الديك_يهجم {
      0%, 100% { transform: scale(1) rotate(-2deg); }
      25% { transform: scale(1.15) rotate(5deg) translateY(-5px); }
      75% { transform: scale(1.15) rotate(-5deg) translateY(-5px); }
    }
    
    /* الفار يترعش من الخوف */
    @keyframes الفار_يترعش {
      0%, 100% { transform: translateX(0) scale(0.85); }
      25% { transform: translateX(-8px) scale(0.85); }
      75% { transform: translateX(8px) scale(0.85); }
    }
    
    /* القفص ينزل عليه */
    @keyframes القفص_ينزل {
      0% { transform: scale(1) translateY(0); filter: brightness(1); }
      50% { transform: scale(0.8) translateY(15px); filter: brightness(0.7); }
      100% { transform: scale(0.8) translateY(0); filter: brightness(0.6); }
    }
    
    /* وميض أحمر للتنبيه */
    @keyframes وميض_أحمر {
      0%, 100% { box-shadow: 0 0 0px red; }
      50% { box-shadow: 0 0 30px red; }
    }

    .ديك_هجوم {
      animation: الديك_يهجم 0.4s infinite, وميض_أحمر 0.5s infinite;
      background: linear-gradient(45deg, #e17055, #d63031) !important;
    }

    .فار_محبوس {
      animation: الفار_يترعش 0.15s infinite, القفص_ينزل 0.6s;
      background: linear-gradient(45deg, #636e72, #2d3436) !important;
    }
    
    .عداد {
      margin-top: 20px;
      font-size: 20px;
      color: #2d3436;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>🐓 المفتش كونان يحرس المخزن 🧀🐭</h2>
  <button id="h1">🐭 Think well</button>
  <div class="عداد" id="العداد"></div>
  <p style="margin-top:15px; color:#555">افتح F12 عشان تسمع استجواب الديك 📝</p>

<script>
document.getElementById('h1').onclick = function(event) {
  let الفار_المتهم = event.target
  let العداد = document.getElementById('العداد')
  
  // منع الضغط مرتين
  if(الفار_المتهم.disabled) return
  
  // 1. الديك يهجم
  الفار_المتهم.classList.add('ديك_هجوم')
  الفار_المتهم.innerHTML = '🐓 كوكو كو! اتقفشت!'
  console.log('🐓 الديك: مين اللي بيسرق القمح؟!')
  console.log('🐓 الديك: اسمك؟ ' + الفار_المتهم.id)
  
  setTimeout(function() {
    // 2. الفار يتحبس في القفص
    الفار_المتهم.classList.remove('ديك_هجوم')
    الفار_المتهم.classList.add('فار_محبوس')
    الفار_المتهم.disabled = true
    الفار_المتهم.innerHTML = '🐭⛓️ محبوس سق سق'
    console.log('🐓 الديك: الحكم 3 ثواني حبس!')
    
    // 3. عداد تنازلي
    let ثواني = 3
    العداد.innerHTML = `⛓️ باقي ${ثواني} ثانية`
    
    let المؤقت = setInterval(function() {
      ثواني--
      if(ثواني > 0) {
        العداد.innerHTML = `⛓️ باقي ${ثواني} ثانية`
      } else {
        clearInterval(المؤقت)
        العداد.innerHTML = ''
        
        // 4. الديك يصالحه ويطلعه
        الفار_المتهم.classList.remove('فار_محبوس')
        الفار_المتهم.disabled = false
        الفار_المتهم.innerHTML = '🐭 Think well'
        الفار_المتهم.style.background = 'linear-gradient(45deg, #00b894, #00cec9)'
        console.log('🐓 الديك: خلاص سامحتك... بس آخر مرة!')
      }
    }, 1000)
  }, 600)
}
</script>

</body>
</html>
