<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<style>
  #الفار {
    padding: 20px 40px;
    font-size: 22px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.5s;
  }
  
  /* الفار وهو بيكنس */
  .بيكنس {
    animation: كنس 0.3s infinite;
    background: #f39c12 !important;
  }
  
  @keyframes كنس {
    0% { transform: translateX(-5px) rotate(-5deg); }
    50% { transform: translateX(5px) rotate(5deg); }
    100% { transform: translateX(-5px) rotate(-5deg); }
  }
  
  #رسالة_العقاب {
    margin-top: 20px;
    font-size: 20px;
    color: #e74c3c;
    font-weight: bold;
    display: none;
  }
</style>
</head>
<body>

<h1>🐓 حظيرة الديك المشرف</h1>
<button id="الفار">🐭 أنا فار شقي دوس عليا</button>
<p id="العداد">اتقفش: 0 مرة</p>
<p id="رسالة_العقاب"></p>

<script>
let عدد_المخالفات = 0
let الفار = document.getElementById('الفار')
let العداد = document.getElementById('العداد')
let الرسالة = document.getElementById('رسالة_العقاب')

let صفارة = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg')

الفار.onclick = function() {
  
  // لو الفار في عقوبة ومينفعش يدوس
  if(الفار.disabled) return
  
  صفارة.play()
  عدد_المخالفات++
  العداد.innerHTML = 'اتقفش: ' + عدد_المخالفات + ' مرة'
  
  // لو وصل 3 = عقوبة الكنس
  if(عدد_المخالفات >= 3) {
    
    // 1. الديك يشغل الفار
    الفار.disabled = true
    الفار.classList.add('بيكنس') // يبدأ يتهز يمين وشمال
    الفار.innerHTML = '🧹 بكنس الحظيرة...'
    الرسالة.style.display = 'block'
    الرسالة.innerHTML = '🐓 الديك: امسك المكنسة يا كسول! عقابك 10 ثواني كنس'
    
    // 2. عد تنازلي 10 ثواني
    let ثواني_الكنس = 10
    let مؤقت_الكنس = setInterval(function() {
      الرسالة.innerHTML = '🐓 الديك: فاضل ' + ثواني_الكنس + ' ثانية كنس... يلا اشتغل'
      ثواني_الكنس--
      
      // 3. خلص عقاب
      if(ثواني_الكنس < 0) {
        clearInterval(مؤقت_الكنس)
        
        // الديك يعفو عنه
        الفار.disabled = false
        الفار.classList.remove('بيكنس')
        الفار.innerHTML = '🐭 أنا فار شقي دوس عليا'
        الرسالة.innerHTML = '🐓 الديك: برافو... عفيت عنك المرة دي. بس لو غلطت تاني هزود العقاب!'
        عدد_المخالفات = 0 // نرجع العداد صفر
        العداد.innerHTML = 'اتقفش: 0 مرة'
      }
    }, 1000) // كل ثانية
  }
}
</script>

</body>
</html>
