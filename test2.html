<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>ديك الحظيرة المفتش</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      text-align: center;
      padding: 50px;
      background: #f4f1e8;
    }
    #الفار {
      padding: 20px 40px;
      font-size: 24px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
    }
    #الفار:hover {
      background: #2ecc71;
      transform: scale(1.1);
    }
    #الفار:disabled {
      background: #95a5a6;
      cursor: not-allowed;
    }
    .لوحة {
      margin-top: 30px;
      font-size: 22px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .مطلوبين {
      margin-top: 20px;
      color: #c0392b;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>🐓 أهلا في حظيرة الديك المفتش</h1>
  <button id="الفار">🐭 أنا فار شقي دوس عليا</button>
  
  <div class="لوحة">
    <p id="العداد">اتقفش: 0 فار</p>
    <div class="مطلوبين" id="دفتر_المطلوبين">دفتر المطلوبين فاضي</div>
  </div>

<script>
// 1. الديك بيصحى يجهز حاجته
let عدد_الفيران = 0
let قايمة_المطلوبين = JSON.parse(localStorage.getItem('دفتر_الديك')) || []

let الفار = document.getElementById('الفار')
let العداد = document.getElementById('العداد')
let الدفتر = document.getElementById('دفتر_المطلوبين')

// 2. الديك صنع صفارتين
let صفارة_تحذير = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg')
let صوت_الباب = new Audio('https://actions.google.com/sounds/v1/doors/door_close.ogg')

// 3. الديك يبص في الدفتر أول ما يفتح
function حدث_الدفتر() {
  if(قايمة_المطلوبين.length > 0) {
    الدفتر.innerHTML = '🔴 المطلوبين: ' + قايمة_المطلوبين.join(' - ')
  }
}
حدث_الدفتر()

// 4. الفار دوست عليه = الديك يشتغل
الفار.onclick = function() {
  
  // أ. الديك يصفر تحذير
  صفارة_تحذير.play()
  
  // ب. الديك يزود العداد
  عدد_الفيران++
  العداد.innerHTML = 'اتقفش: ' + عدد_الفيران + ' فار'
  
  // ج. الديك يسأله عن اسمه ويكتبه
  let اسم_الفار = prompt('🐓 الديك: قف! اسمك إيه يا حرامي؟')
  
  if(اسم_الفار && اسم_الفار.trim() != '') {
    قايمة_المطلوبين.push(اسم_الفار)
    
    // يحط الدفتر في الدرج
    localStorage.setItem('دفتر_الديك', JSON.stringify(قايمة_المطلوبين))
    
    // يحدث الشاشة
    حدث_الدفتر()
    
    alert('🐓 الديك: تمام يا ' + اسم_الفار + ' اسمك اتسجل رقم ' + عدد_الفيران)
  }
  
  // د. لو وصل 3 فران = باب حديد
  if(عدد_الفيران >= 3) {
    صوت_الباب.play() // صوت قفلة الباب
    الفار.disabled = true
    الفار.innerHTML = '🔒 الحظيرة قفلت'
    alert('🐓 الديك: 3 فران كفاية! الحظيرة قفلت مؤبد!')
  }
}
</script>

</body>
</html>
