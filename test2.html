<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>حاسبة التلاتة الكبار</title>
<style>
  body {
    font-family: Tahoma;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
 .box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    text-align: center;
    width: 350px;
  }
  h2 {
    color: #4a90e2;
  }
  button {
    background: #4a90e2;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 15px;
  }
  button:hover {
    background: #357abd;
  }
  #النتيجة {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    color: #333;
  }
</style>
</head>
<body>

<div class="box">
  <h2>💡 حاسبة التلاتة الكبار</h2>
  <p>المصاريف: [5, 15, 25, 35, 8, 50] جنيه</p>
  <p>القاعدة: خد اللي أكبر من 20، اضربه في 2، واجمعه</p>
  <button onclick="احسب()">احسبلي</button>
  <div id="النتيجة"></div>
</div>

<script>
function احسب() {
  const مصاريف = [5, 15, 25, 35, 8, 50];

  const الناتج = مصاريف
   .filter(مبلغ => مبلغ > 20) // 1. شيل الرخيص: [25, 35, 50]
   .map(مبلغ => مبلغ * 2) // 2. اضرب في 2: [50, 70, 100]
   .reduce((إجمالي, مبلغ) => إجمالي + مبلغ, 0); // 3. اجمع: 220

  document.getElementById('النتيجة').innerHTML =
    `الإجمالي بعد الفلترة والضرب = <span style="color:#4a90e2">${الناتج} جنيه</span> 🎉`;
}
</script>

</body>
</html>
