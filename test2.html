<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>الديك يحبس الفار دقيقة</title>
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #2d3436, #636e72);
      color: white;
    }
    
    #h1 {
      padding: 30px 60px;
      font-size: 28px;
      background: linear-gradient(45deg, #00b894, #55efc4);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      font-weight: bold;
    }
    
    #h1:disabled {
      background: linear-gradient(45deg, #d63031, #e84393);
      cursor: not-allowed;
      box-shadow: 0 5px 15px rgba(231, 76, 60, 0.5);
    }
    
    .عداد {
      margin-top: 30px;
      font-size: 32px;
      font-weight: bold;
      color: #fdcb6e;
    }
    
    @keyframes وميض_سجن {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(0.95); opacity: 0.7; }
    }
    
    .محبوس_دقيقة {
      animation: وميض_سجن 0.5s infinite;
    }
  </style>
</head>
<body>

  <h2>🐓 الديك: اللي يتجاوز الحد يتحبس دقيقة!</h2>
  <button id="h1">🐭 دوس عليا</button>
  <div class="عداد" id="العداد"></div>

<script>
let الفار_المتهم = document.getElementById('h1')
let العداد = document.getElementById('العداد')
let عدد_السرقات = 0 // عداد المحاولات

الفار_المتهم.onclick = function(event) {
  
  // لو محبوس خلاص متعملش حاجة
  if(الفار_المتهم.disabled) return
  
  عدد_السرقات++
  console.log('🐓 الديك: دي سرقة رقم ' + عدد_السرقات)
  
  // أول مرة: تحذير
  if(عدد_السرقات < 3) {
    الفار_المتهم.innerHTML = '⚠️ تحذير ' + عدد_السرقات + '/3'
    setTimeout(() => {
      الفار_المتهم.innerHTML = '🐭 دوس عليا'
    }, 1000)
    return
  }
  
  // تجاوز الحد: حبس دقيقة كاملة 60 ثانية
  الفار_المتهم.disabled = true // قفل القفص
  الفار_المتهم.classList.add('محبوس_دقيقة')
  الفار_المتهم.innerHTML = '⛓️ محبوس دقيقة'
  
  let ثواني_متبقية = 60 // دقيقة كاملة
  العداد.innerHTML = `⏱️ باقي ${ثواني_متبقية} ثانية`
  
  console.log('🐓 الديك: الحكم النهائي! حبس 60 ثانية!')
  
  // كل ثانية ننقص من العداد
  let المؤقت = setInterval(function() {
    ثواني_متبقية--
    العداد.innerHTML = `⛓️ باقي ${ثواني_متبقية} ثانية سجن`
    
    // لما الدقيقة تخلص
    if(ثواني_متبقية <= 0) {
      clearInterval(المؤقت)
      الفار_المتهم.disabled = false // فتح القفص
      الفار_المتهم.classList.remove('محبوس_دقيقة')
      الفار_المتهم.innerHTML = '🐭 Think well'
      العداد.innerHTML = '✅ الديك سامحك... بس لو اتكررت هتبقى ساعة!'
      عدد_السرقات = 0 // تصفير العداد
      
      setTimeout(() => {
        العداد.innerHTML = ''
      }, 3000)
    }
  }, 1000) // 1000 = ثانية واحدة
}
</script>

</body>
</html>
