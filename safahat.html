<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Apple Design 🍏 - تصميمات احترافية</title>
<style>
:root{--green:#22c55e;--light:#f7fef7;--dark:#166534;--white:#fff}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif}
body{background:var(--light);color:#222}
header{background:var(--white);padding:18px;text-align:center;box-shadow:0 2px 6px #0001;position:sticky;top:0;z-index:10;border-bottom:3px solid var(--green)}
header h1{color:var(--green);font-size:28px}
.notification{position:fixed;top:0;left:0;right:0;padding:12px;text-align:center;color:#fff;display:none;z-index:999;font-weight:bold}
.notif-success{background:var(--green)}.notif-error{background:#eab308}.notif-offer{background:#dc2626}
.container{max-width:900px;margin:auto;padding:20px}
.services{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-top:20px}
.card{background:var(--white);padding:18px;border-radius:14px;box-shadow:0 3px 10px #0001;text-align:center;border-top:4px solid var(--green)}
.card h3{color:var(--dark);margin-bottom:8px}
.btn{background:var(--green);color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;margin-top:10px;font-weight:bold}
.btn:hover{opacity:0.85}
.gallery{display:flex;gap:12px;overflow-x:auto;margin:20px 0;padding-bottom:10px}
.gallery img{width:200px;height:260px;object-fit:cover;border-radius:12px;border:3px solid var(--green)}
.ad-banner{background:var(--white);padding:15px;border-radius:12px;text-align:center;margin-top:25px;border:2px dashed var(--green)}
.ad-banner img{max-width:100%;border-radius:8px;cursor:pointer}
.whatsapp-float{position:fixed;bottom:20px;left:20px;background:#25D366;color:#fff;width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;text-decoration:none;box-shadow:0 4px 12px #0003;z-index:99}
footer{text-align:center;padding:20px;color:#666;font-size:14px}
</style>
</head>
<body>
<div id="notif" class="notification"></div>
<header>
<h1 id="brandName">Green Apple Design 🍏</h1>
<p id="brandDesc">تصميمات Canva احترافية - CV + لوجو + بوستات</p>
</header>

<div class="container">
<h2>خدماتنا</h2>
<div class="services" id="servicesBox"></div>

<h2 style="margin-top:30px">معرض أعمالنا</h2>
<div class="gallery" id="galleryBox"></div>

<div class="ad-banner" id="adBox" style="display:none">
<h3 id="adTitle">شاهد باقي أعمالي</h3>
<a id="adLink" target="_blank"><img id="adImg" src=""></a>
</div>
</div>

<a id="whatsappBtn" class="whatsapp-float" target="_blank">💬</a>

<footer>© 2026 Green Apple Design 🍏 - كل الحقوق محفوظة</font></footer>

<script>
const data = JSON.parse(localStorage.getItem('greenapple_data')) || {};
document.getElementById('brandName').innerText = data.brand || 'Green Apple Design 🍏';
document.getElementById('brandDesc').innerText = data.desc || 'تصميمات Canva احترافية - CV + لوجو + بوستات';

// الخدمات
const services = data.services || [
{title:'تصميم CV احترافي',price:'70 ج',desc:'سيرة ذاتية ATS جاهزة للتوظيف خلال 24 ساعة'},
{title:'تصميم بوست سوشيال',price:'30 ج',desc:'بوست جذاب لفيسبوك وانستجرام'},
{title:'تصميم لوجو بسيط',price:'50 ج',desc:'لوجو سريع لمشروعك الجديد'}
];
const sBox = document.getElementById('servicesBox');
services.forEach(s=>{
sBox.innerHTML += `<div class="card"><h3>${s.title}</h3><p>${s.desc}</p><b style="color:var(--green);font-size:18px">${s.price}</b><br><button class="btn" onclick="order()">اطلب الآن</button></div>`;
});

// المعرض
const gallery = data.gallery || [
'https://via.placeholder.com/200x260/22c55e/fff?text=CV+Template',
'https://via.placeholder.com/200x260/22c55e/fff?text=Logo+Sample',
'https://via.placeholder.com/200x260/22c55e/fff?text=Post+Design'
];
const gBox = document.getElementById('galleryBox');
gallery.forEach(img=> gBox.innerHTML += `<img src="${img}" alt="عمل">`);

// الأزرار الوهمية القابلة للتغيير
const btns = data.buttons || [{name:'واتساب',link:'#',icon:'💬'},{name:'يوتيوب',link:'#',icon:'▶️'}];
const wBtn = document.getElementById('whatsappBtn');
wBtn.href = btns[0].link;
wBtn.innerText = btns[0].icon;
wBtn.title = btns[0].name;

// الإعلان زي يوتيوب
if(data.ad && data.ad.show){
document.getElementById('adBox').style.display='block';
document.getElementById('adTitle').innerText = data.ad.title || 'شاهد باقي أعمالي';
document.getElementById('adLink').href = data.ad.link || '#';
document.getElementById('adImg').src = data.ad.img || 'https://via.placeholder.com/800x200/22c55e/fff?text=Green+Apple+Design+Portfolio';
}

// التنبيهات فوق الصفحة
function showNotif(msg,type){
const n=document.getElementById('notif');
n.className='notification notif-'+type;
n.innerText=msg; n.style.display='block';
setTimeout(()=>n.style.display='none',3500);
}
function order(){
if(!data.buttons ||!data.buttons[0].link || data.buttons[0].link=='#'){
showNotif('⚠️ من فضلك أضف رقم الواتساب من لوحة التحكم أولاً','error');
}else{
window.open(data.buttons[0].link,'_blank');
showNotif('✅ تم تحويلك للواتساب بنجاح','success');
}
}
// تنبيه العرض
if(data.offer) showNotif(data.offer,'offer');
</script>
</body>
</html>
