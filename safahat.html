<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجري</title>
<style>
body{font-family:'Cairo',sans-serif;background:#0f172a;color:#e2e8f0;margin:0;padding:20px}
.container{max-width:800px;margin:auto}
h1{text-align:center;color:#22c55e}
.product{background:#1e293b;padding:20px;border-radius:12px;margin:20px 0}
.btn{display:inline-block;background:#25D366;color:white;padding:12px 25px;border-radius:8px;text-decoration:none;font-weight:bold;transition:0.3s}
.btn:hover{background:#1ebe5b;transform:scale(1.05)}
#notif{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;display:none;z-index:999}
.notif-success{background:#22c55e;color:white}
.notif-offer{background:#f59e0b;color:white}
.notif-error{background:#ef4444;color:white}
#adBox{background:#334155;padding:15px;border-radius:10px;margin:20px 0;display:none}
</style>
</head>
<body>
<div class="container">
  <h1>🍏 متجرك الإلكتروني</h1>
  
  <!-- الإعلان -->
  <div id="adBox">
    <h3 id="adTitle"></h3>
    <a id="adLink" target="_blank"><img id="adImg" style="max-width:100%;border-radius:8px"></a>
  </div>

  <!-- المنتجات -->
  <div class="product">
    <h3>منتج 1</h3>
    <p>وصف المنتج هنا</p>
    <!-- الزرار المباشر - غير الرقم والرسالة -->
    <a href="https://wa.me/2010XXXXXXXXXX?text=السلام عليكم، عايز اطلب منتج 1" target="_blank" class="btn">اطلب الآن 💬</a>
  </div>

  <div class="product">
    <h3>منتج 2</h3>
    <p>وصف المنتج هنا</p>
    <a href="https://wa.me/2010XXXXXXXXXX?text=السلام عليكم، عايز اطلب منتج 2" target="_blank" class="btn">اطلب الآن 💬</a>
  </div>

</div>

<div id="notif"></div>

<script>
// هنا حط بياناتك من لوحة التحكم
const data = {
  buttons: [
    {name:'واتساب', link:'https://wa.me/2010XXXXXXXXXX', icon:'💬'}
  ],
  ad: {show:false, title:'', link:'#', img:''},
  offer: ''
};

// الإعلان
if(data.ad && data.ad.show){
  document.getElementById('adBox').style.display='block';
  document.getElementById('adTitle').innerText = data.ad.title;
  document.getElementById('adLink').href = data.ad.link;
  document.getElementById('adImg').src = data.ad.img;
}

// التنبيهات - سيبها زي ما هي
function showNotif(msg,type){
  const n=document.getElementById('notif');
  n.className='notification notif-'+type;
  n.innerText=msg; n.style.display='block';
  setTimeout(()=>n.style.display='none',3500);
}
</script>
</body>
</html>
