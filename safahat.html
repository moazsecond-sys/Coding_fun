<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO -->
  <title>صفحات | GREEN APPLE DESIGN - مقالات ونصائح التصميم</title>
  <meta name="description" content="مقالات ونصائح من GREEN APPLE DESIGN عن اللوجوهات والبنرات والبراندينج. تعلم كيف تسوي هوية بصرية تبيع من أول نظرة">
  <link rel="canonical" href="https://moazsecond-sys.github.io/safahat.html">
  <link rel="prev" href="https://moazsecond-sys.github.io/index.html">
  <link rel="next" href="https://moazsecond-sys.github.io/works.html">
  
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
</head>
<body>

  <!-- الهيدر موحد مع باقي الموقع -->
  <header>
    <img src="images/logo.png" alt="GREEN APPLE DESIGN Logo" class="logo">
    <h1>GREEN APPLE DESIGN</h1>
    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="safahat.html" class="active">صفحات</a>
      <a href="works.html">أعمالنا الكاملة</a>
    </nav>
  </header>

  <main class="container">
    <div class="hero-content" style="text-align:center;margin-bottom:50px">
      <h2>مقالات ونصائح التصميم</h2>
      <p>خبرتنا في تصميم اللوجوهات والبنرات، نحطها لك على طبق من ذهب 🍏</p>
    </div>

    <!-- فورم النشر - احذفه بعد ما تخلص نشر مقالاتك -->
    <section class="contact-section">
      <h2>📝 نشر مقال جديد</h2>
      <form id="postForm" class="contact-form">
        <input type="text" id="postTitle" placeholder="عنوان المقال" required>
        <textarea id="postContent" placeholder="اكتب محتوى المقال هنا..." rows="6" required></textarea>
        <button type="submit">نشر المقال 🚀</button>
      </form>
      <p id="postMsg" style="text-align:center;margin-top:15px;display:none"></p>
    </section>

    <!-- شبكة المنشورات -->
    <div class="grid" id="postsGrid">
      <div class="loading">جاري تحميل المقالات...</div>
    </div>
  </main>

  <!-- الفوتر موحد -->
  <footer>
    <p>© 2026 GREEN APPLE DESIGN - جميع الحقوق محفوظة</p>
    <p>جاهز تبدأ مشروعك؟ <a href="index.html#contact">تواصل معنا</a></p>
    <a href="admin.html" style="font-size:11px;color:#333;margin-top:10px;display:inline-block">لوحة التحكم</a>
  </footer>

  <!-- زر الواتساب العائم -->
  <a href="https://wa.me/2126XXXXXXXX?text=مرحبا، ابغى استفسار" class="chat-btn" target="_blank">💬 واتساب</a>

  <!-- سكربتات مرتبة -->
  <script src="config.js"></script>
  <script>
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const postsGrid = document.getElementById('postsGrid');

  // عرض المنشورات
  async function loadPosts() {
    try {
      const { data: posts, error } = await supabaseClient
        .from('posts')
        .select('*')
        .order('created_at', {ascending: false});
      
      if(error) throw error;
      
      if(!posts || posts.length === 0) {
        postsGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:#666;padding:60px">لا توجد مقالات بعد. انشر اول مقال من الفورم فوق 👆</p>';
        return;
      }
      
      postsGrid.innerHTML = '';
      posts.forEach((post, index) => {
        const date = new Date(post.created_at).toLocaleDateString('ar-EG', {year:'numeric', month:'long', day:'numeric'});
        
        postsGrid.innerHTML += `
          <div class="card">
            <div class="info" style="text-align:right">
              <div class="name" style="font-size:1.3rem;margin-bottom:8px">${post.title}</div>
              <div class="cat" style="color:#666;font-size:0.85rem;margin-bottom:12px">${date}</div>
              <p style="color:#ccc;line-height:1.8">${post.content}</p>
            </div>
          </div>
        `;
        
        setTimeout(() => {
          const cards = postsGrid.querySelectorAll('.card');
          if(cards[index]) cards[index].classList.add('show');
        }, index * 100);
      });
      
    } catch(err) {
      postsGrid.innerHTML = `<p style="color:red;text-align:center;grid-column:1/-1">خطأ: ${err.message}</p>`;
    }
  }

  // نشر مقال جديد
  document.getElementById('postForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const title = document.getElementById('postTitle').value.trim();
    const content = document.getElementById('postContent').value.trim();
    const msgBox = document.getElementById('postMsg');
    const btn = e.target.querySelector('button');
    
    msgBox.style.display = 'block';
    msgBox.style.color = '#4ade80';
    msgBox.textContent = 'جاري النشر...';
    btn.disabled = true;
    
    try {
      const { error } = await supabaseClient.from('posts').insert([{
        title: title,
        content: content,
        created_at: new Date().toISOString()
      }]);
      
      if(error) throw error;
      
      msgBox.textContent = '✅ تم النشر بنجاح!';
      document.getElementById('postForm').reset();
      loadPosts();
      
      setTimeout(() => {
        msgBox.style.display = 'none';
        btn.disabled = false;
      }, 3000);
      
    } catch(err) {
      msgBox.style.color = 'red';
      msgBox.textContent = '❌ خطأ: ' + err.message;
      btn.disabled = false;
    }
  });

  // تحديث لحظي
  supabaseClient.channel('posts-channel').on('postgres_changes',{event:'*',schema:'public',table:'posts'},loadPosts).subscribe();

  loadPosts();
  </script>
</body>
</html>
